<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ご注文明細確認</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f9; padding-bottom: 30px; }
        header { background: #3b5998; color: white; text-align: center; padding: 15px; font-weight: bold; }
        .container { padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        #reader { width: 100% !important; background: black; border-radius: 8px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 18px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px 5px; text-align: left; }
        #status-msg { color: #666; text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<header>ご注文明細確認</header>

<div class="container">
    <div id="scan-view">
        <div id="reader"></div>
        <p id="status-msg">QRコードをスキャンしてください</p>
    </div>

    <div id="auth-view" style="display:none;">
        <div class="card">
            <h3>本人確認</h3>
            <p>ご登録電話番号の<strong>下4桁</strong>を入力してください。</p>
            <input type="tel" id="auth-code" placeholder="例：1234" maxlength="4">
            <button class="btn" style="background:#3b5998;" onclick="verifyAndShow()">明細を表示する</button>
            <button class="btn" style="background:#ccc; margin-top:10px; color:#333;" onclick="location.reload()">戻る</button>
        </div>
    </div>

    <div id="loading-view" style="display:none; text-align:center; padding:40px;">
        <i class="fas fa-spinner fa-spin fa-3x" style="color:#3b5998;"></i>
        <p id="loading-text" style="margin-top:15px;">データを照合中...</p>
    </div>

    <div id="result-view" style="display:none;">
        <div class="card">
            <h2 id="cust-name" style="margin-top:0; color:#3b5998;"></h2>
            <table>
                <tbody id="history-table-body"></tbody>
            </table>
            <div style="text-align:right; margin-top:15px; font-size:1.4em; font-weight:bold; color:#d9534f;">
                合計：¥<span id="total-amount">0</span>
            </div>
        </div>
        <button id="email-btn" class="btn" style="background:#2e7d32;" onclick="requestEmail()">
            <i class="fas fa-paper-plane"></i> 請書をメールで受け取る
        </button>
    </div>
</div>

<script>
    let html5QrCode = null;
    let currentScannedId = "";
    let lastFetchedData = [];

    // 1. カメラ起動
    window.onload = () => {
        startCamera();
    };

    async function startCamera() {
        try {
            const devices = await Html5Qrcode.getCameras();
            if (devices && devices.length > 0) {
                const backCamera = devices.find(d => d.label.toLowerCase().includes('back')) || devices[devices.length - 1];
                html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start(backCamera.id, { fps: 10, qrbox: 250 }, (text) => {
                    currentScannedId = text.trim();
                    html5QrCode.stop();
                    document.getElementById("scan-view").style.display = "none";
                    document.getElementById("auth-view").style.display = "block";
                    document.getElementById("auth-code").focus();
                });
            }
        } catch (e) {
            alert("カメラ起動エラー: " + e);
        }
    }

    // 2. 照合開始
    function verifyAndShow() {
        const auth = document.getElementById("auth-code").value;
        if (auth.length !== 4) return alert("4桁入力してください");

        document.getElementById("auth-view").style.display = "none";
        document.getElementById("loading-view").style.display = "block";
        document.getElementById("loading-text").innerText = "サーバーと通信中...";

        // GASの関数呼び出し
        google.script.run
            .withSuccessHandler(renderResult)
            .withFailureHandler(onErr)
            .getHistoryWithAuth(currentScannedId, auth);
    }

    // 3. 結果表示
    function renderResult(data) {
        document.getElementById("loading-view").style.display = "none";
        if (!data || data.length === 0) {
            alert("データが見つかりませんでした。IDか下4桁が間違っている可能性があります。");
            document.getElementById("auth-view").style.display = "block";
            return;
        }

        lastFetchedData = data;
        document.getElementById("result-view").style.display = "block";
        document.getElementById("cust-name").innerText = data[0].customerName + " 様";

        let total = 0;
        const html = data.map(item => {
            total += Number(item.subtotal || 0);
            return `<tr>
                <td>${item.name}<br><small>${item.jan} / ¥${Number(item.price).toLocaleString()} × ${item.qty}</small></td>
                <td style="text-align:right;">¥${Number(item.subtotal).toLocaleString()}</td>
            </tr>`;
        }).join('');

        document.getElementById("history-table-body").innerHTML = html;
        document.getElementById("total-amount").innerText = total.toLocaleString();
    }

    function onErr(e) {
        alert("システムエラー: " + e);
        document.getElementById("loading-view").style.display = "none";
        document.getElementById("auth-view").style.display = "block";
    }

    function requestEmail() {
        let email = lastFetchedData[0].email || "";
        const target = window.prompt("送信先メールアドレス:", email);
        if (!target) return;

        google.script.run
            .withSuccessHandler(res => alert(res.success ? "送信しました" : "エラー: " + res.error))
            .sendOrderEmail(currentScannedId, target);
    }
</script>

</body>
</html>
