<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ご注文明細確認</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f9; color: #333; }
        header { background: #3b5998; color: white; text-align: center; padding: 15px; font-weight: bold; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; background: #3b5998; }
        #reader { width: 100% !important; background: #000; border-radius: 12px; }
        .item-row { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; }
        .total-box { text-align: right; padding: 20px; font-size: 1.4em; color: #d9534f; font-weight: bold; border-top: 2px solid #eee; }
        .page-section { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<header>ご注文明細確認</header>

<div class="container">
    <section id="home" class="page-section active">
        <div class="card" style="text-align:center;">
            <i class="fas fa-qrcode fa-5x" style="color:#3b5998; margin-bottom:20px;"></i>
            <p>QRコードをスキャンして<br>明細を確認してください。</p>
            <button class="btn-main" onclick="startCamera()">
                <i class="fas fa-camera"></i> スキャンを開始する
            </button>
        </div>
    </section>

    <section id="scanner-page" class="page-section">
        <div id="reader"></div>
        <button class="btn-main" style="background:#666; margin-top:15px;" onclick="stopCamera()">キャンセル</button>
    </section>

    <section id="result-page" class="page-section">
        <div class="card">
            <h3 id="cust-name" style="color:#3b5998; border-bottom:2px solid #3b5998; padding-bottom:10px;"></h3>
            <div id="history-list"></div>
            <div class="total-box">合計：¥<span id="total-amount">0</span></div>
        </div>
        <button class="btn-main" style="background:#666;" onclick="location.reload()">TOPへ戻る</button>
    </section>
</div>

<script>
    const GAS_URL = "あなたのGASのURL"; // ★ここにURLを貼る

    let html5QrCode = null;

    async function startCamera() {
        showPage('scanner-page');
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => {
                html5QrCode.stop().then(() => {
                    fetchHistory(text.trim());
                });
            }
        ).catch(err => alert("カメラ起動エラー"));
    }

    function stopCamera() {
        if (html5QrCode) html5QrCode.stop();
        showPage('home');
    }

    async function fetchHistory(id) {
        showPage('home'); // 一旦戻して待機
        try {
            // GET方式でデータを取得（action=getHistory を送る）
            const res = await fetch(`${GAS_URL}?action=getHistory&id=${id}`);
            const data = await res.json();
            
            if (!data || data.length === 0) {
                alert("明細が見つかりませんでした。");
                return;
            }
            renderResult(data);
        } catch (e) {
            alert("通信エラーが発生しました。");
        }
    }

    function renderResult(data) {
        showPage('result-page');
        document.getElementById("cust-name").innerText = data[0].customerName + " 様";
        
        let total = 0;
        const html = data.map(item => {
            total += Number(item.subtotal || 0);
            return `
                <div class="item-row">
                    <div>
                        <small style="color:#666;">${item.maker}</small><br>
                        <strong>${item.name}</strong><br>
                        <small>¥${Number(item.price).toLocaleString()} × ${item.qty}</small>
                    </div>
                    <div style="font-weight:bold; align-self:center;">
                        ¥${Number(item.subtotal).toLocaleString()}
                    </div>
                </div>`;
        }).join('');
        
        document.getElementById("history-list").innerHTML = html;
        document.getElementById("total-amount").innerText = total.toLocaleString();
    }

    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
