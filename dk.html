<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jewel Crash - Chain Reaction</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0f0c1b;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; padding: 0;
            overflow: hidden;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        #ui-panel {
            width: 100%; max-width: 400px; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; font-weight: bold; font-size: 20px;
            background: linear-gradient(to bottom, #1a1633, #0f0c1b);
            border-bottom: 2px solid #3d3473;
        }
        #combo-alert { color: #ffeb3b; font-size: 16px; min-height: 20px; text-shadow: 0 0 10px #ff9100; }
        #game-container { position: relative; width: 100%; max-width: 400px; flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        canvas { display: block; background: #141126; border: 3px solid #4a3f8a; border-radius: 10px; box-shadow: 0 0 20px rgba(74,63,138,0.5); max-height: 100%; max-width: 100%; object-fit: contain; }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(15,12,27,0.9); z-index: 10;
        }
        .overlay-title { font-size: 36px; color: #ff1744; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 15px rgba(255,23,68,0.6); }
        .overlay-score { font-size: 20px; color: #fff; margin-bottom: 25px; }
        .overlay-btn { background: #4a3f8a; border: 2px solid #fff; padding: 12px 30px; border-radius: 25px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .overlay-btn:active { background: #6b5cb5; transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div>SCORE: <span id="score-val">0</span></div>
        <div id="combo-alert"></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="gameover-overlay" class="overlay" onclick="resetGame()">
            <div class="overlay-title">GAME OVER</div>
            <div class="overlay-score">FINAL SCORE: <span id="final-score-val">0</span></div>
            <div class="overlay-btn">NEXT TRY</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// スマホ・PC双方で綺麗に映る解像度アスペクト比 (縦長)
canvas.width = 360;
canvas.height = 540;

const GRAVITY = 0.4;
const BOUNCE = 0.2; // ほんの少し跳ねる物理挙動
let score = 0;
let currentCombo = 0;
let isGameOver = false;
let jewels = [];
let particles = [];

// 次に落ちてくるジュエルの色（予告用）
const jewelColors = [
    { name: "RED",    hex: "#ff1744", glow: "#ff8a80" },
    { name: "BLUE",   hex: "#2979ff", glow: "#82b1ff" },
    { name: "GREEN",  hex: "#00e676", glow: "#b9f6ca" },
    { name: "YELLOW", hex: "#ffeb3b", glow: "#ffff8d" },
    { name: "PURPLE", hex: "#d500f9", glow: "#f48fb1" }
];
let nextColorIndex = Math.floor(Math.random() * jewelColors.length);

// 物理エンジン風のジュエルオブジェクト
class Jewel {
    constructor(x, y, colorIdx) {
        this.x = x;
        this.y = y;
        this.r = 16; // ジュエルのサイズ
        this.colorIdx = colorIdx;
        this.vx = (Math.random() - 0.5) * 2; // わずかな横ブレ
        this.vy = 0;
        this.isStatic = false; // 動かなくなったらtrue
        this.toRemove = false;
    }

    update() {
        if (this.isStatic) return;

        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;

        // 壁との衝突
        if (this.x - this.r < 0) { this.x = this.r; this.vx *= -BOUNCE; }
        if (this.x + this.r > canvas.width) { this.x = canvas.width - this.r; this.vx *= -BOUNCE; }

        // 床との衝突
        if (this.y + this.r > canvas.height) {
            this.y = canvas.height - this.r;
            this.vy *= -BOUNCE;
            this.vx *= 0.8;
            if (Math.abs(this.vy) < 0.5 && Math.abs(this.vx) < 0.5) this.isStatic = true;
        }

        // 他のジュエルとの簡易衝突・積み重なり判定
        for (let other of jewels) {
            if (other === this) continue;
            let dx = other.x - this.x;
            let dy = other.y - this.y;
            let dist = Math.hypot(dx, dy);
            let minDist = this.r + other.r;

            if (dist < minDist) {
                // 重なりを解消する方向に押し戻す
                let overlap = minDist - dist;
                let nx = dx / dist;
                let ny = dy / dist;

                this.x -= nx * overlap * 0.5;
                this.y -= ny * overlap * 0.5;

                // 速度の反射
                this.vy *= -BOUNCE;
                this.vx *= -BOUNCE;

                if (other.isStatic && Math.abs(this.vy) < 1) {
                    this.isStatic = true;
                }
            }
        }
    }

    draw() {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = jewelColors[this.colorIdx].hex;

        // グラデーションで宝石の立体感を表現
        let grad = ctx.createRadialGradient(this.x - 4, this.y - 4, 2, this.x, this.y, this.r);
        grad.addColorStop(0, jewelColors[this.colorIdx].glow);
        grad.addColorStop(1, jewelColors[this.colorIdx].hex);

        ctx.fillStyle = grad;
        ctx.beginPath();
        // 綺麗な円ではなく、あえて少し角のあるカット宝石風に描画
        for (let i = 0; i < 6; i++) {
            let angle = (i * Math.PI) / 3;
            let jx = this.x + Math.cos(angle) * this.r;
            let jy = this.y + Math.sin(angle) * this.r;
            if (i === 0) ctx.moveTo(jx, jy);
            else ctx.lineTo(jx, jy);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }
}

// 派手な爆発エフェクト
class Particle {
    constructor(x, y, colorHex) {
        this.x = x; this.y = y;
        this.radius = Math.random() * 4 + 2;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.alpha = 1;
        this.color = colorHex;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.alpha -= 0.03;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// クリック、またはタップで落とす
function dropJewel(clientX) {
    if (isGameOver) return;

    // キャンバス上の相対座標を取得
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    let targetX = (clientX - rect.left) * scaleX;

    // 画面外に出ていかないようガード
    if (targetX < 16) targetX = 16;
    if (targetX > canvas.width - 16) targetX = canvas.width - 16;

    // ジュエルを一番上から投下
    jewels.push(new Jewel(targetX, 30, nextColorIndex));

    // 次の色を決定
    nextColorIndex = Math.floor(Math.random() * jewelColors.length);
}

// 連鎖・消去のコアロジック（再帰アルゴリズム）
function checkMatches() {
    let matchedAny = false;

    // 静止したジュエルだけで判定
    for (let i = 0; i < jewels.length; i++) {
        if (jewels[i].toRemove) continue;

        let connected = [];
        findConnected(jewels[i], jewels[i].colorIdx, connected);

        // 3つ以上繋がっていたら爆破フラグを立てる
        if (connected.length >= 3) {
            matchedAny = true;
            currentCombo++;
            
            connected.forEach(j => {
                j.toRemove = true;
                // 爆発の破片を生成
                for (let k = 0; k < 8; k++) {
                    particles.push(new Particle(j.x, j.y, jewelColors[j.colorIdx].hex));
                }
            });

            // スコア計算（連鎖するほど超インフレするボーナス）
            score += connected.length * 10 * currentCombo;
            document.getElementById('score-val').innerText = score;

            // コンボ演出テキスト
            let alertBox = document.getElementById('combo-alert');
            alertBox.innerText = `${currentCombo} CHAIN💥`;
            setTimeout(() => { if(alertBox.innerText.includes(currentCombo)) alertBox.innerText = ''; }, 1500);
        }
    }

    // フラグが立ったジュエルを削除
    if (matchedAny) {
        jewels = jewels.filter(j => !j.toRemove);
        // 消えたら上のジュエルが落ちるので、もう一度物理を動かす
        jewels.forEach(j => j.isStatic = false);
    } else {
        // 連鎖が止まったらコンボ数をリセット（自分で落とした時用）
        let allStatic = jewels.every(j => j.isStatic);
        if (allStatic) currentCombo = 0;
    }
}

// 近くにある同じ色のジュエルを芋づる式に探す（深さ優先探索）
function findConnected(current, colorIdx, connected) {
    if (connected.includes(current)) return;
    connected.push(current);

    for (let other of jewels) {
        if (other === current || other.colorIdx !== colorIdx || other.toRemove) continue;
        let dist = Math.hypot(other.x - current.x, other.y - current.y);
        // ジュエル同士が接触しているか（判定を少し甘くしてつながりやすく）
        if (dist <= (current.r + other.r) + 5) {
            findConnected(other, colorIdx, connected);
        }
    }
}

function checkGameOver() {
    // 画面の上（y=80以下）に変な塊が静止し続けたらゲームオーバー
    let pileUpCount = 0;
    for (let j of jewels) {
        if (j.isStatic && j.y < 90) {
            pileUpCount++;
            if (pileUpCount > 2) {
                isGameOver = true;
                document.getElementById('final-score-val').innerText = score;
                document.getElementById('gameover-overlay').style.display = 'flex';
                break;
            }
        }
    }
}

function resetGame() {
    score = 0;
    currentCombo = 0;
    jewels = [];
    particles = [];
    isGameOver = false;
    document.getElementById('score-val').innerText = score;
    document.getElementById('combo-alert').innerText = '';
    document.getElementById('gameover-overlay').style.display = 'none';
}

function update() {
    // 物理アップデート
    jewels.forEach(j => j.update());
    particles.forEach((p, idx) => {
        p.update();
        if (p.alpha <= 0) particles.splice(idx, 1);
    });

    // マッチングとゲームオーバー判定
    checkMatches();
    checkGameOver();

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // デッドライン（警告線）の描画
    ctx.strokeStyle = 'rgba(255, 23, 68, 0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.moveTo(0, 90); ctx.lineTo(canvas.width, 90); ctx.stroke();
    ctx.setLineDash([]);

    // オブジェクト描画
    jewels.forEach(j => j.draw());
    particles.forEach(p => p.draw());

    // 次に落ちる色のガイドライン（画面最上部にうっすら表示）
    ctx.fillStyle = jewelColors[nextColorIndex].hex;
    ctx.globalAlpha = 0.2;
    ctx.fillRect(0, 0, canvas.width, 10);
    ctx.globalAlpha = 1.0;
}

// 📱 タッチ＆マウスイベント登録
window.addEventListener('mousedown', e => {
    if (e.target.id === 'gameCanvas') dropJewel(e.clientX);
});
window.addEventListener('touchstart', e => {
    if (e.target.id === 'gameCanvas' && e.touches.length > 0) {
        dropJewel(e.touches[0].clientX);
    }
}, { passive: true });

// 始動
resetGame();
update();
</script>
</body>
</html>
