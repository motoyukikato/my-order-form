<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>見本市注文アプリ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 80px; background: #f4f4f4; color: #333; }
        header { background: #fff; text-align: center; padding: 15px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .page-section { display: none; padding: 20px; min-height: 80vh; }
        .active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .item-card { background: #fff; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
        .btn-blue { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .btn-scan { padding: 20px; background: #3b5998; color: white; border: none; border-radius: 10px; width: 100%; font-size: 18px; margin-top: 10px; }
        .footer-menu { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; }
        .footer-menu button { background: none; border: none; color: #888; font-size: 11px; flex: 1; cursor: pointer; }
        .footer-menu button i { font-size: 24px; display: block; margin-bottom: 4px; }
        .footer-menu button.active-menu { color: #3b5998; font-weight: bold; }
        #send-btn { background-color: #28a745; color: white; border: none; width: 100%; padding: 15px; font-size: 18px; border-radius: 10px; margin-top: 20px; }
        #send-btn:disabled { background-color: #ccc; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 5px; padding: 10px; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

<header><div style="font-size: 1.2em; font-weight: bold;">見本市注文アプリ</div></header>

<section id="home" class="page-section active">
    <h2 style="text-align: center;">顧客情報</h2>
    <div class="card" id="cust-display">
        <div id="cust-loading" style="text-align:center; color:#ccc; padding: 20px;">検索またはスキャンしてください</div>
        <div id="cust-data" style="display:none;">
            <b id="res-customer" style="font-size: 1.2em; color: #3b5998;"></b><br>
            <span id="res-address1"></span><br>
            <span id="res-address2"></span><br>
            TEL: <span id="res-tel"></span><br>
            <span id="res-email"></span>
        </div>
    </div>
    <div class="card">
        <input type="tel" id="cust-manual-input" placeholder="電話番号を入力" style="width: 60%; padding: 10px;">
        <button class="btn-blue" onclick="handleCustomerManualSearch()">検索</button>
    </div>
    <button class="btn-scan" onclick="handleCustomerScan()" style="background: #28a745;"><i class="fa-solid fa-qrcode"></i> 顧客スキャン</button>
</section>

<section id="barcode" class="page-section">
    <h2>スキャン</h2>
    <div class="card" style="text-align: center;">
        <button class="btn-scan" onclick="handleScan()"><i class="fa-solid fa-barcode"></i> 商品スキャン開始</button>
    </div>
</section>

<section id="input" class="page-section">
    <h2>品番入力</h2>
    <div class="card">
        <input type="text" id="manual-id" placeholder="品番を入力" style="width: 60%; padding: 10px;">
        <button class="btn-blue" onclick="handleManualSearch()">追加</button>
    </div>
</section>

<section id="cart" class="page-section">
    <h2>注文カート</h2>
    <div id="cart-list"><p style="text-align: center;">空です</p></div>
    
    <div class="card">
        <p style="font-weight: bold;">備考欄（コメント）：</p>
        <textarea id="order-comment" rows="3" placeholder="納期指定などあれば入力してください"></textarea>
    </div>

    <button id="send-btn" onclick="sendOrder()">🛒 注文を確定する</button>
</section>

<nav class="footer-menu">
    <button onclick="showPage('home')" id="nav-home" class="active-menu"><i class="fa-solid fa-house"></i>ホーム</button>
    <button onclick="showPage('barcode')" id="nav-barcode"><i class="fa-solid fa-camera"></i>スキャン</button>
    <button onclick="showPage('input')" id="nav-input"><i class="fa-solid fa-keyboard"></i>入力</button>
    <button onclick="showPage('cart')" id="nav-cart"><i class="fa-solid fa-cart-shopping"></i>カート</button>
</nav>

<script>
    // URL設定
    const SEARCH_URL = "https://default9b258ec3f0904041bdcf3f8e9c128b.4f.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e251147543764915b5e738754e6c8116/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=TowxosK6T9X4qf8OE_FzC45ns9RLytXJgo3c8gOEi6Q";
    const ORDER_URL = "https://default9b258ec3f0904041bdcf3f8e9c128b.4f.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2a103696f19b42f685e940c3f0bdab05/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=TuEWCx-Z2Grf6fep1ZQtUXF762w8NZbPJUAS8XxIod4";
    const CUSTOMER_SEARCH_URL = "https://default9b258ec3f0904041bdcf3f8e9c128b.4f.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/bf9ccef62dad43c1a887216f81d0b97e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=nlGwH-lBbA8F835qzaRsd7Spy5XM0tOncMVAD4GOuBE"; 
    
    let cart = [];

    // LIFF初期化
    liff.init({ liffId: "2008942151-HVIKLBVG" });

    // ページ切り替え
    function showPage(pageId) {
        document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.footer-menu button').forEach(btn => btn.classList.remove('active-menu'));
        document.getElementById('nav-' + pageId).classList.add('active-menu');
    }

    // 顧客検索
    async function handleCustomerManualSearch() {
        const val = document.getElementById('cust-manual-input').value.trim();
        if (val) await fetchCustomerData(val);
    }

    async function handleCustomerScan() {
        liff.scanCodeV2().then(result => { if (result.value) fetchCustomerData(result.value); });
    }

    async function fetchCustomerData(val) {
        try {
            const res = await fetch(CUSTOMER_SEARCH_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ jan: val })
            });
            const data = await res.json();
            if (data.customer) {
                document.getElementById("res-customer").innerText = data.customer;
                document.getElementById("res-address1").innerText = data.address1 || "";
                document.getElementById("res-address2").innerText = data.address2 || "";
                document.getElementById("res-tel").innerText = data.tel || "";
                document.getElementById("res-email").innerText = data.email || "";
                document.getElementById("cust-loading").style.display = "none";
                document.getElementById("cust-data").style.display = "block";
            } else {
                alert("顧客データが見つかりませんでした。");
            }
        } catch (e) {
            alert("顧客検索でエラーが発生しました。");
        }
    }

    // 商品検索
    async function searchProduct(code) {
    try {
        const res = await fetch(SEARCH_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ jan: code })
        });
        const data = await res.json();

        if (data.items && data.items.length > 0) {
            const product = data.items[0]; 
            const itemLot = Number(product.lot) || 1; 

            cart.push({ 
                jan: product.jan || code,
                partNo: product.partNo || "品番なし",
                name: product.name,
                
                // --- 価格情報の追加 ---
                price: Number(product.price),      // 単価（下代）
                listPrice: Number(product.listPrice || 0), // ★上代を追加（プロパティ名はフロー側に合わせてください）
                
                quantity: itemLot,
                lot: itemLot,
                stock: product.stock 
            });
            updateCartUI();
            showPage('cart');
        } else {
            alert("商品が見つかりません");
        }
    } catch (e) {
        alert("検索エラーが発生しました");
    }
}

    async function handleScan() { liff.scanCodeV2().then(res => { if (res.value) searchProduct(res.value); }); }
    async function handleManualSearch() {
        const val = document.getElementById('manual-id').value.trim();
        if (val) { await searchProduct(val); document.getElementById('manual-id').value = ""; }
    }

    // カートUI更新
    function updateCartUI() {
        const list = document.getElementById('cart-list');
        if (cart.length === 0) { list.innerHTML = '<p style="text-align: center;">空です</p>'; return; }
        
        let total = 0;
        let html = cart.map((item, i) => {
            const subtotal = item.price * item.quantity;
            total += subtotal;
            return `
            <div class="item-card">
                <b>${item.name}</b><br>
                <small>品番: ${item.partNo}</small><br>
                <span style="font-size: 0.9em; color: ${item.stock < 10 ? 'red' : '#555'};">
                    在庫数: <b>${item.stock}</b>
                </span><br>
                単価: ${item.price.toLocaleString()}円 / ロット: ${item.lot}<br>
                数量: <input type="number" inputmode="numeric" min="${item.lot}" step="${item.lot}" value="${item.quantity}" onchange="updateQty(${i}, this.value)" style="width:60px; font-size: 16px;">
                <br><b>小計: ${subtotal.toLocaleString()}円</b>
                <button onclick="removeItem(${i})" style="color:red; float:right; border:none; background:none;">削除</button>
            </div>`;
        }).join('');
        
        html += `<div style="text-align:right; padding:10px; font-size:1.2em;"><b>合計金額: ${total.toLocaleString()}円</b></div>`;
        list.innerHTML = html;
    }

    function updateQty(i, q) { if (q > 0) { cart[i].quantity = parseInt(q); updateCartUI(); } }
    function removeItem(i) { cart.splice(i, 1); updateCartUI(); }

    // 注文送信
    async function sendOrder() {
        const customer = document.getElementById("res-customer").innerText;
        const email = document.getElementById("res-email").innerText.trim();

        if (!customer) return alert("顧客を選択してください");
        if (!email) return alert("顧客のメールアドレスが登録されていません。");
        if (cart.length === 0) return alert("カートが空です");

        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        btn.innerText = "送信中...";

        let totalAmount = 0;
        cart.forEach(item => totalAmount += (item.price * item.quantity));

        const requestData = { 
            customerName: customer,
            address1: document.getElementById("res-address1").innerText,
            address2: document.getElementById("res-address2").innerText,
            tel: document.getElementById("res-tel").innerText,
            email: email, 
            comment: document.getElementById("order-comment").value,
            items: cart.map(item => ({ 
                partNo: item.partNo, 
                jan: item.jan,                   
                name: item.name,  
                price: item.price,  
                quantity: String(item.quantity),
                subtotal: item.price * item.quantity,
                lot: String(item.lot),
                stock: String(item.stock || 0)
            })),
            total: totalAmount
        };

        try {
            const res = await fetch(ORDER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestData)
            });

            if (res.ok) { 
                alert("注文を送信しました"); 
                cart = []; 
                document.getElementById("order-comment").value = "";
                updateCartUI(); 
                document.getElementById("res-customer").innerText = "";
                document.getElementById("res-address1").innerText = "";
                document.getElementById("res-address2").innerText = "";
                document.getElementById("res-tel").innerText = "";
                document.getElementById("res-email").innerText = "";
                document.getElementById("cust-manual-input").value = ""; 
                document.getElementById("cust-data").style.display = "none";
                document.getElementById("cust-loading").style.display = "block";
                showPage('home'); 
            } else {
                alert("送信エラーが発生しました。");
            }
        } catch (err) { 
            alert("送信に失敗しました: " + err.message); 
        } finally { 
            btn.disabled = false; 
            btn.innerText = "🛒 注文を確定する"; 
        }
    }
</script>
</body>
</html>
