<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ・ご入力フォーム</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- お洒落な花屋の雰囲気に合わせて明朝体を読み込む -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* リセットCSS & 基本設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* 新しい背景設定：落ち着いた花屋・ドライフラワーの雰囲気 */
        body {
            font-family: 'Noto Serif JP', serif; /* 明朝体に変更して上品に */
            color: #4a4a4a;
            line-height: 1.6;
            padding: 40px 20px;
            position: relative;
            
            /* 背景画像の設定（落ち着いたボタニカル・ドライフラワーの画像） */
            background-image: url('https://images.unsplash.com/photo-1505934333218-8feea099cb61?q=80&w=1920&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 背景オーバーレイ（少し温かみのあるアイボリー系の半透明にして落ち着きを出す） */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(245, 245, 238, 0.75); /* やや強めのアイボリーホワイトのオーバーレイ */
            z-index: 0;
        }

        /* ページ全体のコンテナ */
        .page-container {
            max-width: 850px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ヘッダー・タイトル部分 */
        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .form-header h1 {
            font-size: 26px;
            color: #3b4238; /* 落ち着いたダークグリーン系 */
            font-weight: 500;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }
        /* タイトル下線を花屋らしいセージグリーンに */
        .form-header h1::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background-color: #8fa086; /* セージグリーン */
        }
        .form-header p {
            font-size: 14px;
            color: #6a6e67;
            letter-spacing: 0.05em;
        }

        /* フォームを囲むお洒落なカード */
        .form-card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 8px; /* 角丸を少し控えめにして大人っぽく */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); /* 柔らかい影 */
            overflow: hidden;
            padding: 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(143, 160, 134, 0.2); /* うっすらとグリーンの枠線 */
        }

        /* 埋め込みフォームのレスポンシブ対応ラッパー */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            min-height: 800px; 
        }
        .iframe-wrapper iframe {
            width: 100%;
            display: block;
            border: none;
        }

        /* フッター（戻るボタンなど） */
        .form-footer {
            text-align: center;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 35px;
            background-color: transparent;
            color: #6a6e67;
            border: 1px solid #8fa086;
            border-radius: 4px; /* 大人っぽい四角いボタン */
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: all 0.4s ease;
        }
        .btn-back:hover {
            background-color: #8fa086;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(143, 160, 134, 0.3);
        }

        /* スマホ向け調整 */
        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
                background-attachment: scroll;
            }
            .form-header h1 {
                font-size: 20px;
            }
            .form-card {
                padding: 10px;
                border-radius: 6px;
            }
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <header class="form-header">
            <h1>お問い合わせ・各種お申し込み</h1>
            <p>以下のフォームに必要事項をご記入の上、送信してください。</p>
        </header>

        <main class="form-card">
            <div class="iframe-wrapper">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfsQzHGi48GS5yGHAiAiAvcQIC98uoh9hP4v1N5CaP_is_RQw/viewform?embedded=true" 
                        width="100%" 
                        height="4134" 
                        frameborder="0" 
                        marginheight="0" 
                        marginwidth="0">読み込んでいます…</iframe>
            </div>
        </main>

        <footer class="form-footer">
            <a href="#" class="btn-back">ホームへ戻る</a>
        </footer>

    </div>

</body>
</html>
