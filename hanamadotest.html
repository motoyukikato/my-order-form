<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ・各種お申し込み</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* 基本リセット */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* スマホに最適化したベースデザイン */
        /* 画像の読み込みバグを完全に防ぐため、高品質な配色でお洒落な花屋の雰囲気を表現します */
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #f7f5f0; /* 落ち着いたリネン・生成り色 */
            color: #3c423a; /* 植物を連想させる深いニュアンスグリーングレー */
            line-height: 1.8;
            padding: 0;
        }

        /* ページ全体のコンテナ（スマホの縦長画面に最適化） */
        .page-container {
            width: 100%;
            max-width: 540px; /* スマホで最も美しく収まる横幅 */
            margin: 0 auto;
            padding: 40px 0 60px 0; /* 左右の余白はあえて0にしてフォームを広げます */
        }

        /* ヘッダー部分：SNSのプロフィールから飛んだようなお洒落な洋風サロン感 */
        .form-header {
            text-align: center;
            padding: 0 24px;
            margin-bottom: 30px;
        }
        
        /* 植物のモチーフの代わりに、細く繊細な飾り線をCSSで表現 */
        .form-header .flower-icon {
            font-size: 18px;
            color: #92a18d; /* セージグリーン */
            margin-bottom: 10px;
            letter-spacing: 0.2em;
        }
        
        .form-header h1 {
            font-size: 20px; /* スマホで綺麗に収まるサイズ */
            font-weight: 400;
            letter-spacing: 0.12em; /* 文字の間隔を広げてお洒落に */
            color: #2b3029;
            margin-bottom: 12px;
        }
        
        .form-header p {
            font-size: 13px;
            color: #70776d;
            letter-spacing: 0.05em;
            font-weight: 300;
        }

        /* フォームを囲むエリア（スマホの画面幅いっぱいに広げて、入力しやすく） */
        .form-card {
            background-color: #ffffff;
            border-top: 3px solid #92a18d; /* 上部にだけ花屋らしいグリーンのアクセントライン */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); /* スマホで重くならない軽い影 */
            padding: 10px 0; /* フォームの左右の余白を極限まで削り、スマホでの誤タップを防ぐ */
            margin-bottom: 40px;
        }

        /* Googleフォームの埋め込みラッパー */
        .iframe-wrapper {
            width: 100%;
            /* フォームが非常に長いためスクロールを滑らかに */
            -webkit-overflow-scrolling: touch; 
        }
        .iframe-wrapper iframe {
            width: 100%;
            display: block;
            border: none;
        }

        /* フッター（スマホの親指で押しやすいボタン） */
        .form-footer {
            text-align: center;
            padding: 0 24px;
        }
        .btn-back {
            display: block; /* 画面幅に合わせた押しやすいボタンに */
            max-width: 200px;
            margin: 0 auto;
            padding: 14px 0;
            background-color: transparent;
            color: #5c6358;
            border: 1px solid #92a18d;
            border-radius: 0; /* あえて角を丸めず、洗練されたアンティーク感を出す */
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }
        /* タップしたときの反応 */
        .btn-back:active {
            background-color: #92a18d;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <header class="form-header">
            <div class="flower-icon">◇ <span>Botanical</span> ◇</div>
            <h1>Contact Form</h1>
            <p>必要事項をご記入の上、送信してください</p>
        </header>

        <main class="form-card">
            <div class="iframe-wrapper">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfsQzHGi48GS5yGHAiAiAvcQIC98uoh9hP4v1N5CaP_is_RQw/viewform?embedded=true" 
                        width="100%" 
                        height="4134" 
                        frameborder="0" 
                        marginheight="0" 
                        marginwidth="0">読み込んでいます…</iframe>
            </div>
        </main>

        <footer class="form-footer">
            <a href="#" class="btn-back">ホームへ戻る</a>
        </footer>

    </div>

</body>
</html>
