<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ・ご入力フォーム</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* リセットCSS & 基本設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* 背景の設定（フィルターと画像を一体化して表示バグを防ぐ） */
        body {
            font-family: 'Noto Serif JP', serif;
            color: #4a4a4a;
            line-height: 1.6;
            padding: 40px 20px;
            
            /* 画像が読み込めなかった場合の予備カラー */
            background-color: #d8ded4;
            
            /* 半透明のアイボリー色と、花屋風の画像を重ねて指定 */
            background-image: 
                linear-gradient(rgba(245, 245, 238, 0.7), rgba(245, 245, 238, 0.7)),
                url('https://images.unsplash.com/photo-1526047932273-341f2a7631f9?q=80&w=1920&auto=format&fit=crop'); 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* ページ全体のコンテナ */
        .page-container {
            max-width: 850px;
            margin: 0 auto;
        }

        /* ヘッダー・タイトル部分 */
        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .form-header h1 {
            font-size: 26px;
            color: #3b4238; 
            font-weight: 500;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }
        .form-header h1::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background-color: #8fa086; 
        }
        .form-header p {
            font-size: 14px;
            color: #6a6e67;
            letter-spacing: 0.05em;
        }

        /* フォームを囲むお洒落なカード */
        .form-card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); 
            overflow: hidden;
            padding: 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(143, 160, 134, 0.2); 
        }

        /* 埋め込みフォームのレスポンシブ対応ラッパー */
        .iframe-wrapper {
            width: 100%;
            min-height: 800px; 
        }
        .iframe-wrapper iframe {
            width: 100%;
            display: block;
            border: none;
        }

        /* フッター（戻るボタンなど） */
        .form-footer {
            text-align: center;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 35px;
            background-color: transparent;
            color: #6a6e67;
            border: 1px solid #8fa086;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: all 0.4s ease;
        }
        .btn-back:hover {
            background-color: #8fa086;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(143, 160, 134, 0.3);
        }

        /* スマホ向け調整 */
        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
                background-attachment: scroll;
            }
            .form-header h1 {
                font-size: 20px;
            }
            .form-card {
                padding: 10px;
                border-radius: 6px;
            }
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <header class="form-header">
            <h1>お問い合わせ・各種お申し込み</h1>
            <p>以下のフォームに必要事項をご記入の上、送信してください。</p>
        </header>

        <main class="form-card">
            <div class="iframe-wrapper">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfsQzHGi48GS5yGHAiAiAvcQIC98uoh9hP4v1N5CaP_is_RQw/viewform?embedded=true" 
                        width="100%" 
                        height="4134" 
                        frameborder="0" 
                        marginheight="0" 
                        marginwidth="0">読み込んでいます…</iframe>
            </div>
        </main>

        <footer class="form-footer">
            <a href="#" class="btn-back">ホームへ戻る</a>
        </footer>

    </div>

</body>
</html>
