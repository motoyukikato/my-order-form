<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puyo Pac-Man - Control Edition</title>
    <style>
        body {
            background: #2b1055;
            background-image: radial-gradient(#51279b 20%, transparent 20%), radial-gradient(#51279b 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: #fff;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        /* --- コントロールパネル（リスタート・一時停止） --- */
        #control-panel {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            z-index: 5;
        }
        .panel-btn {
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 8px;
            border: 2px solid #fff;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .panel-btn:active {
            transform: translateY(2px);
            box-shadow: none !important;
        }
        #btn-restart {
            background: #ff1744;
            box-shadow: 0 3px 0 #b30000;
        }
        #btn-pause {
            background: #ff9100;
            box-shadow: 0 3px 0 #b36600;
        }

        #info-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 340px;
            margin-bottom: 5px;
            font-size: 18px;
            font-weight: bold;
            color: #ffeb3b;
            text-shadow: 1px 1px 2px #000;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #ffd700;
            background-color: rgba(20, 10, 40, 0.9);
        }
        canvas {
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
        }
        #clear-overlay { background: rgba(0, 230, 118, 0.9); }
        #gameover-overlay { background: rgba(255, 64, 129, 0.9); }
        #pause-overlay { background: rgba(43, 16, 85, 0.85); cursor: default; }
        
        .overlay-title {
            font-size: 36px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #2b1055;
            animation: bounce 0.5s infinite alternate;
        }
        .overlay-btn {
            font-size: 18px;
            margin-top: 15px;
            background: #2b1055;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 0 #000;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        #controls {
            display: none;
            width: 100%;
            max-width: 240px;
            margin-top: 15px;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 5px;
            box-sizing: border-box;
        }
        .ctrl-btn {
            background: #ff4081;
            border: 3px solid #fff;
            color: #fff;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 4px 0 #c2185b;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        #btn-up { grid-column: 2; background: #00b0ff; box-shadow: 0 4px 0 #0091ea; }
        #btn-left { grid-column: 1; }
        #btn-right { grid-column: 3; }
        #btn-down { grid-column: 2; }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="panel-btn" id="btn-restart">さいしょから</div>
        <div class="panel-btn" id="btn-pause">いちじていし</div>
    </div>

    <div id="info-bar">
        <div>SCORE: <span id="score-val">0</span></div>
        <div id="mode-status" style="color: #00e676;">エサをあつめろ！</div>
    </div>

    <div id="game-container">
        <canvas id="mazeCanvas"></canvas>
        
        <div id="clear-overlay" class="overlay" onclick="nextStage()">
            <div class="overlay-title">ぱーふぇくと！</div>
            <div class="overlay-btn">つぎのステージへ</div>
        </div>

        <div id="gameover-overlay" class="overlay" onclick="restartStage()">
            <div class="overlay-title">ばたんきゅー</div>
            <div class="overlay-btn">もういちど挑戦！</div>
        </div>

        <div id="pause-overlay" class="overlay">
            <div class="overlay-title" style="color: #ff9100; animation: none;">ぽーず中</div>
            <div class="overlay-btn" onclick="togglePause()">ゲームを再開する</div>
        </div>
    </div>

    <div id="controls">
        <div class="ctrl-btn" id="btn-up">↑</div>
        <div class="ctrl-btn" id="btn-left">←</div>
        <div></div>
        <div class="ctrl-btn" id="btn-right">→</div>
        <div class="ctrl-btn" id="btn-down">↓</div>
    </div>

<script>
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');

const MAZE_SIZE = 15; 
const TILE_SIZE = 24; 
canvas.width = MAZE_SIZE * TILE_SIZE;
canvas.height = MAZE_SIZE * TILE_SIZE;

const colors = {
    wall: '#cc33ff',       
    path: 'rgba(20, 10, 40, 0.6)', 
    player: '#33ccff',     
    enemyNormal: '#ff3366', 
    enemyScared: '#2979ff', 
    dot: '#ffeb3b',        
    powerDot: '#00e676'    
};

let maze = [];       
let dotGrid = [];    
let player = { x: 1, y: 1 };
let enemies = [];
let score = 0;
let isGameOver = false;
let isPaused = false; // 【新設】一時停止のフラグ

let enemyTimer = null;
let powerModeTimer = null;
let isPowerMode = false;
let powerRemainingTime = 0; // 【新設】一時停止時に無敵の残り時間を記憶する用

// --- 迷路とエサの自動配置 ---
function generateMaze() {
    maze = [];
    dotGrid = [];
    for (let y = 0; y < MAZE_SIZE; y++) {
        maze.push(new Array(MAZE_SIZE).fill(1));
        dotGrid.push(new Array(MAZE_SIZE).fill(0));
    }
    maze[1][1] = 0;
    dig(1, 1);

    for (let y = 0; y < MAZE_SIZE; y++) {
        for (let x = 0; x < MAZE_SIZE; x++) {
            if (maze[y][x] === 0) {
                dotGrid[y][x] = 1; 
            }
        }
    }
    dotGrid[1][1] = 0;

    const powerPos = [{x:1, y:MAZE_SIZE-2}, {x:MAZE_SIZE-2, y:1}, {x:MAZE_SIZE-2, y:MAZE_SIZE-2}];
    powerPos.forEach(p => {
        if(maze[p.y][p.x] === 0) dotGrid[p.y][p.x] = 2;
    });

    enemies = [
        { x: MAZE_SIZE - 2, y: 1, lastDx: 0, lastDy: 0, isDead: false },
        { x: 1, y: MAZE_SIZE - 2, lastDx: 0, lastDy: 0, isDead: false }
    ];
    enemies.forEach(e => maze[e.y][e.x] = 0);
}

function dig(x, y) {
    const dirs = [{dx:0, dy:-2}, {dx:0, dy:2}, {dx:-2, dy:0}, {dx:2, dy:0}].sort(() => Math.random() - 0.5);
    for (let dir of dirs) {
        const nx = x + dir.dx; const ny = y + dir.dy;
        if (nx > 0 && nx < MAZE_SIZE - 1 && ny > 0 && ny < MAZE_SIZE - 1) {
            if (maze[ny][nx] === 1) {
                maze[y + dir.dy / 2][x + dir.dx / 2] = 0;
                maze[ny][nx] = 0;
                dig(nx, ny);
            }
        }
    }
}

// --- キャラクターやエサの描画 ---
function drawPuyo(x, y, colorStr, hasEyes) {
    const px = x * TILE_SIZE + TILE_SIZE / 2;
    const py = y * TILE_SIZE + TILE_SIZE / 2;
    const r = TILE_SIZE * 0.46;

    ctx.save(); ctx.translate(px, py);
    ctx.beginPath(); ctx.fillStyle = colorStr; ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

    if (hasEyes) {
        const eyeOffset = r * 0.35; const eyeRadius = r * 0.28;
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-eyeOffset, -r*0.05, eyeRadius, 0, Math.PI * 2); ctx.arc(eyeOffset, -r*0.05, eyeRadius, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-eyeOffset + r*0.05, -r*0.05, r*0.14, 0, Math.PI * 2); ctx.arc(eyeOffset - r*0.05, -r*0.05, r*0.14, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; ctx.beginPath(); ctx.arc(0, -r*0.4, r*0.2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < MAZE_SIZE; y++) {
        for (let x = 0; x < MAZE_SIZE; x++) {
            if (maze[y][x] === 1) {
                drawPuyo(x, y, colors.wall, false);
            } else {
                ctx.fillStyle = colors.path;
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);

                if (dotGrid[y][x] === 1) { 
                    ctx.fillStyle = colors.dot;
                    ctx.beginPath(); ctx.arc(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, 4, 0, Math.PI * 2); ctx.fill();
                } else if (dotGrid[y][x] === 2) { 
                    ctx.fillStyle = colors.powerDot;
                    ctx.beginPath(); ctx.arc(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, 8, 0, Math.PI * 2); ctx.fill();
                }
            }
        }
    }

    enemies.forEach(e => {
        if (e.isDead) return; 
        let enemyColor = isPowerMode ? colors.enemyScared : colors.enemyNormal;
        drawPuyo(e.x, e.y, enemyColor, true);
    });

    drawPuyo(player.x, player.y, colors.player, true);
}

// --- おばけのウロウロAI ---
function updateEnemies() {
    if (isGameOver || isPaused) return; // 一時停止中なら動かない

    enemies.forEach(e => {
        if (e.isDead) return;

        const possibleMoves = [];
        const dirs = [{dx:0, dy:-1}, {dx:0, dy:1}, {dx:-1, dy:0}, {dx:1, dy:0}];

        dirs.forEach(d => {
            const nx = e.x + d.dx; const ny = e.y + d.dy;
            if (maze[ny] && maze[ny][nx] === 0) possibleMoves.push(d);
        });

        if (possibleMoves.length > 0) {
            let move = possibleMoves.find(m => m.dx === e.lastDx && m.dy === e.lastDy);
            if (!move || Math.random() < 0.25) {
                move = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
            }
            e.x += move.dx; e.y += move.dy;
            e.lastDx = move.dx; e.lastDy = move.dy;
        }
    });

    draw();
    checkCollision();
}

// --- プレイヤーの移動とパクパク判定 ---
function movePlayer(dx, dy) {
    if (isGameOver || isPaused) return; // 一時停止中なら動かない

    const nextX = player.x + dx; const nextY = player.y + dy;

    if (maze[nextY] && maze[nextY][nextX] === 0) {
        player.x = nextX; player.y = nextY;

        if (dotGrid[player.y][player.x] === 1) {
            dotGrid[player.y][player.x] = 0;
            score += 10;
            updateScoreDisplay();
        } 
        else if (dotGrid[player.y][player.x] === 2) {
            dotGrid[player.y][player.x] = 0;
            score += 50;
            updateScoreDisplay();
            activatePowerMode(7000); // 7秒間無敵
        }

        draw();
        checkCollision();
        checkStageClear();
    }
}

// --- パワーモード（形勢逆転！）の処理 ---
function activatePowerMode(duration) {
    isPowerMode = true;
    document.getElementById('mode-status').innerText = "おばけをやっつけろ！";
    document.getElementById('mode-status').style.color = '#ffeb3b';

    clearTimeout(powerModeTimer);
    
    // タイマー開始時間を記録（ポーズ時の計算用）
    powerModeStartTime = Date.now();
    powerRemainingTime = duration;

    powerModeTimer = setTimeout(() => {
        isPowerMode = false;
        powerRemainingTime = 0;
        document.getElementById('mode-status').innerText = "エサをあつめろ！";
        document.getElementById('mode-status').style.color = '#00e676';
        draw();
    }, duration);
}

// --- 【新設】一時停止（ポーズ）の切り替え ---
function togglePause() {
    if (isGameOver) return;

    const pauseOverlay = document.getElementById('pause-overlay');
    const pauseBtn = document.getElementById('btn-pause');

    if (!isPaused) {
        // --- 一時停止するとき ---
        isPaused = true;
        clearInterval(enemyTimer); // おばけの動きをストップ
        pauseOverlay.style.display = 'flex';
        pauseBtn.innerText = "つづける";
        pauseBtn.style.background = '#00e676';
        pauseBtn.style.boxShadow = '0 3px 0 #00c853';

        // パワーモード中の場合は、残り時間を計算してタイマーを止める
        if (isPowerMode) {
            clearTimeout(powerModeTimer);
            const elapsed = Date.now() - powerModeStartTime;
            powerRemainingTime = Math.max(0, powerRemainingTime - elapsed);
        }
    } else {
        // --- 再開するとき ---
        isPaused = false;
        pauseOverlay.style.display = 'none';
        pauseBtn.innerText = "いちじていし";
        pauseBtn.style.background = '#ff9100';
        pauseBtn.style.boxShadow = '0 3px 0 #b36600';

        // おばけの動きを再開
        enemyTimer = setInterval(updateEnemies, 380);

        // パワーモード中だった場合は残り時間でタイマーを再開
        if (isPowerMode && powerRemainingTime > 0) {
            activatePowerMode(powerRemainingTime);
        }
    }
}

// --- 衝突判定 ---
function checkCollision() {
    enemies.forEach(e => {
        if (e.isDead) return;

        if (e.x === player.x && e.y === player.y) {
            if (isPowerMode) {
                e.isDead = true;
                score += 200;
                updateScoreDisplay();
                
                setTimeout(() => {
                    e.isDead = false;
                    e.x = (e.lastDx === 0) ? MAZE_SIZE - 2 : 1; 
                    draw();
                }, 4000);
            } else {
                isGameOver = true;
                clearInterval(enemyTimer);
                clearTimeout(powerModeTimer);
                document.getElementById('gameover-overlay').style.display = 'flex';
            }
        }
    });
}

function checkStageClear() {
    let hasDots = false;
    for (let y = 0; y < MAZE_SIZE; y++) {
        if (dotGrid[y].includes(1) || dotGrid[y].includes(2)) {
            hasDots = true;
            break;
        }
    }

    if (!hasDots) {
        isGameOver = true;
        clearInterval(enemyTimer);
        clearTimeout(powerModeTimer);
        document.getElementById('clear-overlay').style.display = 'flex';
    }
}

function updateScoreDisplay() {
    document.getElementById('score-val').innerText = score;
}

// --- ゲームループ管理 ---
function startGameLoop() {
    isGameOver = false;
    isPaused = false;
    isPowerMode = false;
    powerRemainingTime = 0;
    document.getElementById('pause-overlay').style.display = 'none';
    document.getElementById('btn-pause').innerText = "いちじていし";
    document.getElementById('btn-pause').style.background = '#ff9100';
    document.getElementById('btn-pause').style.boxShadow = '0 3px 0 #b36600';
    document.getElementById('mode-status').innerText = "エサをあつめろ！";
    document.getElementById('mode-status').style.color = '#00e676';
    
    clearInterval(enemyTimer);
    enemyTimer = setInterval(updateEnemies, 380); 
}

function nextStage() {
    document.getElementById('clear-overlay').style.display = 'none';
    player = { x: 1, y: 1 };
    generateMaze();
    draw();
    startGameLoop();
}

function restartStage() {
    document.getElementById('gameover-overlay').style.display = 'none';
    score = 0;
    updateScoreDisplay();
    player = { x: 1, y: 1 };
    generateMaze();
    draw();
    startGameLoop();
}

// --- 【新設】上部管理ボタンの設定 ---
function setupAdminButtons() {
    const restartBtn = document.getElementById('btn-restart');
    const pauseBtn = document.getElementById('btn-pause');

    const handleRestart = () => {
        if(confirm("ゲームを最初からやりなおしますか？")) {
            restartStage();
        }
    };

    if ('ontouchstart' in window) {
        restartBtn.addEventListener('touchstart', e => { e.preventDefault(); handleRestart(); });
        pauseBtn.addEventListener('touchstart', e => { e.preventDefault(); togglePause(); });
    } else {
        restartBtn.addEventListener('click', handleRestart);
        pauseBtn.addEventListener('click', togglePause);
    }
}

// --- コントローラー ---
document.addEventListener('keydown', event => {
    if (event.key === 'p' || event.key === 'P' || event.key === 'Escape') togglePause();
    
    if (event.key === 'ArrowUp' || event.key === 'w') movePlayer(0, -1);
    else if (event.key === 'ArrowDown' || event.key === 's') movePlayer(0, 1);
    else if (event.key === 'ArrowLeft' || event.key === 'a') movePlayer(-1, 0);
    else if (event.key === 'ArrowRight' || event.key === 'd') movePlayer(1, 0);
});

const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (isTouchDevice) {
    document.getElementById('controls').style.display = 'grid';
    document.body.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
    
    let lastTouchEnd = 0;
    document.addEventListener('touchend', event => {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) event.preventDefault();
        lastTouchEnd = now;
    }, false);

    const setupBtn = (id, action) => {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', e => { e.preventDefault(); action(); });
    };
    setupBtn('btn-up', () => movePlayer(0, -1));
    setupBtn('btn-left', () => movePlayer(-1, 0));
    setupBtn('btn-right', () => movePlayer(1, 0));
    setupBtn('btn-down', () => movePlayer(0, 1));
}

// 初期起動
setupAdminButtons();
generateMaze();
draw();
startGameLoop();
</script>
</body>
</html>
