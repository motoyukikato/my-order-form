<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puyo Pop Maze - Custom Edition</title>
    <style>
        body {
            background: #2b1055;
            background-image: radial-gradient(#51279b 20%, transparent 20%), radial-gradient(#51279b 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: #fff;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        h1 {
            font-size: 22px;
            margin: 5px 0;
            color: #ffeb3b;
            text-shadow: 2px 2px 0px #ff4081;
        }

        /* --- 【新設】設定コントロールパネル --- */
        #config-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 5;
        }
        .config-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .config-label {
            font-size: 11px;
            color: #ffeb3b;
            font-weight: bold;
        }
        .config-btn {
            background: #00e676;
            border: 2px solid #fff;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 10px;
            box-shadow: 0 3px 0 #00c853;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .config-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        /* レベルボタンは青色に */
        #btn-config-level {
            background: #00b0ff;
            box-shadow: 0 3px 0 #0091ea;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #ffd700;
            background-color: rgba(20, 10, 40, 0.9);
        }
        canvas {
            display: block;
        }
        
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
        }
        #clear-overlay { background: rgba(0, 230, 118, 0.9); }
        #gameover-overlay { background: rgba(255, 64, 129, 0.9); }
        
        .overlay-title {
            font-size: 36px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #2b1055;
            animation: bounce 0.5s infinite alternate;
        }
        .overlay-btn {
            font-size: 18px;
            margin-top: 15px;
            background: #2b1055;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 0 #000;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        #controls {
            display: none;
            width: 100%;
            max-width: 240px;
            margin-top: 15px;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 5px;
            box-sizing: border-box;
        }
        .ctrl-btn {
            background: #ff4081;
            border: 3px solid #fff;
            color: #fff;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 4px 0 #c2185b;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        #btn-up { grid-column: 2; background: #00b0ff; box-shadow: 0 4px 0 #0091ea; }
        #btn-left { grid-column: 1; }
        #btn-right { grid-column: 3; }
        #btn-down { grid-column: 2; }
    </style>
</head>
<body>

    <h1>カスタマイズ・めいろゲーム</h1>

    <div id="config-panel">
        <div class="config-group">
            <span class="config-label">てきの数</span>
            <div class="config-btn" id="btn-config-count">2ひき</div>
        </div>
        <div class="config-group">
            <span class="config-label">てきの強さ</span>
            <div class="config-btn" id="btn-config-level">ふつう</div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="mazeCanvas"></canvas>
        
        <div id="clear-overlay" class="overlay" onclick="nextStage()">
            <div class="overlay-title">くりあ！</div>
            <div class="overlay-btn">つぎのステージへ</div>
        </div>

        <div id="gameover-overlay" class="overlay" onclick="restartStage()">
            <div class="overlay-title">ばたんきゅー</div>
            <div class="overlay-btn">もういちど挑戦！</div>
        </div>
    </div>

    <div id="controls">
        <div class="ctrl-btn" id="btn-up">↑</div>
        <div class="ctrl-btn" id="btn-left">←</div>
        <div></div>
        <div class="ctrl-btn" id="btn-right">→</div>
        <div class="ctrl-btn" id="btn-down">↓</div>
    </div>

<script>
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');

const MAZE_SIZE = 15; 
const TILE_SIZE = 24; 
canvas.width = MAZE_SIZE * TILE_SIZE;
canvas.height = MAZE_SIZE * TILE_SIZE;

const colors = {
    wall: '#cc33ff',   
    path: 'rgba(20, 10, 40, 0.6)', 
    player: '#33ccff', 
    goal: '#ffff33',    
    enemy: '#ff3366'    
};

let maze = [];
let player = { x: 1, y: 1 };
let goal = { x: MAZE_SIZE - 2, y: MAZE_SIZE - 2 };
let enemies = [];
let isGameOver = false;
let enemyTimer = null;

// 【新設】設定用の現在のステート
let currentEnemyCount = 2; // 最初は2匹
let currentSpeedLevel = 'normal'; // 最初は「ふつう」
const speedSettings = {
    'easy': 650,    // かんたん（ゆっくりおっとり）
    'normal': 400,  // ふつう
    'hard': 220     // むずかしい（けっこう速い！）
};

// --- 迷路の自動生成 ---
function generateMaze() {
    maze = [];
    for (let y = 0; y < MAZE_SIZE; y++) {
        maze.push(new Array(MAZE_SIZE).fill(1));
    }
    maze[1][1] = 0;
    dig(1, 1);
    maze[goal.y][goal.x] = 0;

    // ボタンで設定された数（0〜2）だけ敵を生成
    enemies = [];
    const positions = [
        { x: MAZE_SIZE - 2, y: 1, lastDx: 0, lastDy: 0 }, // 右上
        { x: 1, y: MAZE_SIZE - 2, lastDx: 0, lastDy: 0 }  // 左下
    ];

    for (let i = 0; i < currentEnemyCount; i++) {
        enemies.push(positions[i]);
        maze[positions[i].y][positions[i].x] = 0; // 通路を保証
    }
}

function dig(x, y) {
    const dirs = [
        {dx: 0, dy: -2}, {dx: 0, dy: 2}, {dx: -2, dy: 0}, {dx: 2, dy: 0}
    ].sort(() => Math.random() - 0.5);

    for (let dir of dirs) {
        const nx = x + dir.dx;
        const ny = y + dir.dy;
        if (nx > 0 && nx < MAZE_SIZE - 1 && ny > 0 && ny < MAZE_SIZE - 1) {
            if (maze[ny][nx] === 1) {
                maze[y + dir.dy / 2][x + dir.dx / 2] = 0;
                maze[ny][nx] = 0;
                dig(nx, ny);
            }
        }
    }
}

// --- 描画 ---
function drawPuyo(x, y, colorStr, hasEyes) {
    const px = x * TILE_SIZE + TILE_SIZE / 2;
    const py = y * TILE_SIZE + TILE_SIZE / 2;
    const r = TILE_SIZE * 0.46;

    ctx.save();
    ctx.translate(px, py);

    ctx.beginPath();
    ctx.fillStyle = colorStr;
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    if (hasEyes) {
        const eyeOffset = r * 0.35;
        const eyeRadius = r * 0.28;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-eyeOffset, -r*0.05, eyeRadius, 0, Math.PI * 2);
        ctx.arc(eyeOffset, -r*0.05, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(-eyeOffset + r*0.05, -r*0.05, r*0.14, 0, Math.PI * 2);
        ctx.arc(eyeOffset - r*0.05, -r*0.05, r*0.14, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-eyeOffset + r*0.02, -r*0.1, r*0.06, 0, Math.PI * 2);
        ctx.arc(eyeOffset - r*0.08, -r*0.1, r*0.06, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath();
    ctx.arc(0, -r*0.4, r*0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < MAZE_SIZE; y++) {
        for (let x = 0; x < MAZE_SIZE; x++) {
            if (maze[y][x] === 1) {
                drawPuyo(x, y, colors.wall, false);
            } else {
                ctx.fillStyle = colors.path;
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    drawPuyo(goal.x, goal.y, colors.goal, true);
    enemies.forEach(e => drawPuyo(e.x, e.y, colors.enemy, true));
    drawPuyo(player.x, player.y, colors.player, true);
}

// --- 敵の自動移動 ---
function updateEnemies() {
    if (isGameOver) return;

    enemies.forEach(e => {
        const possibleMoves = [];
        const dirs = [{dx: 0, dy: -1}, {dx: 0, dy: 1}, {dx: -1, dy: 0}, {dx: 1, dy: 0}];

        dirs.forEach(d => {
            const nx = e.x + d.dx;
            const ny = e.y + d.dy;
            if (maze[ny] && maze[ny][nx] === 0) possibleMoves.push(d);
        });

        if (possibleMoves.length > 0) {
            let move = possibleMoves.find(m => m.dx === e.lastDx && m.dy === e.lastDy);
            if (!move || Math.random() < 0.3) {
                move = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
            }
            e.x += move.dx; e.y += move.dy;
            e.lastDx = move.dx; e.lastDy = move.dy;
        }
    });

    draw();
    checkCollision();
}

// --- プレイヤー移動 ---
function movePlayer(dx, dy) {
    if (isGameOver) return;

    const nextX = player.x + dx;
    const nextY = player.y + dy;

    if (maze[nextY] && maze[nextY][nextX] === 0) {
        player.x = nextX;
        player.y = nextY;
        draw();
        checkCollision();
        checkGoal();
    }
}

function checkCollision() {
    const hit = enemies.some(e => e.x === player.x && e.y === player.y);
    if (hit) {
        isGameOver = true;
        clearInterval(enemyTimer);
        document.getElementById('gameover-overlay').style.display = 'flex';
    }
}

function checkGoal() {
    if (player.x === goal.x && player.y === goal.y) {
        isGameOver = true;
        clearInterval(enemyTimer);
        document.getElementById('clear-overlay').style.display = 'flex';
    }
}

function startGameLoop() {
    isGameOver = false;
    clearInterval(enemyTimer);
    
    // 敵が1匹以上いるときだけタイマーを作動させる
    if (currentEnemyCount > 0) {
        const speed = speedSettings[currentSpeedLevel];
        enemyTimer = setInterval(updateEnemies, speed);
    }
}

function nextStage() {
    document.getElementById('clear-overlay').style.display = 'none';
    player = { x: 1, y: 1 };
    generateMaze();
    draw();
    startGameLoop();
}

function restartStage() {
    document.getElementById('gameover-overlay').style.display = 'none';
    player = { x: 1, y: 1 };
    startGameLoop();
    draw();
}

// --- 【新設】設定ボタンの切り替え処理 ---
function setupConfigButtons() {
    const countBtn = document.getElementById('btn-config-count');
    const levelBtn = document.getElementById('btn-config-level');

    // 敵の数： 2匹 -> 0匹 -> 1匹 -> 2匹... の順に切り替え
    const changeCount = () => {
        if (currentEnemyCount === 2) currentEnemyCount = 0;
        else if (currentEnemyCount === 0) currentEnemyCount = 1;
        else currentEnemyCount = 2;

        countBtn.innerText = currentEnemyCount === 0 ? "0ひき" : `${currentEnemyCount}ひき`;
        
        // 設定が変わったらその場で迷路と敵をリセット
        restartStage();
    };

    // 敵の強さ： ふつう -> むずかしい -> かんたん...
    const changeLevel = () => {
        if (currentSpeedLevel === 'normal') {
            currentSpeedLevel = 'hard';
            levelBtn.innerText = "むずかしい";
        } else if (currentSpeedLevel === 'hard') {
            currentSpeedLevel = 'easy';
            levelBtn.innerText = "かんたん";
        } else {
            currentSpeedLevel = 'normal';
            levelBtn.innerText = "ふつう";
        }
        // スピードが変わったらタイマーを再スタート
        startGameLoop();
    };

    // パソコン・スマホ両方で快適に動くようにイベント登録
    if ('ontouchstart' in window) {
        countBtn.addEventListener('touchstart', e => { e.preventDefault(); changeCount(); });
        levelBtn.addEventListener('touchstart', e => { e.preventDefault(); changeLevel(); });
    } else {
        countBtn.addEventListener('click', changeCount);
        levelBtn.addEventListener('click', changeLevel);
    }
}

// --- 操作・初期化 ---
document.addEventListener('keydown', event => {
    if (event.key === 'ArrowUp' || event.key === 'w') movePlayer(0, -1);
    else if (event.key === 'ArrowDown' || event.key === 's') movePlayer(0, 1);
    else if (event.key === 'ArrowLeft' || event.key === 'a') movePlayer(-1, 0);
    else if (event.key === 'ArrowRight' || event.key === 'd') movePlayer(1, 0);
});

const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (isTouchDevice) {
    document.getElementById('controls').style.display = 'grid';
    document.body.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
    
    let lastTouchEnd = 0;
    document.addEventListener('touchend', event => {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) event.preventDefault();
        lastTouchEnd = now;
    }, false);

    const setupBtn = (id, action) => {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', e => { e.preventDefault(); action(); });
    };
    setupBtn('btn-up', () => movePlayer(0, -1));
    setupBtn('btn-left', () => movePlayer(-1, 0));
    setupBtn('btn-right', () => movePlayer(1, 0));
    setupBtn('btn-down', () => movePlayer(0, 1));
}

// 起動
setupConfigButtons();
generateMaze();
draw();
startGameLoop();
</script>
</body>
</html>
