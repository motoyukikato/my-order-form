<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Puyo Pac-Man - Landscape Edition</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #190a35;
            color: #fff;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 画面上部の操作パネルとスコア */
        #top-bar {
            width: 100%;
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: rgba(0,0,0,0.3);
            font-size: 16px;
            font-weight: bold;
        }
        .panel-btn {
            color: #fff;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 6px;
            border: 2px solid #fff;
            cursor: pointer;
            font-weight: bold;
        }
        #btn-restart { background: #ff1744; }
        #btn-pause { background: #ff9100; }

        /* メインのゲームプレイエリア（横並び） */
        #main-layout {
            display: flex;
            flex: 1;
            width: 100%;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            gap: 10px;
        }

        /* ゲーム画面（中央） */
        #game-container {
            position: relative;
            border: 4px solid #ffd700;
            border-radius: 12px;
            background-color: rgba(20, 10, 40, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            max-height: calc(100vh - 70px); /* 画面の高さに合わせて自動縮小 */
            max-width: 100%;
            object-fit: contain;
        }

        /* 左右の仮想コントローラー */
        .pad-cluster {
            display: none; /* スマホ（タッチ環境）のみJavaScriptで表示 */
            width: 110px;
            height: 110px;
            position: relative;
        }
        .ctrl-btn {
            position: absolute;
            background: rgba(255, 64, 129, 0.85);
            border: 2px solid #fff;
            color: #fff;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 4px 0 #c2185b;
        }
        .ctrl-btn:active {
            transform: scale(0.95);
            background: #ff4081;
            box-shadow: none;
        }

        /* 左手側：左右ボタン */
        #btn-left  { top: 30px; left: 0; }
        #btn-right { top: 30px; right: 0; }
        /* 右手側：上下ボタン */
        #btn-up    { top: 0; left: 30px; background: rgba(0, 176, 255, 0.85); box-shadow: 0 4px 0 #0091ea; }
        #btn-down  { bottom: 0; left: 30px; background: rgba(0, 176, 255, 0.85); box-shadow: 0 4px 0 #0091ea; }

        /* オーバーレイ表示 */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 8px;
        }
        #clear-overlay { background: rgba(0, 230, 118, 0.95); }
        #gameover-overlay { background: rgba(255, 64, 129, 0.95); }
        #pause-overlay { background: rgba(43, 16, 85, 0.9); }
        
        .overlay-title { font-size: 28px; font-weight: bold; text-shadow: 2px 2px 0px #000; }
        .overlay-btn { font-size: 14px; margin-top: 10px; background: #2b1055; padding: 6px 16px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div style="display:flex; gap:8px;">
            <div class="panel-btn" id="btn-restart">さいしょから</div>
            <div class="panel-btn" id="btn-pause">ていし</div>
        </div>
        <div id="mode-status" style="color: #00e676; font-size:14px;">エサをあつめろ！</div>
        <div>SCORE: <span id="score-val">0</span></div>
    </div>

    <div id="main-layout">
        <div class="pad-cluster" id="left-pad">
            <div class="ctrl-btn" id="btn-left">←</div>
            <div class="ctrl-btn" id="btn-right">→</div>
        </div>

        <div id="game-container">
            <canvas id="mazeCanvas"></canvas>
            
            <div id="clear-overlay" class="overlay" onclick="nextStage()">
                <div class="overlay-title">ぱーふぇくと！</div>
                <div class="overlay-btn">つぎのステージへ</div>
            </div>

            <div id="gameover-overlay" class="overlay" onclick="restartStage()">
                <div class="overlay-title">ばたんきゅー</div>
                <div class="overlay-btn">もういちど挑戦！</div>
            </div>

            <div id="pause-overlay" class="overlay">
                <div class="overlay-title" style="color: #ff9100;">ぽーず中</div>
                <div class="overlay-btn" onclick="togglePause()">ゲームを再開する</div>
            </div>
        </div>

        <div class="pad-cluster" id="right-pad">
            <div class="ctrl-btn" id="btn-up">↑</div>
            <div class="ctrl-btn" id="btn-down">↓</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');

// ★【大画面化！】さらに広い23×23マス。1マスのドット幅は画面比率に応じて自動で綺麗に描画されます
const MAZE_SIZE = 23; 
const TILE_SIZE = 16; 
canvas.width = MAZE_SIZE * TILE_SIZE;
canvas.height = MAZE_SIZE * TILE_SIZE;

const colors = {
    wall: '#cc33ff',       
    path: 'rgba(20, 10, 40, 0.6)', 
    player: '#33ccff',     
    enemyNormal: '#ff3366', 
    enemyScared: '#2979ff', 
    dot: '#ffeb3b',        
    powerDot: '#00e676'    
};

let maze = [];       
let dotGrid = [];    
let player = { x: 1, y: 1 };
let enemies = [];
let score = 0;
let isGameOver = false;
let isPaused = false;

let enemyTimer = null;
let powerModeTimer = null;
let isPowerMode = false;
let powerRemainingTime = 0;
let powerModeStartTime = 0;

function generateMaze() {
    maze = [];
    dotGrid = [];
    for (let y = 0; y < MAZE_SIZE; y++) {
        maze.push(new Array(MAZE_SIZE).fill(1));
        dotGrid.push(new Array(MAZE_SIZE).fill(0));
    }
    maze[1][1] = 0;
    dig(1, 1);

    for (let y = 0; y < MAZE_SIZE; y++) {
        for (let x = 0; x < MAZE_SIZE; x++) {
            if (maze[y][x] === 0) dotGrid[y][x] = 1;
        }
    }
    dotGrid[1][1] = 0;

    // パワーエサを4隅＋中央付近の計5箇所にバランスよく配置
    const mid = Math.floor(MAZE_SIZE / 2);
    const powerPos = [
        {x: 1, y: MAZE_SIZE - 2}, {x: MAZE_SIZE - 2, y: 1}, 
        {x: MAZE_SIZE - 2, y: MAZE_SIZE - 2}, {x: 1, y: mid}, {x: MAZE_SIZE - 2, y: mid}
    ];
    powerPos.forEach(p => {
        if(maze[p.y][p.x] === 0) dotGrid[p.y][p.x] = 2;
    });

    // 広いマップに合わせておばけは3匹体制を維持
    enemies = [
        { x: MAZE_SIZE - 2, y: 1, lastDx: 0, lastDy: 0, isDead: false, spawnX: MAZE_SIZE - 2, spawnY: 1 },
        { x: 1, y: MAZE_SIZE - 2, lastDx: 0, lastDy: 0, isDead: false, spawnX: 1, spawnY: MAZE_SIZE - 2 },
        { x: MAZE_SIZE - 2, y: MAZE_SIZE - 2, lastDx: 0, lastDy: 0, isDead: false, spawnX: MAZE_SIZE - 2, spawnY: MAZE_SIZE - 2 }
    ];
    enemies.forEach(e => maze[e.y][e.x] = 0);
}

function dig(x, y) {
    const dirs = [{dx:0, dy:-2}, {dx:0, dy:2}, {dx:-2, dy:0}, {dx:2, dy:0}].sort(() => Math.random() - 0.5);
    for (let dir of dirs) {
        const nx = x + dir.dx; const ny = y + dir.dy;
        if (nx > 0 && nx < MAZE_SIZE - 1 && ny > 0 && ny < MAZE_SIZE - 1) {
            if (maze[ny][nx] === 1) {
                maze[y + dir.dy / 2][x + dir.dx / 2] = 0;
                maze[ny][nx] = 0;
                dig(nx, ny);
            }
        }
    }
}

function drawPuyo(x, y, colorStr, hasEyes) {
    const px = x * TILE_SIZE + TILE_SIZE / 2;
    const py = y * TILE_SIZE + TILE_SIZE / 2;
    const r = TILE_SIZE * 0.46;

    ctx.save(); ctx.translate(px, py);
    ctx.beginPath(); ctx.fillStyle = colorStr; ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

    if (hasEyes) {
        const eyeOffset = r * 0.35; const eyeRadius = r * 0.28;
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-eyeOffset, -r*0.05, eyeRadius, 0, Math.PI * 2); ctx.arc(eyeOffset, -r*0.05, eyeRadius, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-eyeOffset + r*0.05, -r*0.05, r*0.14, 0, Math.PI * 2); ctx.arc(eyeOffset - r*0.05, -r*0.05, r*0.14, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; ctx.beginPath(); ctx.arc(0, -r*0.4, r*0.2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < MAZE_SIZE; y++) {
        for (let x = 0; x < MAZE_SIZE; x++) {
            if (maze[y][x] === 1) {
                drawPuyo(x, y, colors.wall, false);
            } else {
                ctx.fillStyle = colors.path;
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);

                if (dotGrid[y][x] === 1) { 
                    ctx.fillStyle = colors.dot;
                    ctx.beginPath(); ctx.arc(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, 2.5, 0, Math.PI * 2); ctx.fill();
                } else if (dotGrid[y][x] === 2) { 
                    ctx.fillStyle = colors.powerDot;
                    ctx.beginPath(); ctx.arc(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, 5, 0, Math.PI * 2); ctx.fill();
                }
            }
        }
    }

    enemies.forEach(e => {
        if (e.isDead) return; 
        let enemyColor = isPowerMode ? colors.enemyScared : colors.enemyNormal;
        drawPuyo(e.x, e.y, enemyColor, true);
    });

    drawPuyo(player.x, player.y, colors.player, true);
}

function updateEnemies() {
    if (isGameOver || isPaused) return;

    enemies.forEach(e => {
        if (e.isDead) return;
        const possibleMoves = [];
        const dirs = [{dx:0, dy:-1}, {dx:0, dy:1}, {dx:-1, dy:0}, {dx:1, dy:0}];

        dirs.forEach(d => {
            const nx = e.x + d.dx; const ny = e.y + d.dy;
            if (maze[ny] && maze[ny][nx] === 0) possibleMoves.push(d);
        });

        if (possibleMoves.length > 0) {
            let move = possibleMoves.find(m => m.dx === e.lastDx && m.dy === e.lastDy);
            if (!move || Math.random() < 0.2) {
                move = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
            }
            e.x += move.dx; e.y += move.dy;
            e.lastDx = move.dx; e.lastDy = move.dy;
        }
    });

    draw();
    checkCollision();
}

function movePlayer(dx, dy) {
    if (isGameOver || isPaused) return;
    const nextX = player.x + dx; const nextY = player.y + dy;

    if (maze[nextY] && maze[nextY][nextX] === 0) {
        player.x = nextX; player.y = nextY;

        if (dotGrid[player.y][player.x] === 1) {
            dotGrid[player.y][player.x] = 0;
            score += 10;
            updateScoreDisplay();
        } else if (dotGrid[player.y][player.x] === 2) {
            dotGrid[player.y][player.x] = 0;
            score += 50;
            updateScoreDisplay();
            activatePowerMode(8000); // マップが広いので無敵時間をちょっと長めの8秒に
        }

        draw();
        checkCollision();
        checkStageClear();
    }
}

function activatePowerMode(duration) {
    isPowerMode = true;
    document.getElementById('mode-status').innerText = "おばけを倒せ！";
    document.getElementById('mode-status').style.color = '#ffeb3b';

    clearTimeout(powerModeTimer);
    powerModeStartTime = Date.now();
    powerRemainingTime = duration;

    powerModeTimer = setTimeout(() => {
        isPowerMode = false;
        powerRemainingTime = 0;
        document.getElementById('mode-status').innerText = "エサをあつめろ！";
        document.getElementById('mode-status').style.color = '#00e676';
        draw();
    }, duration);
}

function togglePause() {
    if (isGameOver) return;
    const pauseOverlay = document.getElementById('pause-overlay');
    const pauseBtn = document.getElementById('btn-pause');

    if (!isPaused) {
        isPaused = true;
        clearInterval(enemyTimer); 
        pauseOverlay.style.display = 'flex';
        pauseBtn.innerText = "再開";
    } else {
        isPaused = false;
        pauseOverlay.style.display = 'none';
        pauseBtn.innerText = "ていし";
        enemyTimer = setInterval(updateEnemies, 330); // 広いマップ用に敵の速度をさらに調整

        if (isPowerMode && powerRemainingTime > 0) {
            activatePowerMode(powerRemainingTime);
        }
    }
}

function checkCollision() {
    enemies.forEach(e => {
        if (e.isDead) return;
        if (e.x === player.x && e.y === player.y) {
            if (isPowerMode) {
                e.isDead = true;
                score += 200;
                updateScoreDisplay();
                setTimeout(() => {
                    e.isDead = false;
                    e.x = e.spawnX; e.y = e.spawnY;
                    draw();
                }, 4000);
            } else {
                isGameOver = true;
                clearInterval(enemyTimer);
                clearTimeout(powerModeTimer);
                document.getElementById('gameover-overlay').style.display = 'flex';
            }
        }
    });
}

function checkStageClear() {
    let hasDots = false;
    for (let y = 0; y < MAZE_SIZE; y++) {
        if (dotGrid[y].includes(1) || dotGrid[y].includes(2)) {
            hasDots = true; break;
        }
    }
    if (!hasDots) {
        isGameOver = true;
        clearInterval(enemyTimer);
        clearTimeout(powerModeTimer);
        document.getElementById('clear-overlay').style.display = 'flex';
    }
}

function updateScoreDisplay() {
    document.getElementById('score-val').innerText = score;
}

function startGameLoop() {
    isGameOver = false; isPaused = false; isPowerMode = false; powerRemainingTime = 0;
    document.getElementById('pause-overlay').style.display = 'none';
    document.getElementById('btn-pause').innerText = "ていし";
    document.getElementById('mode-status').innerText = "エサをあつめろ！";
    document.getElementById('mode-status').style.color = '#00e676';
    
    clearInterval(enemyTimer);
    enemyTimer = setInterval(updateEnemies, 330); 
}

function nextStage() {
    document.getElementById('clear-overlay').style.display = 'none';
    player = { x: 1, y: 1 };
    generateMaze();
    draw();
    startGameLoop();
}

function restartStage() {
    document.getElementById('gameover-overlay').style.display = 'none';
    score = 0; updateScoreDisplay();
    player = { x: 1, y: 1 };
    generateMaze();
    draw();
    startGameLoop();
}

// 共通ボタン設定
const setupBtn = (id, action) => {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => { e.preventDefault(); action(); }, {passive: false});
    btn.addEventListener('mousedown', e => { action(); });
};

// パソコン用のキーボード移動
document.addEventListener('keydown', event => {
    if (event.key === 'p' || event.key === 'P' || event.key === 'Escape') togglePause();
    if (event.key === 'ArrowUp' || event.key === 'w') movePlayer(0, -1);
    else if (event.key === 'ArrowDown' || event.key === 's') movePlayer(0, 1);
    else if (event.key === 'ArrowLeft' || event.key === 'a') movePlayer(-1, 0);
    else if (event.key === 'ArrowRight' || event.key === 'd') movePlayer(1, 0);
});

// スマホ（タッチパネル）でのみ十字キーを表示
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (isTouchDevice) {
    document.getElementById('left-pad').style.display = 'block';
    document.getElementById('right-pad').style.display = 'block';
    
    // 画面スクロールやダブルタップ拡大を防止
    document.body.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
}

// ボタンと機能の紐付け
setupBtn('btn-up', () => movePlayer(0, -1));
setupBtn('btn-left', () => movePlayer(-1, 0));
setupBtn('btn-right', () => movePlayer(1, 0));
setupBtn('btn-down', () => movePlayer(0, 1));

document.getElementById('btn-restart').addEventListener('click', () => { if(confirm("やりなおしますか？")) restartStage(); });
document.getElementById('btn-pause').addEventListener('click', togglePause);

// ゲーム開始
generateMaze();
draw();
startGameLoop();
</script>
</body>
</html>
