<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/shopping-cart.png">
    <link rel="icon" sizes="192x192" href="https://img.icons8.com/color/192/shopping-cart.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="受注システム">
    <meta name="mobile-web-app-capable" content="yes">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商事本部見本市受注システム</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 90px; background: #f4f7f9; }
        header { background: #fff; text-align: center; padding: 12px; border-bottom: 3px solid #3b5998; font-weight: bold; }
        .page-section { display: none; padding: 10px; }
        .active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .btn-main { padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 1.1em; font-weight: bold; color: white; cursor: pointer; }
        #reader { width: 100% !important; border-radius: 12px; overflow: hidden; background: #000; }
        #zoom-slider { width: 85%; margin: 15px auto; display: block; height: 30px; }
        .scan-msg { font-size: 0.9em; color: #d9534f; font-weight: bold; background: #fff; display: block; margin-bottom: 5px; text-align:center; }
        .item-row { border-bottom: 1px solid #eee; padding: 10px 0; }
        #common-note { width: 100%; height: 80px; margin-top: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .total-box { text-align: right; padding: 15px; font-size: 1.3em; color: #d9534f; font-weight: bold; background: #fff; border-radius: 12px; margin-top: 10px; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #fff; border-top: 1px solid #ddd; padding: 10px 0; z-index: 100; }
        nav button { flex: 1; background: none; border: none; color: #888; font-size: 12px; }
        nav button.active-nav { color: #3b5998; font-weight: bold; }
        #qty-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:200; justify-content:center; align-items:center; }
        .modal-content { background:#fff; width:85%; border-radius:15px; padding:20px; text-align:center; }
        .qty-display { font-size: 2.5em; font-weight: bold; margin-bottom: 10px; background: #eee; padding: 10px; border-radius: 8px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .numpad button { padding: 15px; font-size: 1.5em; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
        .del-btn { color: #d9534f; text-decoration: underline; font-size: 0.9em; cursor: pointer; margin-left:10px; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; background: #e9ecef; }
        .hold-badge { background: #ffc107; color: #000; padding: 2px 5px; border-radius: 4px; font-size: 0.8em; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

<header id="app-title">商事本部 受注システム</header>

<div id="qty-modal">
    <div class="modal-content">
        <h3 id="modal-p-name" style="margin:0 0 10px; font-size:1em;">商品名</h3>
        <div class="qty-display" id="qty-val">1</div>
        <div class="numpad">
            <button onclick="numIn(7)">7</button><button onclick="numIn(8)">8</button><button onclick="numIn(9)">9</button>
            <button onclick="numIn(4)">4</button><button onclick="numIn(5)">5</button><button onclick="numIn(6)">6</button>
            <button onclick="numIn(1)">1</button><button onclick="numIn(2)">2</button><button onclick="numIn(3)">3</button>
            <button onclick="numIn('C')" style="color:red;">C</button><button onclick="numIn(0)">0</button><button onclick="numIn('B')">←</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-main" style="background:#ccc; flex:1;" onclick="closeQtyModal()">戻る</button>
            <button id="confirm-btn" class="btn-main" style="background:#3b5998; flex:2;" onclick="confirmQty()">決定</button>
        </div>
    </div>
</div>

<section id="home" class="page-section active">
    <div class="card">
        <div id="c-none" style="text-align:center; color:#999;">顧客情報を選択してください</div>
        <div id="c-detail" style="display:none;">
            <b id="r-name" style="color:#3b5998; font-size:1.1em;"></b><br>
            <small id="r-addr1"></small><br>
            <small id="r-tel"></small>
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom:10px;">
        <button class="btn-main" style="background:#28a745; flex: 2;" onclick="startCamera('customer')"><i class="fas fa-qrcode"></i> 顧客スキャン</button>
        <button class="btn-main" style="background:#6c757d; flex: 1;" onclick="openTelModal()">手入力</button>
    </div>

    <div id="product-input-area" style="display:none; margin: 15px 0;">
        <div style="display: flex; gap: 5px;">
            <input type="text" id="part-no-input" list="product-list" placeholder="品番・JANを入力" 
                   style="flex: 2; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px;">
            <datalist id="product-list"></datalist>
            <button class="btn-main" style="background:#3b5998; flex: 1; padding: 12px 5px;" onclick="handleManualInput()">追加</button>
        </div>
    </div>

    <div id="cart-area" style="display:none;">
        <div id="cart-list" class="card"></div>
        <div class="total-box">合計: ¥<span id="cart-total">0</span></div>
        <textarea id="common-note" placeholder="受注全体へのコメント"></textarea>
        
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn-main" style="background:#ffc107; color:#000; flex: 1;" onclick="holdOrder()"><i class="fas fa-pause"></i> 保留</button>
            <button class="btn-main" style="background:#d9534f; flex: 2;" id="submit-btn" onclick="submitFinalOrder()">注文確定・送信</button>
        </div>
    </div>
</section>

<section id="scanner-page" class="page-section">
    <div id="reader"></div>
    <div style="text-align:center; padding:15px; background:#fff;">
        <span class="scan-msg">少し離してズームするとピントが合います</span>
        <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
        <button class="btn-main" style="background:#666;" onclick="stopCamera()">キャンセル</button>
    </div>
</section>

<section id="history" class="page-section">
    <h3 style="text-align:center;">保留・履歴</h3>
    <div id="pending-list-area"></div>
    <hr>
    <div id="h-list"></div>
</section>

<nav>
    <button onclick="showPage('home')" id="n-home" class="active-nav"><i class="fas fa-shopping-cart"></i><br>カート</button>
    <button onclick="startCamera('product')"><i class="fas fa-barcode"></i><br>スキャン</button>
    <button onclick="showPage('history')"><i class="fas fa-history"></i><br>保留/履歴</button>
</nav>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const MY_MAKER = urlParams.get('m');
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz6hsfh3zmLhJnz1nGRaUqErMPHl6U7z0g8K8uaklvCJiH43BwVp5q1p_cUv3C9g6Pk/exec";

    let html5QrCode = null, customer = null, cart = [], tempProduct = null, isTelMode = false;
    let allProducts = [];
    let pendingOrders = []; // 保留中の注文リスト

    window.onload = () => {
        if (MY_MAKER) {
            document.getElementById("app-title").innerText = MY_MAKER + " 受注システム";
            preloadAllProducts();
        }
    };

    async function preloadAllProducts() {
        if (!MY_MAKER) return;
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getAllProducts", targetMaker: MY_MAKER }) });
            const fullData = await res.json();
            allProducts = fullData.filter(p => String(p.maker).trim() === MY_MAKER.trim());
            const datalist = document.getElementById("product-list");
            datalist.innerHTML = allProducts.map(p => `<option value="${p.partNo}">${p.name}</option>`).join('');
        } catch (e) { console.error("マスタ読み込み失敗"); }
    }

    // --- 保留機能の核心部分 ---
    function holdOrder() {
        if (!customer) return;
        if (cart.length === 0) { alert("空のカートは保留できません"); return; }
        
        pendingOrders.push({
            customer: customer,
            cart: [...cart],
            note: document.getElementById("common-note").value
        });
        
        alert(customer.customer + " 様の注文を一旦保留しました。別の方の受注が可能です。");
        resetUI();
    }

   function resetUI() {
        // 全ての変数を初期化
        customer = null;
        cart = [];
        tempProduct = null;

        // 全ての入力欄を空にする
        document.getElementById("common-note").value = "";
        document.getElementById("part-no-input").value = "";
        
        // UI表示を初期状態（顧客選択前）に戻す
        document.getElementById("c-none").style.display = "block";
        document.getElementById("c-detail").style.display = "none";
        document.getElementById("cart-area").style.display = "none";
        document.getElementById("product-input-area").style.display = "none";
        
        // カート表示（リストと合計金額）をリフレッシュ
        renderCart();
    }

    function renderPendingList() {
        const area = document.getElementById("pending-list-area");
        if (pendingOrders.length === 0) {
            area.innerHTML = "";
            return;
        }
        area.innerHTML = '<b style="margin-left:10px;">▼ 保留中 (タップで再開)</b>' + pendingOrders.map((ord, i) => `
            <div class="card" onclick="resumeOrder(${i})" style="border-left: 8px solid #ffc107;">
                <b>${ord.customer.customer} 様</b><br>
                <small>${ord.cart.length}点 合計: ¥${calculateTotal(ord.cart).toLocaleString()}</small>
            </div>
        `).join('');
    }

    function calculateTotal(items) { return items.reduce((s, i) => s + (i.price * i.quantity), 0); }

    function resumeOrder(index) {
        if (customer && cart.length > 0) {
            if (!confirm("現在の入力を保留して、選択した受注を再開しますか？")) return;
            pendingOrders.push({ customer: customer, cart: [...cart], note: document.getElementById("common-note").value });
        }
        const target = pendingOrders[index];
        customer = target.customer;
        cart = target.cart;
        document.getElementById("common-note").value = target.note;
        
        pendingOrders.splice(index, 1);
        renderCart();
        updateCustomerDisplay();
        showPage('home');
    }

    function updateCustomerDisplay() {
        document.getElementById("r-name").innerText = customer.customer;
        document.getElementById("r-addr1").innerText = "〒" + customer.zip + " " + customer.address1;
        document.getElementById("r-tel").innerText = "TEL: " + customer.tel;
        document.getElementById("c-none").style.display = "none";
        document.getElementById("c-detail").style.display = "block";
        document.getElementById("cart-area").style.display = "block";
        document.getElementById("product-input-area").style.display = "block";
    }

    // --- 既存の基本機能 ---
    function openTelModal() {
        isTelMode = true;
        document.getElementById("modal-p-name").innerText = "電話番号入力";
        document.getElementById("qty-val").innerText = ""; 
        document.getElementById("qty-modal").style.display = "flex";
    }

    function openQtyModal(p) {
        isTelMode = false; tempProduct = p; 
        const stockColor = (p.stock === "○" || p.stock === "あり") ? "#28a745" : "#d9534f";
        document.getElementById("modal-p-name").innerHTML = `
            <div style="font-size: 1.1em; font-weight: bold;">${p.name}</div>
            <div style="font-size: 0.85em; color: #666; margin-top: 5px;">上代: ¥${(p.listPrice || 0).toLocaleString()} / ロット: ${p.lot || 1}</div>
            <div style="font-size: 0.9em; font-weight: bold; margin-top: 3px;">在庫: <span style="color: ${stockColor};">${p.stock || "不明"}</span></div>
        `;
        document.getElementById("qty-val").innerText = "1";
        document.getElementById("qty-modal").style.display = "flex";
    }

    function closeQtyModal() { document.getElementById("qty-modal").style.display = "none"; isTelMode = false; }

    function numIn(n) {
        let v = document.getElementById("qty-val");
        if (n === 'C') { v.innerText = isTelMode ? "" : "1"; }
        else if (n === 'B') { v.innerText = v.innerText.length > 1 ? v.innerText.slice(0, -1) : (isTelMode ? "" : "1"); }
        else {
            if (isTelMode) v.innerText += n;
            else v.innerText = (v.innerText === "1") ? n : v.innerText + n;
        }
    }

    async function confirmQty() {
        let val = document.getElementById("qty-val").innerText;
        if (isTelMode) {
            if (val.length < 9) { alert("番号が短すぎます"); return; }
            closeQtyModal();
            fetchCustomer(val); 
        } else {
            let q = parseInt(val);
            if (q > 0) { cart.push({ ...tempProduct, quantity: q }); renderCart(); }
            closeQtyModal();
            document.getElementById("part-no-input").value = "";
        }
    }

   // --- 修正版：数量訂正ができるカート表示 ---
   // --- カート表示（数量をタップ可能にする） ---
    f
    // --- 数量訂正モードの開始 ---
    function editCartQty(index) {
        isTelMode = false;
        const item = cart[index];
        
        // モーダルの表示を「訂正」用にセット
        document.getElementById("qty-val").innerText = item.quantity;
        document.getElementById("modal-p-name").innerHTML = `
            <div style="color: #d9534f; font-weight: bold;">【数量の変更】</div>
            <div style="font-size: 1.1em; font-weight: bold;">${item.name}</div>
        `;

        document.getElementById("qty-modal").style.display = "flex";
        
        // ★重要：決定ボタンの「onclick」を訂正確定用に書き換える
        const btn = document.getElementById("confirm-btn");
        btn.setAttribute("onclick", `confirmEditQty(${index})`);
    }

    // --- 数量訂正の確定 ---
    function confirmEditQty(index) {
        const val = document.getElementById("qty-val").innerText;
        const q = parseInt(val);
        
        if (q > 0) {
            cart[index].quantity = q; // 数量を上書き
            renderCart(); // 表示を更新
        }
        
        closeQtyModal();
        
        // ★重要：決定ボタンの「onclick」を「新規追加用」に戻しておく
        const btn = document.getElementById("confirm-btn");
        btn.setAttribute("onclick", "confirmQty()");
    }

    // --- 送信処理（これは今のままでOKですが、念のため再掲） ---
    async function submitFinalOrder() {
        if (cart.length === 0) { alert("カートが空です"); return; }
        if (!confirm("送信しますか？")) return;

        const btn = document.getElementById("submit-btn");
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "送信中...";

        try {
            const payload = {
                action: "orderSubmit",
                data: {
                    ...customer,
                    items: cart,
                    commonNote: document.getElementById("common-note").value,
                    maker: MY_MAKER
                }
            };
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();

            if (result.success) {
                alert("送信完了！画面をリセットします。");
                resetUI(); 
                showPage('home');
            } else {
                throw new Error(result.error || "送信に失敗しました");
            }
        } catch (e) {
            alert("エラーが発生しました: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }
    async function loadHistory() {
        const list = document.getElementById("h-list");
        list.innerHTML = `<p style="text-align:center; padding:10px;">履歴読込中...</p>`;
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getOrderHistory", targetMaker: MY_MAKER }) });
            const data = await res.json();
            list.innerHTML = data.map(item => `<div class="card" style="font-size:0.85em;">
                <b>${item.customerName} 様</b> [${item.displayDate}]<br>${item.partNo}: ${item.qty}点
            </div>`).join('');
        } catch (e) { list.innerHTML = "履歴取得失敗"; }
    }

    async function startCamera(mode) {
        if (mode === 'product' && !customer) { alert("顧客を選択してください"); return; }
        showPage('scanner-page');
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: { width: 250, height: 150 } }, (text) => {
            html5QrCode.stop().then(() => {
                showPage('home');
                if (mode === 'customer') fetchCustomer(text.trim()); else fetchProduct(text.trim());
            });
        });
    }

    function stopCamera() { if (html5QrCode) html5QrCode.stop(); showPage('home'); }

    async function fetchCustomer(val) {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "customerSearch", val: val }) });
        const d = await res.json();
        if (d.customer) { customer = d; updateCustomerDisplay(); } else { alert("未登録"); }
    }

    function fetchProduct(code) {
        const p = allProducts.find(item => (String(item.partNo).toUpperCase() === code.toUpperCase() || String(item.jan) === code));
        if (p) openQtyModal(p); else alert("商品が見つかりません");
    }

    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        const navBtn = { 'home': 'n-home', 'history': 'history' }[id]; // 簡易マッピング
        if (id === 'history') { renderPendingList(); loadHistory(); }
    }

    function handleManualInput() {
        const val = document.getElementById("part-no-input").value;
        if (val) fetchProduct(val.trim());
    }
</script>
</body>
</html>
