<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>受注システム修正版</title>
    <style>
        /* 強制的にボタンを見せるためのスタイル */
        .qty-control-btn {
            display: inline-block !important;
            width: 44px !important;
            height: 44px !important;
            background-color: #ff0000 !important; /* 真っ赤 */
            color: white !important;
            font-size: 24px !important;
            font-weight: bold !important;
            border: none !important;
            border-radius: 6px !important;
            margin: 0 5px !important;
        }
        .qty-num {
            display: inline-block !important;
            min-width: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #333;
            padding: 5px;
        }
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 2px solid #ccc;
            background: #fff;
        }
    </style>
</head>
<body>

<div id="cart-area">
    <h3>カートの中身</h3>
    <div id="cart-list"></div>
</div>

<script>
    // テスト用のダミーデータ（これが表示されれば成功）
    let cart = [
        { name: "テスト商品A", partNo: "T-001", price: 1000, quantity: 1 },
        { name: "テスト商品B", partNo: "T-002", price: 2000, quantity: 3 }
    ];

    function renderCart() {
        const list = document.getElementById("cart-list");
        list.innerHTML = cart.map((item, i) => `
            <div class="item-row">
                <div>
                    <b>${item.name}</b><br>
                    <small>${item.partNo}</small>
                </div>
                <div>
                    <button class="qty-control-btn" onclick="changeQty(${i}, -1)">−</button>
                    <span class="qty-num">${item.quantity}</span>
                    <button class="qty-control-btn" onclick="changeQty(${i}, 1)">＋</button>
                </div>
            </div>
        `).join('');
    }

    function changeQty(index, diff) {
        cart[index].quantity += diff;
        if (cart[index].quantity < 1) cart[index].quantity = 1;
        renderCart();
    }

    // 起動時に実行
    renderCart();
</script>
</body>
</html>
