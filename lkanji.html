<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学校 漢字フラッシュカード</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f0f7f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        h1 {
            color: #2c5d63;
            font-size: 22px;
            margin-bottom: 5px;
        }

        /* 学年選択メニューのスタイル */
        .select-container {
            margin-bottom: 10px;
        }

        select {
            padding: 6px 15px;
            font-size: 16px;
            border-radius: 5px;
            border: 2px solid #a0c1b8;
            background-color: white;
            color: #2c5d63;
            font-weight: bold;
            cursor: pointer;
        }

        .counter {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        /* カードのコンテナ設定 */
        .card-container {
            width: 300px;
            height: 380px;
            perspective: 1000px;
            cursor: pointer;
        }

        /* カード本体 */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        /* ひっくり返ったときのクラス */
        .card.is-flipped {
            transform: rotateY(180deg);
        }

        /* 表・裏共通のスタイル */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            border: 4px solid #a0c1b8;
            box-sizing: border-box;
        }

        /* 表面（漢字） */
        .card-front {
            background-color: #ffffff;
            color: #333333;
            font-size: 130px;
            font-weight: bold;
        }

        /* 裏面（読み・情報） */
        .card-back {
            background-color: #fcf8ec;
            color: #333333;
            transform: rotateY(180deg);
            padding: 20px;
            text-align: center;
        }

        .kanji-small {
            font-size: 40px;
            color: #a0c1b8;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .reading-section {
            font-size: 16px;
            margin: 10px 0;
            line-height: 1.4;
        }

        .label {
            font-size: 11px;
            color: #777;
            display: block;
            font-weight: bold;
            margin-bottom: 2px;
        }

        /* ボタンのスタイル */
        .btn {
            margin-top: 25px;
            padding: 12px 50px;
            font-size: 18px;
            font-weight: bold;
            background-color: #2c5d63;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #1e4449;
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>

            { kanji: "豊", on: "ホウ", kun: "ゆた-か" }, { kanji: "防", on: "ボウ", kun: "ふせ-ぐ" }, { kanji: "貿易", on: "※「貿」単体", kun: "（コウ）" }, { kanji: "暴", on: "ボウ、バク", kun: "あば-れる、あば-く" }, { kanji: "務", on: "ム", kun: "つと-める" }, { kanji: "夢", on: "ム", kun: "ゆめ" }, { kanji: "迷", on: "メイ", kun: "まよ-う" }, { kanji: "綿", on: "メン", kun: "わた" }, { kanji: "輸", on: "ユ", kun: "ー" }, { kanji: "余", on: "ヨ", kun: "あま-る、あま-す" },
            { kanji: "預", on: "ヨ", kun: "あず-ける、あず-かる" }, { kanji: "容", on: "ヨウ", kun: "ー" }, { kanji: "略", on: "リャク", kun: "ー" }, { kanji: "留", on: "リュウ、ル", kun: "と-まる、と-める" }, { kanji: "領", on: "リョウ", kun: "ー" }, { kanji: "歴", on: "レキ", kun: "ー" }
        ];

        // 5年生データの最後の調整（"貿易"の表記を修正）
        grade5List[182] = { kanji: "貿", on: "ボウ", kun: "ー" };

        const card = document.getElementById('card');
        const frontText = document.getElementById('front-text');
        const backKanji = document.getElementById('back-kanji');
        const onReading = document.getElementById('on-reading');
        const kunReading = document.getElementById('kun-reading');
        const cardCounter = document.getElementById('card-counter');
        const gradeSelect = document.getElementById('grade-select');

        let currentList = [];
        let remainingKanji = [];
        let currentKanji = {};

        // 学年が変更されたときの処理
        function changeGrade() {
            const selectedGrade = gradeSelect.value;
            if (selectedGrade === "1") {
                currentList = [...grade1List];
            } else if (selectedGrade === "5") {
                currentList = [...grade5List];
            }
            
            // 残りリストをリセット
            remainingKanji = [...currentList];
            
            // カードが裏を向いていたら表に戻す
            if (card.classList.contains('is-flipped')) {
                card.classList.remove('is-flipped');
                setTimeout(setRandomKanji, 200);
            } else {
                setRandomKanji();
            }
        }

        // カードをひっくり返す
        function flipCard() {
            card.classList.toggle('is-flipped');
        }

        // 次の漢字を表示する
        function nextCard(event) {
            event.stopPropagation(); 
            
            if (card.classList.contains('is-flipped')) {
                card.classList.remove('is-flipped');
                setTimeout(setRandomKanji, 200);
            } else {
                setRandomKanji();
            }
        }

        // ランダムに漢字を選んでセットする
        function setRandomKanji() {
            if (remainingKanji.length === 0) {
                alert("すべての かんじが 終わりました！もう一度はじめます。");
                remainingKanji = [...currentList];
            }

            const randomIndex = Math.floor(Math.random() * remainingKanji.length);
            currentKanji = remainingKanji[randomIndex];
            
            remainingKanji.splice(randomIndex, 1);

            // カウンターの表示更新
            cardCounter.textContent = `残り: ${remainingKanji.length} / ${currentList.length}`;

            // 画面の文字を書き換え
            frontText.textContent = currentKanji.kanji;
            backKanji.textContent = currentKanji.kanji;
            onReading.textContent = currentKanji.on || "ー";
            kunReading.textContent = currentKanji.kun || "ー";
        }

        // 最初は1年生にセットして起動
        changeGrade();
    </script>
</body>
</html>
