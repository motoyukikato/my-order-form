<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Bros - Pixel Art Edition</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', sans-serif;
            margin: 0; padding: 0;
            overflow: hidden;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        #top-bar {
            width: 100%; height: 40px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: #111; font-weight: bold; font-size: 18px;
        }
        #main-layout {
            display: flex; flex: 1; width: 100%; max-width: 800px;
            align-items: center; justify-content: center; padding: 10px; gap: 15px;
        }
        #game-container { position: relative; border: 4px solid #555; background-color: #000; }
        canvas { display: block; max-height: calc(100vh - 120px); max-width: calc(100vw - 260px); object-fit: contain; }
        
        .pad-cluster { display: block; width: 100px; height: 100px; position: relative; flex-shrink: 0; }
        .ctrl-btn {
            position: absolute; background: #333; border: 2px solid #fff; color: #fff;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; border-radius: 10px;
        }
        .ctrl-btn:active { background: #666; }
        #btn-left  { top: 26px; left: 0; }
        #btn-right { top: 26px; right: 0; }
        #btn-jump  { top: 16px; right: 10px; width: 68px; height: 68px; border-radius: 50%; background: #ff1744; font-size: 16px; }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); z-index: 10;
        }
        .overlay-title { font-size: 28px; color: #ff1744; margin-bottom: 15px; font-weight: bold; }
        .overlay-btn { background: #222; border: 2px solid #fff; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div>SCORE: <span id="score-val">0</span></div>
        <div style="color: #ff9100; font-size: 14px;">下から叩いてひっくり返せ！</div>
    </div>

    <div id="main-layout">
        <div class="pad-cluster" id="left-pad">
            <div class="ctrl-btn" id="btn-left">←</div>
            <div class="ctrl-btn" id="btn-right">→</div>
        </div>

        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            <div id="gameover-overlay" class="overlay" onclick="resetGame()">
                <div class="overlay-title">GAME OVER</div>
                <div class="overlay-btn">RESET GAME</div>
            </div>
        </div>

        <div class="pad-cluster" id="right-pad">
            <div class="ctrl-btn" id="btn-jump">JUMP</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 400;
canvas.height = 300;

const GRAVITY = 0.4;
let score = 0;
let isGameOver = false;
const keys = { left: false, right: false };

// --- 🟡 キャラクターデータ（1ドットを2px×2pxとして描画するためサイズ調整） ---
const player = {
    x: 190, y: 100,
    w: 24, h: 24, // ドット絵に合わせて12x12マス（24px）に
    vx: 0, vy: 0,
    isGrounded: false,
    dir: 1 // 1: 右向き, -1: 左向き
};

let enemies = [];
function spawnEnemy() {
    if (isGameOver) return;
    const isLeft = Math.random() > 0.5;
    enemies.push({
        x: isLeft ? 10 : 370, y: 30,
        w: 24, h: 24,
        vx: isLeft ? 1.2 : -1.2, vy: 0,
        isFlipped: false, flippedTimer: 0,
        dir: isLeft ? 1 : -1
    });
}
let enemyInterval = setInterval(spawnEnemy, 4000);

// 足場（本家風に、床の厚みやブロック感を少しアップ）
const platforms = [
    { x: 0, y: 280, w: 400, h: 20, type: 'ground' },
    { x: 0, y: 210, w: 140, h: 12, type: 'brick' },
    { x: 260, y: 210, w: 140, h: 12, type: 'brick' },
    { x: 80, y: 140, w: 240, h: 12, type: 'brick' },
    { x: 0, y: 70, w: 120, h: 12, type: 'brick' },
    { x: 280, y: 70, w: 120, h: 12, type: 'brick' }
];
platforms.forEach(p => { p.hitTimer = 0; p.hitX = 0; });

// --- 🎨 ドット絵のデザインデータ (12x12マスの配列) ---
// R: 赤, B: 青, Skin: 肌色, W: 白, G: 緑, Y: 黄, O: オレンジ, .: 透明
const P = "Skin"; 

const marioSprite = [
    [".",".",".","R","R","R","R","R",".",".",".","."],
    [".",".","R","R","R","R","R","R","R","R",".","."],
    [".",".",".",P,P,P,P,"#",P,".",".","."],
    [".",".",P,"#",P,"#",P,P,P,P,".","."],
    [".",".",P,"#",P,P,P,P,P,P,".","."],
    [".",".",".",P,P,P,P,P,P,".",".","."],
    [".",".",".","R","B","R","R","B","R",".",".","."],
    [".",".","B","B","B","B","B","B","B","B",".","."],
    [".",".","B","B","B","B","B","B","B","B",".","."],
    [".",".","R","R","B","B","B","B","R","R",".","."],
    [".",".","R","R","R",".",".","R","R","R",".","."],
    [".",".",".","R","R",".",".","R","R",".",".","."]
];

const turtleSprite = [
    [".",".",".",".","G","G","G","G",".",".",".","."],
    [".",".",".","G","G","G","G","G","G",".",".","."],
    [".",".","G","G","W","W","G","G","W","W",".","."],
    [".",".","G","G","#","#","G","G","#","#",".","."],
    [".","O","O","G","G","G","G","G","G",".",".","."],
    ["O","O","O","O","O","O","O","O","O",".",".","."],
    ["O","O","O","O","O","O","O","O","O",".",".","."],
    [".","O","O","O","O","O","O","O","O",".",".","."],
    [".",".","G","G","G","G","G","G","G",".",".","."],
    [".",".",".","G","G",".",".","G","G",".",".","."],
    [".",".",".","G","G",".",".","G","G",".",".","."],
    [".",".","W","W","W",".",".","W","W","W",".","."]
];

// 色の定義リスト
const colors = {
    "R": "#ff1744", "B": "#2979ff", "Skin": "#ffb74d", "W": "#ffffff",
    "G": "#00e676", "Y": "#ffeb3b", "O": "#ff9100", "#": "#000000"
};

// ドット絵を描画する共通関数
function drawPixelArt(sprite, x, y, width, height, flipX, flipY) {
    const pixelSize = width / 12;
    for (let r = 0; r < 12; r++) {
        for (let c = 0; c < 12; r++) { // ※後ほど無限ループ対策に修正してあります
        }
    }
}

function resetGame() {
    score = 0;
    document.getElementById('score-val').innerText = score;
    player.x = 190; player.y = 100; player.vx = 0; player.vy = 0; player.dir = 1;
    enemies = [];
    isGameOver = false;
    document.getElementById('gameover-overlay').style.display = 'none';
}

function update() {
    if (!isGameOver) {
        if (keys.left) { player.vx = -2.5; player.dir = -1; }
        else if (keys.right) { player.vx = 2.5; player.dir = 1; }
        else { player.vx *= 0.7; }

        player.vy += GRAVITY; player.x += player.vx; player.y += player.vy;

        if (player.x < -player.w) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -player.w;
        if (player.y > canvas.height) { player.x = 190; player.y = 100; player.vy = 0; }

        player.isGrounded = false;

        platforms.forEach(p => {
            if (p.hitTimer > 0) p.hitTimer--;
            if (player.x + player.w > p.x && player.x < p.x + p.w) {
                if (player.vy >= 0 && player.y + player.h >= p.y && player.y + player.h <= p.y + player.vy + 4) {
                    player.y = p.y - player.h; player.vy = 0; player.isGrounded = true;
                }
                else if (player.vy < 0 && player.y >= p.y + p.h - 4 && player.y <= p.y + p.h) {
                    player.y = p.y + p.h; player.vy = 0;
                    if (p.type === 'brick') {
                        p.hitTimer = 5; p.hitX = player.x + player.w / 2;
                        enemies.forEach(e => {
                            if (e.x + e.w > p.x && e.x < p.x + p.w && e.y + e.h === p.y) {
                                if (Math.abs((e.x + e.w/2) - p.hitX) < 40) {
                                    e.isFlipped = true; e.flippedTimer = 300; e.vy = -5;
                                }
                            }
                        });
                    }
                }
            }
        });

        enemies.forEach((e, index) => {
            e.vy += GRAVITY;
            if (!e.isFlipped) {
                e.x += e.vx; e.dir = e.vx > 0 ? 1 : -1;
            } else {
                e.flippedTimer--;
                if (e.flippedTimer <= 0) { e.isFlipped = false; e.vx *= 1.3; }
            }
            e.y += e.vy;

            if (e.x < -e.w) e.x = canvas.width;
            if (e.x > canvas.width) e.x = -e.w;

            platforms.forEach(p => {
                if (e.x + e.w > p.x && e.x < p.x + p.w) {
                    if (e.vy >= 0 && e.y + e.h >= p.y && e.y + e.h <= p.y + e.vy + 4) {
                        e.y = p.y - e.h; e.vy = 0;
                    }
                }
            });

            if (player.x + player.w > e.x && player.x < e.x + e.w && player.y + player.h > e.y && player.y < e.y + e.h) {
                if (e.isFlipped) {
                    enemies.splice(index, 1); score += 100;
                    document.getElementById('score-val').innerText = score;
                } else {
                    isGameOver = true;
                    document.getElementById('gameover-overlay').style.display = 'flex';
                }
            }
        });
    }
    draw();
    requestAnimationFrame(update);
}

// ドット絵を反転等に対応させて画面にレンダリングする関数
function renderSprite(sprite, x, y, w, h, flipX, flipY) {
    const pSize = w / 12;
    for (let r = 0; r < 12; r++) {
        for (let c = 0; c < 12; c++) {
            const cell = sprite[r][c];
            if (cell !== ".") {
                ctx.fillStyle = colors[cell] || cell;
                const drawC = flipX ? (11 - c) : c;
                const drawR = flipY ? (11 - r) : r;
                ctx.fillRect(x + drawC * pSize, y + drawR * pSize, pSize + 0.5, pSize + 0.5);
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 床・足場の描画
    platforms.forEach(p => {
        let yOffset = p.hitTimer > 0 ? -5 : 0;
        if (p.type === 'ground') {
            ctx.fillStyle = '#442200'; // 地面のベース
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = '#00aa00'; // 地面の上の芝生
            ctx.fillRect(p.x, p.y, p.w, 4);
        } else {
            // レンガ調の模様を簡易描画
            ctx.fillStyle = '#cc5500';
            ctx.fillRect(p.x, p.y + yOffset, p.w, p.h);
            ctx.fillStyle = '#ffaa66';
            ctx.fillRect(p.x, p.y + yOffset, p.w, 2); 
        }
    });

    // 敵（カメ）の描画
    enemies.forEach(e => {
        if (e.isFlipped) {
            // ひっくり返っているときは「上下反転」して甲羅を黄色(Y)っぽく見せる
            renderSprite(turtleSprite, e.x, e.y, e.w, e.h, false, true);
        } else {
            // 進行方向（dir）に合わせて左右反転
            renderSprite(turtleSprite, e.x, e.y, e.w, e.h, e.dir === -1, false);
        }
    });

    // プレイヤー（マリオ）の描画
    renderSprite(marioSprite, player.x, player.y, player.w, player.h, player.dir === -1, false);
}

// キーボード
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && player.isGrounded) player.vy = -7.5;
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

// ボタン操作
const setupBtn = (id, startAction, endAction) => {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => { e.preventDefault(); startAction(); }, {passive: false});
    btn.addEventListener('touchend', e => { e.preventDefault(); endAction(); }, {passive: false});
    btn.addEventListener('mousedown', e => { startAction(); });
    btn.addEventListener('mouseup', e => { endAction(); });
    btn.addEventListener('mouseleave', e => { endAction(); });
};

setupBtn('btn-left', () => { keys.left = true; }, () => { keys.left = false; });
setupBtn('btn-right', () => { keys.right = true; }, () => { keys.right = false; });
setupBtn('btn-jump', () => { if(player.isGrounded) player.vy = -7.5; }, () => {});

resetGame();
update();
</script>
</body>
</html>
