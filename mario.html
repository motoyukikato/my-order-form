<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Bros Mini</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0; padding: 0;
            overflow: hidden;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        #top-bar {
            width: 100%; height: 40px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: #111; font-weight: bold;
        }
        #main-layout {
            display: flex; flex: 1; width: 100%; max-width: 800px;
            align-items: center; justify-content: center; padding: 10px; gap: 15px;
        }
        #game-container { position: relative; border: 4px solid #555; background-color: #000; }
        canvas { display: block; max-height: calc(100vh - 120px); max-width: calc(100vw - 260px); object-fit: contain; }
        
        /* コントローラーの配置を絶対にはみ出さないように固定 */
        .pad-cluster { display: block; width: 100px; height: 100px; position: relative; flex-shrink: 0; }
        .ctrl-btn {
            position: absolute; background: #333; border: 2px solid #fff; color: #fff;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; border-radius: 10px;
        }
        .ctrl-btn:active { background: #666; }
        #btn-left  { top: 26px; left: 0; }
        #btn-right { top: 26px; right: 0; }
        #btn-jump  { top: 26px; right: 10px; width: 60px; height: 60px; border-radius: 50%; background: #ff1744; }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); z-index: 10;
        }
        .overlay-title { font-size: 24px; color: #ff1744; margin-bottom: 15px; }
        .overlay-btn { background: #222; border: 2px solid #fff; padding: 8px 16px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div>SCORE: <span id="score-val">0</span></div>
        <div style="color: #ff9100;">左右キーで動いてJUMP！</div>
    </div>

    <div id="main-layout">
        <div class="pad-cluster" id="left-pad">
            <div class="ctrl-btn" id="btn-left">←</div>
            <div class="ctrl-btn" id="btn-right">→</div>
        </div>

        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            <div id="gameover-overlay" class="overlay" onclick="resetGame()">
                <div class="overlay-title">GAME OVER</div>
                <div class="overlay-btn">もういちど遊ぶ</div>
            </div>
        </div>

        <div class="pad-cluster" id="right-pad">
            <div class="ctrl-btn" id="btn-jump">JUMP</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 400;
canvas.height = 300;

const GRAVITY = 0.4;
let score = 0;
let isGameOver = false;

// ボタンの押しっぱなし状態を管理
const keys = { left: false, right: false };

// 🔴 キャラクター（マリオ）の初期位置を完全に中央の空中に固定
const player = {
    x: 190,
    y: 100, // 上空からふわっと落ちてくるように設定
    w: 16,
    h: 22,
    vx: 0,
    vy: 0,
    isGrounded: false
};

// 固定の足場
const platforms = [
    { x: 0, y: 280, w: 400, h: 20, type: 'ground' },
    { x: 0, y: 210, w: 140, h: 10, type: 'brick' },
    { x: 260, y: 210, w: 140, h: 10, type: 'brick' },
    { x: 80, y: 140, w: 240, h: 10, type: 'brick' },
    { x: 0, y: 70, w: 120, h: 10, type: 'brick' },
    { x: 280, y: 70, w: 120, h: 10, type: 'brick' }
];
platforms.forEach(p => { p.hitTimer = 0; p.hitX = 0; });

let enemies = [];
function spawnEnemy() {
    if (isGameOver) return;
    const isLeft = Math.random() > 0.5;
    enemies.push({
        x: isLeft ? 10 : 380, y: 30, w: 14, h: 14,
        vx: isLeft ? 1.2 : -1.2, vy: 0,
        isFlipped: false, flippedTimer: 0
    });
}

// 敵出現タイマー
let enemyInterval = setInterval(spawnEnemy, 3500);

function resetGame() {
    score = 0;
    document.getElementById('score-val').innerText = score;
    // リセット時も確実に中央の空中に戻す
    player.x = 190; player.y = 100; player.vx = 0; player.vy = 0;
    enemies = [];
    isGameOver = false;
    document.getElementById('gameover-overlay').style.display = 'none';
}

function update() {
    if (!isGameOver) {
        // 左右の移動速度を計算
        if (keys.left) {
            player.vx = -3.0;
        } else if (keys.right) {
            player.vx = 3.0;
        } else {
            player.vx *= 0.7; // 指を離したら滑らかに止まる
        }

        player.vy += GRAVITY;
        player.x += player.vx;
        player.y += player.vy;

        // 画面端ワープ処理
        if (player.x < -player.w) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -player.w;

        // 画面の下に落ちてしまった場合の緊急救済
        if (player.y > canvas.height) {
            player.x = 190; player.y = 100; player.vy = 0;
        }

        player.isGrounded = false;

        // 床との当たり判定
        platforms.forEach(p => {
            if (p.hitTimer > 0) p.hitTimer--;
            if (player.x + player.w > p.x && player.x < p.x + p.w) {
                // 着地
                if (player.vy >= 0 && player.y + player.h >= p.y && player.y + player.h <= p.y + player.vy + 4) {
                    player.y = p.y - player.h;
                    player.vy = 0;
                    player.isGrounded = true;
                }
                // 頭突き
                else if (player.vy < 0 && player.y >= p.y + p.h - 4 && player.y <= p.y + p.h) {
                    player.y = p.y + p.h;
                    player.vy = 0;
                    if (p.type === 'brick') {
                        p.hitTimer = 5;
                        p.hitX = player.x + player.w / 2;
                        enemies.forEach(e => {
                            if (e.x + e.w > p.x && e.x < p.x + p.w && e.y + e.h === p.y) {
                                if (Math.abs((e.x + e.w/2) - p.hitX) < 40) {
                                    e.isFlipped = true;
                                    e.flippedTimer = 300;
                                    e.vy = -4;
                                }
                            }
                        });
                    }
                }
            }
        });

        // 敵の移動と判定
        enemies.forEach((e, index) => {
            e.vy += GRAVITY;
            if (!e.isFlipped) e.x += e.vx;
            else {
                e.flippedTimer--;
                if (e.flippedTimer <= 0) { e.isFlipped = false; e.vx *= 1.2; }
            }
            e.y += e.vy;

            if (e.x < -e.w) e.x = canvas.width;
            if (e.x > canvas.width) e.x = -e.w;

            platforms.forEach(p => {
                if (e.x + e.w > p.x && e.x < p.x + p.w) {
                    if (e.vy >= 0 && e.y + e.h >= p.y && e.y + e.h <= p.y + e.vy + 4) {
                        e.y = p.y - e.h; e.vy = 0;
                    }
                }
            });

            // 接触
            if (player.x + player.w > e.x && player.x < e.x + e.w && player.y + player.h > e.y && player.y < e.y + e.h) {
                if (e.isFlipped) {
                    enemies.splice(index, 1);
                    score += 100;
                    document.getElementById('score-val').innerText = score;
                } else {
                    isGameOver = true;
                    document.getElementById('gameover-overlay').style.display = 'flex';
                }
            }
        });
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 床の描画
    platforms.forEach(p => {
        ctx.fillStyle = p.type === 'ground' ? '#0066ff' : '#ff9933';
        let yOffset = p.hitTimer > 0 ? -4 : 0;
        ctx.fillRect(p.x, p.y + yOffset, p.w, p.h);
    });

    // 敵の描画
    enemies.forEach(e => {
        ctx.fillStyle = e.isFlipped ? '#ffeb3b' : '#00e676';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = '#000';
        ctx.fillRect(e.x + 2, e.y + 2, 2, 2);
        ctx.fillRect(e.x + e.w - 4, e.y + 2, 2, 2);
    });

    // 🔴 プレイヤー（赤の大きなカタマリ＋ハッキリ目立つ黄色の帽子に変更）
    ctx.fillStyle = '#ff1744'; // マリオの服（赤）
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#ffeb3b'; // 目立つように帽子を黄色に変更！
    ctx.fillRect(player.x, player.y, player.w, 6); 
}

// パソコン操作用
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && player.isGrounded) player.vy = -7.5;
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

// スマホ・マウス共通のタッチ判定
const setupBtn = (id, startAction, endAction) => {
    const btn = document.getElementById(id);
    
    // タッチデバイス用
    btn.addEventListener('touchstart', e => { e.preventDefault(); startAction(); }, {passive: false});
    btn.addEventListener('touchend', e => { e.preventDefault(); endAction(); }, {passive: false});
    
    // マウスクリック用（テストしやすくするため追加）
    btn.addEventListener('mousedown', e => { startAction(); });
    btn.addEventListener('mouseup', e => { endAction(); });
    btn.addEventListener('mouseleave', e => { endAction(); });
};

// パッドを強制表示させておく（確実性を上げるため）
document.getElementById('left-pad').style.display = 'block';
document.getElementById('right-pad').style.display = 'block';

// 各ボタンに機能をしっかりと登録
setupBtn('btn-left', () => { keys.left = true; }, () => { keys.left = false; });
setupBtn('btn-right', () => { keys.right = true; }, () => { keys.right = false; });
setupBtn('btn-jump', () => { if(player.isGrounded) player.vy = -7.5; }, () => {});

resetGame();
update();
</script>
</body>
</html>
