<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>注文分取り置き表（A4内4分割A6横 - 携帯画面・印刷サイズ完全修正版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
    /* ページ設定: A4用紙サイズ、余白なし */
    @page {
        size: A4 landscape;
        margin: 0;
    }
    
    *, *::before, *::after {
        box-sizing: border-box;
    }
    
    body {
        margin: 0;
        padding: 0;
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        background-color: #ffffff;
        color: #333333;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    /* 📄 A4横のピクセルサイズ（1122px × 794px）に厳密に完全固定 */
    .page-container {
        width: 1122px;
        height: 794px;
        overflow: hidden;
        position: relative;
        background-color: #ffffff;
    }

    /* 4分割（2列×2行）の配置（高さは794pxの半分＝397px） */
    .row {
        width: 1122px;
        height: 397px;
        display: block;
        clear: both;
    }

    /* A6横サイズ（幅561px × 高さ397px） */
    .a6-card {
        float: left;
        width: 561px;
        height: 397px;
        padding: 35px 45px;
        border-right: 1px dashed #aaaaaa;
        border-bottom: 1px dashed #aaaaaa;
        position: relative;
        background-color: #fff;
        cursor: pointer;
    }

    /* 画面表示時のみの案内表示 */
    @media screen {
        .a6-card::before {
            content: "タップして入力";
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 11px;
            color: #3498db;
            border: 1px solid #3498db;
            padding: 2px 6px;
            border-radius: 3px;
            background-color: #fff;
        }
    }

    /* 外枠の不要な点線をカット */
    .row:nth-child(2) .a6-card {
        border-bottom: none;
    }
    .a6-card:nth-child(2) {
        border-right: none;
    }

    /* カード内のレイアウト構築 */
    .card-header {
        border-bottom: 3px solid #2c3e50;
        padding-bottom: 10px;
        margin-bottom: 15px;
    }

    .header-table {
        width: 100%;
        border-collapse: collapse;
    }

    .header-table td {
        padding: 0;
        vertical-align: bottom;
    }

    /* 屋号 */
    .shop-name-label {
        font-size: 13px;
        color: #7f8c8d;
        display: block;
        margin-bottom: 4px;
    }
    .shop-name {
        font-size: 32px;
        font-weight: bold;
        color: #2c3e50;
        line-height: 1.2;
        min-height: 40px;
        word-break: break-all;
    }

    /* 担当者・買参人番号 */
    .meta-info {
        font-size: 13px;
        color: #555555;
        text-align: right;
        line-height: 1.6;
        width: 45%;
    }
    .meta-value {
        font-weight: bold;
        color: #000;
        border-bottom: 1px solid #7f8c8d;
        display: inline-block;
        min-width: 90px;
        text-align: center;
    }

    /* メイン情報テーブル */
    .main-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 5px;
    }

    .main-table th, .main-table td {
        border: 1px solid #bdc3c7;
        padding: 12px 15px;
        vertical-align: middle;
    }

    .main-table th {
        background-color: #f8f9fa;
        color: #34495e;
        font-size: 15px;
        font-weight: bold;
        width: 30%;
        text-align: left;
    }

    .main-table td {
        font-size: 20px;
        font-weight: bold;
        color: #000000;
        min-height: 35px;
        word-break: break-all;
    }

    /* 各用紙の右下に固定配置 */
    .footer-signature {
        position: absolute;
        bottom: 12px;
        right: 25px;
        font-size: 12px;
        color: #7f8c8d;
        font-weight: 500;
    }

    /* 印刷時の設定 */
    @media print {
        .no-print {
            display: none !important;
        }
        .a6-card::before {
            display: none !important;
        }
        body {
            background-color: #fff;
        }
    }

    /* 画面表示用の固定操作パネル */
    @media screen {
        body {
            background-color: #e6ecf0;
            padding-top: 20px;
            padding-bottom: 40px;
        }
        .control-panel {
            width: 100%;
            max-width: 1122px;
            margin: 0 auto 15px auto;
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .panel-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-cell.left {
            flex: 1;
        }
        .btn-action {
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
            white-space: nowrap;
        }
        .print-btn {
            background-color: #2ecc71;
            box-shadow: 0 3px 0 #27ae60;
        }
        .pdf-btn {
            background-color: #e67e22;
            box-shadow: 0 3px 0 #d35400;
        }
        
        /* 画面上での縮小表示用コンテナ */
        .preview-wrapper {
            width: 100%;
            max-width: 1122px;
            margin: 0 auto;
            overflow: auto;
        }
        .page-container {
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
    }

    /* ポップアップモダールの標準スタイル（PC用） */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        z-index: 9999;
    }
    .modal-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: white;
        padding: 25px;
        border-radius: 8px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        color: #333;
    }
    .modal-header {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 15px;
        border-bottom: 2px solid #34495e;
        padding-bottom: 8px;
        color: #2c3e50;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 5px;
        color: #555;
    }
    .form-control {
        width: 100%;
        padding: 8px 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .form-control:focus {
        border-color: #3498db;
        outline: none;
    }
    .modal-footer {
        text-align: right;
        margin-top: 20px;
        border-top: 1px solid #eee;
        padding-top: 15px;
    }
    .btn {
        padding: 10px 20px;
        font-size: 15px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        border: none;
        margin-left: 10px;
    }
    .btn-close {
        background-color: #95a5a6;
        color: white;
    }
    .btn-save {
        background-color: #3498db;
        color: white;
    }

    /* 📱 携帯（スマートフォン）画面のときの特別スタイル設定 */
    @media screen and (max-width: 768px) {
        body {
            padding: 10px;
            background-color: #e6ecf0;
        }
        .panel-flex {
            display: block !important;
        }
        .panel-cell.right {
            margin-top: 12px;
            text-align: center !important;
            display: flex;
            justify-content: space-between;
        }
        .btn-action {
            width: 48%;
            padding: 12px 5px !important;
            font-size: 13px !important;
            margin: 0 !important;
            text-align: center;
        }
        
        /* 画面上では横スクロールで全体が見えるように */
        .preview-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 📱 携帯画面のときはポップアップを画面いっぱいに広げる仕様を再適用 */
        .modal-overlay .modal-content {
            width: 96% !important;
            max-width: 100% !important;
            height: 94% !important;
            top: 3% !important;
            left: 2% !important;
            transform: none !important;
            padding: 15px !important;
            overflow-y: auto;
            border-radius: 12px !important;
        }
        .modal-header {
            font-size: 18px !important;
            margin-bottom: 12px !important;
        }
        .form-group {
            margin-bottom: 10px !important;
        }
        .form-group-half {
            display: inline-block !important;
            width: 48% !important;
        }
        .form-group-half:first-of-type {
            margin-right: 4% !important;
        }
        .form-control {
            padding: 12px 10px !important;
            font-size: 16px !important; /* iOSの画面自動ズーム防止 */
            color: #000;
        }
        .modal-footer {
            margin-top: 15px !important;
            padding-top: 10px !important;
            text-align: center !important;
        }
        .modal-footer .btn {
            width: 45%;
            padding: 14px 10px !important;
            font-size: 15px !important;
            margin: 0 2% !important;
        }
    }
</style>
</head>
<body>

    <div class="no-print control-panel">
        <div class="panel-flex">
            <div class="panel-cell left">
                <strong>【注文分取り置き表（携帯・印刷両対応版）】</strong><br>
                枠をタップして入力後、オレンジ色のボタンを押してPDFを保存してください。<br>
                保存したPDFをCanonアプリからそのまま印刷してください。
            </div>
            <div class="panel-cell right">
                <button class="btn-action pdf-btn" onclick="exportToPDF()">📄 PDFを作成・保存</button>
                <button class="btn-action print-btn" onclick="window.print()">🖨️ 直接印刷</button>
            </div>
        </div>
    </div>

    <div class="preview-wrapper">
        <div id="print-area" class="page-container">
            
            <div class="row">
                <div class="a6-card" onclick="openModal(1)">
                    <div class="card-header">
                        <table class="header-table">
                            <tr>
                                <td>
                                    <span class="shop-name-label">屋号</span>
                                    <div id="view-shop-1" class="shop-name"></div>
                                </td>
                                <td class="meta-info">
                                    <div class="meta-item">担当者: <span id="view-staff-1" class="meta-value"></span></div>
                                    <div class="meta-item">買参人番号: <span id="view-buyer-1" class="meta-value"></span></div>
                                </td>
                            </tr>
                        </table>
                    </div>
                    <table class="main-table">
                        <tr>
                            <th>伝票NO.</th>
                            <td id="view-slip-1"></td>
                        </tr>
                        <tr>
                            <th>メーカー名</th>
                            <td id="view-maker-1"></td>
                        </tr>
                        <tr>
                            <th>希望渡し日</th>
                            <td id="view-date-1"></td>
                        </tr>
                    </table>
                    <div class="footer-signature">名古屋花き商事本部</div>
                </div>

                <div class="a6-card" onclick="openModal(2)">
                    <div class="card-header">
                        <table class="header-table">
                            <tr>
                                <td>
                                    <span class="shop-name-label">屋号</span>
                                    <div id="view-shop-2" class="shop-name"></div>
                                </td>
                                <td class="meta-info">
                                    <div class="meta-item">担当者: <span id="view-staff-2" class="meta-value"></span></div>
                                    <div class="meta-item">買参人番号: <span id="view-buyer-2" class="meta-value"></span></div>
                                </td>
                            </tr>
                        </table>
                    </div>
                    <table class="main-table">
                        <tr>
                            <th>伝票NO.</th>
                            <td id="view-slip-2"></td>
                        </tr>
                        <tr>
                            <th>メーカー名</th>
                            <td id="view-maker-2"></td>
                        </tr>
                        <tr>
                            <th>希望渡し日</th>
                            <td id="view-date-2"></td>
                        </tr>
                    </table>
                    <div class="footer-signature">名古屋花き商事本部</div>
                </div>
            </div>

            <div class="row">
                <div class="a6-card" onclick="openModal(3)">
                    <div class="card-header">
                        <table class="header-table">
                            <tr>
                                <td>
                                    <span class="shop-name-label">屋号</span>
                                    <div id="view-shop-3" class="shop-name"></div>
                                </td>
                                <td class="meta-info">
                                    <div class="meta-item">担当者: <span id="view-staff-3" class="meta-value"></span></div>
                                    <div class="meta-item">買参人番号: <span id="view-buyer-3" class="meta-value"></span></div>
                                </td>
                            </tr>
                        </table>
                    </div>
                    <table class="main-table">
                        <tr>
                            <th>伝票NO.</th>
                            <td id="view-slip-3"></td>
                        </tr>
                        <tr>
                            <th>メーカー名</th>
                            <td id="view-maker-3"></td>
                        </tr>
                        <tr>
                            <th>希望渡し日</th>
                            <td id="view-date-3"></td>
                        </tr>
                    </table>
                    <div class="footer-signature">名古屋花き商事本部</div>
                </div>

                <div class="a6-card" onclick="openModal(4)">
                    <div class="card-header">
                        <table class="header-table">
                            <tr>
                                <td>
                                    <span class="shop-name-label">屋号</span>
                                    <div id="view-shop-4" class="shop-name"></div>
                                </td>
                                <td class="meta-info">
                                    <div class="meta-item">担当者: <span id="view-staff-4" class="meta-value"></span></div>
                                    <div class="meta-item">買参人番号: <span id="view-buyer-4" class="meta-value"></span></div>
                                </td>
                            </tr>
                        </table>
                    </div>
                    <table class="main-table">
                        <tr>
                            <th>伝票NO.</th>
                            <td id="view-slip-4"></td>
                        </tr>
                        <tr>
                            <th>メーカー名</th>
                            <td id="view-maker-4"></td>
                        </tr>
                        <tr>
                            <th>希望渡し日</th>
                            <td id="view-date-4"></td>
                        </tr>
                    </table>
                    <div class="footer-signature">名古屋花き商事本部</div>
                </div>
            </div>

        </div>
    </div>

    <div id="inputModal" class="no-print modal-overlay">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">取り置き表 入力 (<span id="modal-target-num"></span>つ目の枠)</div>
            
            <div class="form-group">
                <label>屋号</label>
                <input type="text" id="input-shop" class="form-control" placeholder="例: 〇〇商店">
            </div>
            
            <div class="form-group form-group-half">
                <label>担当者</label>
                <input type="text" id="input-staff" class="form-control" placeholder="例: 山田">
            </div>
            <div class="form-group form-group-half">
                <label>買参人番号</label>
                <input type="text" id="input-buyer" class="form-control" placeholder="例: 1234">
            </div>

            <div class="form-group">
                <label>伝票NO.</label>
                <input type="text" id="input-slip" class="form-control" placeholder="例: No. 10452">
            </div>

            <div class="form-group">
                <label>メーカー名</label>
                <input type="text" id="input-maker" class="form-control" placeholder="例: 〇〇農園">
            </div>

            <div class="form-group">
                <label>希望渡し日</label>
                <input type="text" id="input-date" class="form-control" placeholder="例: 7月1日">
            </div>

            <div class="modal-footer">
                <button class="btn btn-close" onclick="closeModal()">戻る</button>
                <button class="btn btn-save" onclick="saveData()">反映する</button>
            </div>
        </div>
    </div>

    <script>
        let currentTargetId = null;

        const cardData = {
            1: { shop: '', staff: '', buyer: '', slip: '', maker: '', date: '' },
            2: { shop: '', staff: '', buyer: '', slip: '', maker: '', date: '' },
            3: { shop: '', staff: '', buyer: '', slip: '', maker: '', date: '' },
            4: { shop: '', staff: '', buyer: '', slip: '', maker: '', date: '' }
        };

        function openModal(id) {
            currentTargetId = id;
            document.getElementById('modal-target-num').innerText = id;
            
            document.getElementById('input-shop').value = cardData[id].shop;
            document.getElementById('input-staff').value = cardData[id].staff;
            document.getElementById('input-buyer').value = cardData[id].buyer;
            document.getElementById('input-slip').value = cardData[id].slip;
            document.getElementById('input-maker').value = cardData[id].maker;
            document.getElementById('input-date').value = cardData[id].date;
            
            document.getElementById('inputModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('inputModal').style.display = 'none';
            currentTargetId = null;
        }

        function saveData() {
            if (!currentTargetId) return;
            
            const id = currentTargetId;
            
            cardData[id].shop = document.getElementById('input-shop').value;
            cardData[id].staff = document.getElementById('input-staff').value;
            cardData[id].buyer = document.getElementById('input-buyer').value;
            cardData[id].slip = document.getElementById('input-slip').value;
            cardData[id].maker = document.getElementById('input-maker').value;
            cardData[id].date = document.getElementById('input-date').value;
            
            document.getElementById('view-shop-' + id).innerText = cardData[id].shop;
            document.getElementById('view-staff-' + id).innerText = cardData[id].staff;
            document.getElementById('view-buyer-' + id).innerText = cardData[id].buyer;
            document.getElementById('view-slip-' + id).innerText = cardData[id].slip;
            document.getElementById('view-maker-' + id).innerText = cardData[id].maker;
            document.getElementById('view-date-' + id).innerText = cardData[id].date;
            
            closeModal();
        }

        document.getElementById('inputModal').addEventListener('click', closeModal);

        function exportToPDF() {
            const element = document.getElementById('print-area');
            
            const opt = {
                margin:       0,
                filename:     'torioki_table.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true,
                    width: 1122,
                    height: 794 
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>

</body>
</html>
