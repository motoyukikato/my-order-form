<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>注文分取り置き表（A4内4分割A6横 - コピー枠移動修正版）</title>
<!-- html2pdf.js ライブラリの読み込み -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
    /* ページ設定: A4用紙サイズ、余白なし */
    @page {
        size: A4 landscape;
        margin: 0;
    }
    
    *, *::before, *::after {
        box-sizing: border-box;
    }
    
    body {
        margin: 0;
        padding: 0;
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        background-color: #e6ecf0;
        color: #333333;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    /* 📄 【最重要】印刷・PDF専用の絶対 A4サイズ（1122px × 794px） */
    .page-container {
        width: 1122px !important;
        height: 794px !important;
        min-width: 1122px !important;
        min-height: 794px !important;
        max-width: 1122px !important;
        max-height: 794px !important;
        overflow: hidden !important;
        position: relative !important;
        background-color: #ffffff !important;
        page-break-after: always !important; /* 印刷・PDF時にここで改ページ */
    }

    /* 画面表示時のページごとの隙間 */
    @media screen {
        .page-container {
            margin: 0 auto 30px auto !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
    }

    /* 4分割（高さは794pxの半分＝397px） */
    .row {
        width: 1122px !important;
        height: 397px !important;
        display: block !important;
        clear: both !important;
    }

    /* A6横サイズ（幅561px × 高さ397px） */
    .a6-card {
        float: left !important;
        width: 561px !important;
        height: 397px !important;
        padding: 25px 45px 35px 45px !important;
        border-right: 1px dashed #aaaaaa !important;
        border-bottom: 1px dashed #aaaaaa !important;
        position: relative !important;
        background-color: #fff !important;
        cursor: pointer;
    }

    /* 画面表示時のみの案内表示 */
    @media screen {
        .a6-card::before {
            content: "タップして修正";
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 11px;
            color: #3498db;
            border: 1px solid #3498db;
            padding: 2px 6px;
            border-radius: 3px;
            background-color: #fff;
        }
        .a6-card:hover {
            background-color: #f1f9ff;
        }
    }

    /* 外枠の不要な点線をカット */
    .row:nth-child(2) .a6-card {
        border-bottom: none !important;
    }
    .a6-card:nth-child(2) {
        border-right: none !important;
    }

    /* カード内のレイアウト構築 */
    .card-header {
        border-bottom: 3px solid #2c3e50;
        padding-bottom: 10px;
        margin-bottom: 15px;
    }

    .header-table {
        width: 100%;
        border-collapse: collapse;
    }

    .header-table td {
        padding: 0;
        vertical-align: bottom;
    }

    /* 屋号 */
    .shop-name-label {
        font-size: 13px;
        color: #7f8c8d;
        display: block;
        margin-bottom: 4px;
    }
    .shop-name {
        font-size: 32px;
        font-weight: bold;
        color: #2c3e50;
        line-height: 1.2;
        min-height: 40px;
        word-break: break-all;
    }

    /* 担当者・買参人番号 */
    .meta-info {
        font-size: 13px;
        color: #555555;
        text-align: right;
        line-height: 1.6;
        width: 45%;
    }
    .meta-value {
        font-weight: bold;
        color: #000;
        border-bottom: 1px solid #7f8c8d;
        display: inline-block;
        min-width: 90px;
        text-align: center;
    }

    /* メイン情報テーブル */
    .main-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 5px;
    }

    .main-table th, .main-table td {
        border: 1px solid #bdc3c7;
        padding: 10px 15px;
        vertical-align: middle;
    }

    .main-table th {
        background-color: #f8f9fa;
        color: #34495e;
        font-size: 15px;
        font-weight: bold;
        width: 30%;
        text-align: left;
    }

    .main-table td {
        font-size: 20px;
        font-weight: bold;
        color: #000000;
        min-height: 35px;
        word-break: break-all;
    }

    /* 個口数表示エリア */
    .koguchi-container {
        margin-top: 15px;
        text-align: left;
        font-size: 15px;
        font-weight: bold;
        color: #34495e;
    }
    .koguchi-display {
        font-size: 24px;
        font-weight: bold;
        color: #000000;
        margin-left: 20px;
        letter-spacing: 2px;
    }

    /* 各用紙の右下に固定配置 */
    .footer-signature {
        position: absolute;
        bottom: 12px;
        right: 25px;
        font-size: 12px;
        color: #7f8c8d;
        font-weight: 500;
    }

    /* 印刷時の設定 */
    @media print {
        .no-print {
            display: none !important;
        }
        .a6-card::before {
            display: none !important;
        }
        body {
            background-color: #fff;
        }
    }

    /* 画面表示用の固定操作パネル */
    @media screen {
        body {
            padding-top: 20px;
            padding-bottom: 40px;
        }
        .control-panel {
            width: 100%;
            max-width: 1122px;
            margin: 0 auto 15px auto;
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .panel-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-cell.left {
            flex: 1;
        }
        .csv-input-wrapper {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .csv-label {
            background-color: #34495e;
            border: 1px solid #5d6d7e;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .csv-label:hover {
            background-color: #4e5d6c;
        }
        #csv-file {
            display: none;
        }
        .btn-action {
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
            white-space: nowrap;
        }
        .print-btn {
            background-color: #2ecc71;
            box-shadow: 0 3px 0 #27ae60;
        }
        .pdf-btn {
            background-color: #e67e22;
            box-shadow: 0 3px 0 #d35400;
        }
        
        /* 画面上での縮小表示用コンテナ */
        .preview-wrapper {
            width: 100%;
            max-width: 1122px;
            margin: 0 auto;
        }
    }

    /* ポップアップモダールの標準スタイル（PC用） */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        z-index: 9999;
    }
    .modal-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: white;
        padding: 25px;
        border-radius: 8px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        color: #333;
    }
    .modal-header {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 15px;
        border-bottom: 2px solid #34495e;
        padding-bottom: 8px;
        color: #2c3e50;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 5px;
        color: #555;
    }
    .form-control {
        width: 100%;
        padding: 8px 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .form-control:focus {
        border-color: #3498db;
        outline: none;
    }
    .modal-footer {
        text-align: right;
        margin-top: 20px;
        border-top: 1px solid #eee;
        padding-top: 15px;
    }
    .btn {
        padding: 10px 20px;
        font-size: 15px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        border: none;
        margin-left: 10px;
    }
    .btn-close {
        background-color: #95a5a6;
        color: white;
    }
    .btn-save {
        background-color: #3498db;
        color: white;
    }
    /* コピーボタン専用のデザイン */
    .btn-copy {
        background-color: #9b59b6;
        color: white;
        float: left;
    }
    .btn-copy:hover {
        background-color: #8e44ad;
    }

    /* 📱 携帯（スマートフォン）画面のときの特別スタイル設定 */
    @media screen and (max-width: 768px) {
        body {
            padding: 10px;
        }
        .panel-flex {
            display: block !important;
        }
        .csv-input-wrapper {
            margin-top: 12px;
            justify-content: center;
        }
        .panel-cell.right {
            margin-top: 15px;
            text-align: center !important;
            display: flex;
            justify-content: space-between;
        }
        .btn-action {
            width: 48%;
            padding: 12px 5px !important;
            font-size: 13px !important;
            margin: 0 !important;
            text-align: center;
        }
        
        .preview-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 📱 携帯画面用のポップアップ大画面化 */
        .modal-overlay .modal-content {
            width: 96% !important;
            max-width: 100% !important;
            height: 94% !important;
            top: 3% !important;
            left: 2% !important;
            transform: none !important;
            padding: 15px !important;
            overflow-y: auto;
            border-radius: 12px !important;
        }
        .modal-header {
            font-size: 18px !important;
            margin-bottom: 12px !important;
        }
        .form-group {
            margin-bottom: 10px !important;
        }
        .form-group-half {
            display: inline-block !important;
            width: 48% !important;
        }
        .form-group-half:first-of-type {
            margin-right: 4% !important;
        }
        .form-control {
            padding: 12px 10px !important;
            font-size: 16px !important;
            color: #000;
        }
        .modal-footer {
            margin-top: 15px !important;
            padding-top: 10px !important;
            text-align: center !important;
        }
        .modal-footer .btn {
            width: 31%;
            padding: 12px 5px !important;
            font-size: 13px !important;
            margin: 0 1% !important;
        }
        .btn-copy {
            float: none;
        }
    }
</style>
</head>
<body>

    <!-- 操作パネル -->
    <div class="no-print control-panel">
        <div class="panel-flex">
            <div class="panel-cell left">
                <strong>【注文分取り置き表（コピー配置修正版）】</strong><br>
                枠をタップして手動入力、またはCSVファイルから一括作成が可能です。<br>
                <div class="csv-input-wrapper">
                    <label for="csv-file" class="csv-label">📂 CSVファイルを選択</label>
                    <input type="file" id="csv-file" accept=".csv" onchange="loadCSV(this)">
                    <span id="csv-status" style="font-size:12px; color:#bdc3c7;">ファイルを読み込んでください</span>
                </div>
            </div>
            <div class="panel-cell right">
                <button class="btn-action pdf-btn" onclick="exportToPDF()">📄 PDFを一括保存</button>
                <button class="btn-action print-btn" onclick="window.print()">🖨️ 直接印刷</button>
            </div>
        </div>
    </div>

    <!-- 画面用プレビューラッパー -->
    <div class="preview-wrapper" id="print-area">
        <!-- 初期状態用の空のA4シート（データがないとき用） -->
        <div class="page-container" id="page-1">
            <div class="row">
                <div class="a6-card" onclick="openModal(0)">
                    <div class="card-header">
                        <table class="header-table"><tr><td><span class="shop-name-label">屋号</span><div id="view-shop-0" class="shop-name"></div></td><td class="meta-info"><div class="meta-item">担当者: <span id="view-staff-0" class="meta-value"></span></div><div class="meta-item">買参人番号: <span id="view-buyer-0" class="meta-value"></span></div></td></tr></table>
                    </div>
                    <table class="main-table">
                        <tr><th>伝票NO.</th><td id="view-slip-0"></td></tr>
                        <tr><th>メーカー名</th><td id="view-maker-0"></td></tr>
                        <tr><th>希望渡し日</th><td id="view-date-0"></td></tr>
                    </table>
                    <div class="koguchi-container">個口数:<span id="view-koguchi-0" class="koguchi-display"></span></div>
                    <div class="footer-signature">名古屋花き商事本部</div>
                </div>
                <div class="a6-card" onclick="openModal(1)">
                    <div class="card-header">
                        <table class="header-table"><tr><td><span class="shop-name-label">屋号</span><div id="view-shop-1" class="shop-name"></div></td><td class="meta-info"><div class="meta-item">担当者: <span id="view-staff-1" class="meta-value"></span></div><div class="meta-item">買参人番号: <span id="view-buyer-1" class="meta-value"></span></div></td></tr></table>
                    </div>
                    <table class="main-table">
                        <tr><th>伝票NO.</th><td id="view-slip-1"></td></tr>
                        <tr><th>メーカー名</th><td id="view-maker-1"></td></tr>
                        <tr><th>希望渡し日</th><td id="view-date-1"></td></tr>
                    </table>
                    <div class="koguchi-container">個口数:<span id="view-koguchi-1" class="koguchi-display"></span></div>
                    <div class="footer-signature">名古屋花き商事本部</div>
                </div>
            </div>
            <div class="row">
                <div class="a6-card" onclick="openModal(2)">
                    <div class="card-header">
                        <table class="header-table"><tr><td><span class="shop-name-label">屋号</span><div id="view-shop-2" class="shop-name"></div></td><td class="meta-info"><div class="meta-item">担当者: <span id="view-staff-2" class="meta-value"></span></div><div class="meta-item">買参人番号: <span id="view-buyer-2" class="meta-value"></span></div></td></tr></table>
                    </div>
                    <table class="main-table">
                        <tr><th>伝票NO.</th><td id="view-slip-2"></td></tr>
                        <tr><th>メーカー名</th><td id="view-maker-2"></td></tr>
                        <tr><th>希望渡し日</th><td id="view-date-2"></td></tr>
                    </table>
                    <div class="koguchi-container">個口数:<span id="view-koguchi-2" class="koguchi-display"></span></div>
                    <div class="footer-signature">名古屋花き商事本部</div>
                </div>
                <div class="a6-card" onclick="openModal(3)">
                    <div class="card-header">
                        <table class="header-table"><tr><td><span class="shop-name-label">屋号</span><div id="view-shop-3" class="shop-name"></div></td><td class="meta-info"><div class="meta-item">担当者: <span id="view-staff-3" class="meta-value"></span></div><div class="meta-item">買参人番号: <span id="view-buyer-3" class="meta-value"></span></div></td></tr></table>
                    </div>
                    <table class="main-table">
                        <tr><th>伝票NO.</th><td id="view-slip-3"></td></tr>
                        <tr><th>メーカー名</th><td id="view-maker-3"></td></tr>
                        <tr><th>希望渡し日</th><td id="view-date-3"></td></tr>
                    </table>
                    <div class="koguchi-container">個口数:<span id="view-koguchi-3" class="koguchi-display"></span></div>
                    <div class="footer-signature">名古屋花き商事本部</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ポップアップモータル -->
    <div id="inputModal" class="no-print modal-overlay">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">取り置き表 入力・修正</div>
            
            <div class="form-group">
                <label>屋号</label>
                <input type="text" id="input-shop" class="form-control" placeholder="例: 〇〇商店">
            </div>
            
            <div class="form-group form-group-half">
                <label>担当者</label>
                <input type="text" id="input-staff" class="form-control" placeholder="例: 山田">
            </div>
            <div class="form-group form-group-half">
                <label>買参人番号</label>
                <input type="text" id="input-buyer" class="form-control" placeholder="例: 1234">
            </div>

            <div class="form-group">
                <label>伝票NO.</label>
                <input type="text" id="input-slip" class="form-control" placeholder="例: No. 10452">
            </div>

            <div class="form-group">
                <label>メーカー名</label>
                <input type="text" id="input-maker" class="form-control" placeholder="例: 〇〇農園">
            </div>

            <div class="form-group form-group-half">
                <label>希望渡し日 (例: 5/5 → 5月5日)</label>
                <input type="text" id="input-date" class="form-control" placeholder="例: 5/5">
            </div>
            <div class="form-group form-group-half">
                <label>個口数 (例: 1/3)</label>
                <input type="text" id="input-koguchi" class="form-control" placeholder="例: 1/3">
            </div>

            <div class="modal-footer">
                <button class="btn btn-copy" onclick="copyAndCreateNew()">📋 コピーして新枠追加</button>
                <button class="btn btn-close" onclick="closeModal()">戻る</button>
                <button class="btn btn-save" onclick="saveData()">反映する</button>
            </div>
        </div>
    </div>

    <script>
        let currentTargetIndex = null;
        let allItemsData = [
            { shop: '', staff: '', buyer: '', slip: '', maker: '', date: '', koguchi: '' },
            { shop: '', staff: '', buyer: '', slip: '', maker: '', date: '', koguchi: '' },
            { shop: '', staff: '', buyer: '', slip: '', maker: '', date: '', koguchi: '' },
            { shop: '', staff: '', buyer: '', slip: '', maker: '', date: '', koguchi: '' }
        ];

        function convertDateFormat(val) {
            if (!val) return '';
            const match = val.match(/^(\d{1,2})\/(\d{1,2})$/);
            if (match) {
                return `${parseInt(match[1], 10)}月${parseInt(match[2], 10)}日`;
            }
            return val;
        }

        function openModal(index) {
            currentTargetIndex = index;
            
            document.getElementById('input-shop').value = allItemsData[index].shop || '';
            document.getElementById('input-staff').value = allItemsData[index].staff || '';
            document.getElementById('input-buyer').value = allItemsData[index].buyer || '';
            document.getElementById('input-slip').value = allItemsData[index].slip || '';
            document.getElementById('input-maker').value = allItemsData[index].maker || '';
            document.getElementById('input-date').value = allItemsData[index].date || '';
            document.getElementById('input-koguchi').value = allItemsData[index].koguchi || '';
            
            document.getElementById('inputModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('inputModal').style.display = 'none';
            currentTargetIndex = null;
        }

        function saveData() {
            if (currentTargetIndex === null) return;
            const idx = currentTargetIndex;
            
            allItemsData[idx].shop = document.getElementById('input-shop').value;
            allItemsData[idx].staff = document.getElementById('input-staff').value;
            allItemsData[idx].buyer = document.getElementById('input-buyer').value;
            allItemsData[idx].slip = document.getElementById('input-slip').value;
            allItemsData[idx].maker = document.getElementById('input-maker').value;
            allItemsData[idx].date = document.getElementById('input-date').value;
            allItemsData[idx].koguchi = document.getElementById('input-koguchi').value;
            
            document.getElementById('view-shop-' + idx).innerText = allItemsData[idx].shop;
            document.getElementById('view-staff-' + idx).innerText = allItemsData[idx].staff;
            document.getElementById('view-buyer-' + idx).innerText = allItemsData[idx].buyer;
            document.getElementById('view-slip-' + idx).innerText = allItemsData[idx].slip;
            document.getElementById('view-maker-' + idx).innerText = allItemsData[idx].maker;
            document.getElementById('view-date-' + idx).innerText = convertDateFormat(allItemsData[idx].date);
            document.getElementById('view-koguchi-' + idx).innerText = allItemsData[idx].koguchi;
            
            closeModal();
        }

        // 📋 コピーして「同じ4分割の中の次の空き枠」または「新規ページ」に配置するよう修正
        function copyAndCreateNew() {
            const copiedData = {
                shop: document.getElementById('input-shop').value,
                staff: document.getElementById('input-staff').value,
                buyer: document.getElementById('input-buyer').value,
                slip: document.getElementById('input-slip').value,
                maker: document.getElementById('input-maker').value,
                date: document.getElementById('input-date').value,
                koguchi: document.getElementById('input-koguchi').value
            };

            // 現在の配列内に完全に「真っ白（空っぽ）」な枠があるか探す
            let emptyIndex = -1;
            for (let i = 0; i < allItemsData.length; i++) {
                if (!allItemsData[i].shop && !allItemsData[i].slip && !allItemsData[i].maker) {
                    emptyIndex = i;
                    break;
                }
            }

            if (emptyIndex !== -1) {
                // 同じ4分割の中などに空き枠があれば、そこに上書き（滑り込ませる）
                allItemsData[emptyIndex] = copiedData;
            } else {
                // すべての枠が埋まっている場合は、新しく配列の末尾に追加（新しいA4が生成される）
                allItemsData.push(copiedData);
                // 4の倍数になるよう調整
                while (allItemsData.length % 4 !== 0) {
                    allItemsData.push({ shop: '', staff: '', buyer: '', slip: '', maker: '', date: '', koguchi: '' });
                }
            }

            // 再描写
            renderAllPages();
            closeModal();
        }

        document.getElementById('inputModal').addEventListener('click', closeModal);

        function loadCSV(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                parseCSVToCards(text);
            };
            reader.readAsText(file, 'Shift_JIS'); 
        }

        function parseCSVToCards(text) {
            const lines = text.split(/\r\n|\n/);
            if (lines.length <= 1) return;

            allItemsData = [];

            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                const row = lines[i].split(',');
                
                allItemsData.push({
                    shop:  row[0] ? row[0].replace(/^"|"$/g, '').trim() : '',
                    staff: row[1] ? row[1].replace(/^"|"$/g, '').trim() : '',
                    buyer: row[2] ? row[2].replace(/^"|"$/g, '').trim() : '',
                    slip:  row[3] ? row[3].replace(/^"|"$/g, '').trim() : '',
                    maker: row[4] ? row[4].replace(/^"|"$/g, '').trim() : '',
                    date:  row[5] ? row[5].replace(/^"|"$/g, '').trim() : '',
                    koguchi: row[6] ? row[6].replace(/^"|"$/g, '').trim() : ''
                });
            }

            while (allItemsData.length < 4 || allItemsData.length % 4 !== 0) {
                allItemsData.push({ shop: '', staff: '', buyer: '', slip: '', maker: '', date: '', koguchi: '' });
            }

            renderAllPages();
        }

        function renderAllPages() {
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = '';

            const totalPages = Math.ceil(allItemsData.length / 4);
            
            for (let page = 0; page < totalPages; page++) {
                const pageContainer = document.createElement('div');
                pageContainer.className = 'page-container';
                pageContainer.id = `page-${page + 1}`;

                let pageHtml = '';
                pageHtml += '<div class="row">';
                for (let r = 0; r < 2; r++) {
                    pageHtml += createCardHtml(page * 4 + r);
                }
                pageHtml += '</div>';

                pageHtml += '<div class="row">';
                for (let r = 2; r < 4; r++) {
                    pageHtml += createCardHtml(page * 4 + r);
                }
                pageHtml += '</div>';

                pageContainer.innerHTML = pageHtml;
                printArea.appendChild(pageContainer);
            }

            document.getElementById('csv-status').innerText = `データ ${allItemsData.filter(d => d.shop || d.slip || d.maker).length}件 / A4用紙 ${totalPages}枚分を管理中`;
        }

        function createCardHtml(idx) {
            const data = allItemsData[idx];
            const formattedDate = convertDateFormat(data.date);
            return `
                <div class="a6-card" onclick="openModal(${idx})">
                    <div class="card-header">
                        <table class="header-table">
                            <tr>
                                <td>
                                    <span class="shop-name-label">屋号</span>
                                    <div id="view-shop-${idx}" class="shop-name">${data.shop}</div>
                                </td>
                                <td class="meta-info">
                                    <div class="meta-item">担当者: <span id="view-staff-${idx}" class="meta-value">${data.staff}</span></div>
                                    <div class="meta-item">買参人番号: <span id="view-buyer-${idx}" class="meta-value">${data.buyer}</span></div>
                                </td>
                            </tr>
                        </table>
                    </div>
                    <table class="main-table">
                        <tr><th>伝票NO.</th><td id="view-slip-${idx}">${data.slip}</td></tr>
                        <tr><th>メーカー名</th><td id="view-maker-${idx}">${data.maker}</td></tr>
                        <tr><th>希望渡し日</th><td id="view-date-${idx}">${formattedDate}</td></tr>
                    </table>
                    <div class="koguchi-container">個口数:<span id="view-koguchi-${idx}" class="koguchi-display">${data.koguchi || ''}</span></div>
                    <div class="footer-signature">名古屋花き商事本部</div>
                </div>
            `;
        }

        function exportToPDF() {
            const element = document.getElementById('print-area');
            
            const opt = {
                margin:       0,
                filename:     'torioki_all_pages.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true,
                    logging: false,
                    width: 1122,
                    height: element.offsetHeight
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' },
                pagebreak:    { mode: ['css', 'legacy'] }
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>

</body>
</html>
