<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋花き商事 - B2B Premium Order</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #c3a45e;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --input-bg: #262626;
            --text-main: #e0e0e0;
            --text-sub: #888;
            --accent-red: #ff4d4d;
        }

        body { 
            font-family: "Inter", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- UI Components --- */
        .app-header {
            padding: 30px 20px;
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
            text-align: left;
            border-bottom: 1px solid #333;
        }

        .app-header h1 { 
            font-size: 1.5rem; margin: 0; color: var(--gold); 
            letter-spacing: -0.02em; font-weight: 700;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px 120px; }

        .section-box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .label-text {
            display: block; font-size: 0.8rem; font-weight: 600;
            color: var(--gold); margin-bottom: 10px; text-transform: uppercase;
        }

        /* --- 配送オプション（セグメント制御） --- */
        .delivery-options {
            display: flex; background: var(--input-bg);
            padding: 4px; border-radius: 10px; margin-bottom: 15px;
        }
        .option-item {
            flex: 1; text-align: center; padding: 12px 5px;
            font-size: 0.85rem; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; color: var(--text-sub);
        }
        .option-item.active {
            background: var(--gold); color: #000; font-weight: bold;
        }

        /* --- 入力フィールド --- */
        input[type="text"], input[type="email"], input[type="number"], 
        input[type="date"], select, textarea {
            width: 100%; padding: 14px; background: var(--input-bg);
            border: 1px solid #333; border-radius: 10px; color: #fff;
            font-size: 1rem; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--gold); }

        /* --- 商品カード --- */
        .item-card {
            border-left: 3px solid var(--gold);
            background: #222; padding: 18px; border-radius: 12px;
            margin-bottom: 15px; position: relative;
        }
        .remove-circle {
            position: absolute; right: -10px; top: -10px;
            background: var(--accent-red); width: 24px; height: 24px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer; border: 2px solid var(--dark-bg);
        }

        /* --- ボタン --- */
        .add-btn {
            width: 100%; padding: 15px; background: transparent;
            border: 1px dashed var(--gold); color: var(--gold);
            border-radius: 12px; font-weight: bold; cursor: pointer;
            margin-bottom: 30px;
        }

        .footer-action {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px; background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px); border-top: 1px solid #333;
        }
        #sendBtn {
            width: 100%; padding: 18px; background: var(--gold);
            color: #000; border: none; border-radius: 14px;
            font-size: 1.1rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 20px rgba(195, 164, 94, 0.3);
        }

        /* 補助テキスト */
        .note-text { font-size: 0.75rem; color: var(--text-sub); margin-top: 6px; }
    </style>
</head>
<body>

<div class="app-header">
    <h1><i class="fas fa-gem"></i> NAGOYA KAKI</h1>
    <div id="userInfo" style="font-size: 11px; color: #555; margin-top: 5px;">Connecting...</div>
</div>

<div class="container">
    
    <div class="section-box">
        <span class="label-text"><i class="fas fa-shipping-fast"></i> 配送スピード設定</span>
        <div class="delivery-options" id="deliveryOptionGroup">
            <div class="option-item active" onclick="setDelivery('fast')">
                <i class="fas fa-bolt"></i><br>運賃かけて早く
            </div>
            <div class="option-item" onclick="setDelivery('normal')">
                <i class="fas fa-calendar-check"></i><br>注文時に同梱
            </div>
        </div>
        <input type="hidden" id="deliveryType" value="運賃かけて早くほしい">

        <label class="label-text" style="margin-top:20px;"><i class="fas fa-calendar-day"></i> 希望の渡し日</label>
        <input type="date" id="desiredDate">
        <p class="note-text">※別途、送料が発生する場合がございます。</p>
    </div>

    <div class="section-box">
        <span class="label-text"><i class="fas fa-store"></i> 店舗情報</span>
        <input type="text" id="storeName" placeholder="店名を入力" style="margin-bottom:15px;">
        <input type="email" id="email" placeholder="メールアドレス（控え送付先）">
    </div>

    <span class="label-text"><i class="fas fa-shopping-bag"></i> 注文内容</span>
    <div id="itemContainer">
        <div class="item-card">
            <div class="remove-circle" style="display:none;" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></div>
            <div style="display:flex; gap:10px; margin-bottom:12px;">
                <div style="flex:1">
                    <label class="note-text">行</label>
                    <select class="category-select" onchange="updateMakerOptions(this)">
                        <option value="">▼</option>
                        <option value="あ">あ</option><option value="か">か</option><option value="さ">さ</option>
                        <option value="た">た</option><option value="な">な</option><option value="は">は</option>
                        <option value="ま">ま</option><option value="や">や</option><option value="ら">ら</option>
                        <option value="わ">わ</option><option value="その他">他</option>
                    </select>
                </div>
                <div style="flex:2">
                    <label class="note-text">メーカー</label>
                    <select class="maker-select"><option value="">選択してください</option></select>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <div style="flex:2">
                    <label class="note-text">品番</label>
                    <input type="text" class="partNo-input" placeholder="品番">
                </div>
                <div style="flex:1">
                    <label class="note-text">数量</label>
                    <input type="number" class="quantity-input" value="1" min="1">
                </div>
            </div>
        </div>
    </div>

    <button type="button" class="add-btn" onclick="addNewItem()"><i class="fas fa-plus"></i> 商品を追加</button>

    <div class="section-box">
        <span class="label-text"><i class="fas fa-paperclip"></i> 補足情報</span>
        <input type="file" id="imageFile1" accept="image/*" style="border:none; padding:0; margin-bottom:10px;">
        <textarea id="comments" rows="3" placeholder="その他、本部への伝達事項"></textarea>
    </div>

</div>

<div class="footer-action">
    <button id="sendBtn" onclick="sendOrder()">注文を確定する</button>
</div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbyDMUsoLiBW26V0m6BBq7S5rIlhaCQXOPdG_2__V9E9aoFqyWEZikDuEE1K0Gc8r6d-/exec";
    
    // 配送オプションの切り替え
    function setDelivery(type) {
        const items = document.querySelectorAll('.option-item');
        const hiddenInput = document.getElementById('deliveryType');
        items.forEach(el => el.classList.remove('active'));
        
        if(type === 'fast') {
            items[0].classList.add('active');
            hiddenInput.value = "運賃かけて早くほしい";
        } else {
            items[1].classList.add('active');
            hiddenInput.value = "注文するタイミングで入れてほしい";
        }
    }

    // 商品追加
    function addNewItem() {
        const container = document.getElementById('itemContainer');
        const firstCard = container.querySelector('.item-card');
        const newCard = firstCard.cloneNode(true);
        newCard.querySelector('.remove-circle').style.display = 'flex';
        newCard.querySelectorAll('input').forEach(i => i.value = (i.type === 'number' ? 1 : ''));
        newCard.querySelector('.maker-select').innerHTML = '<option value="">選択してください</option>';
        container.appendChild(newCard);
    }

    // 以下、メーカーデータと送信ロジック（構造は維持）
    const allMakers = ["あいはらぼうえき:アイハラ貿易（ポリラフィア)", "あすかしょうかい:アスカ商会", "あずわん:アズワン（試験管）", "あもろーさ:アムールデフルール", "あんこーぽれーしょん:アンコーポレーション", "あーてぃふぃしゃる:アーティフィシャル", "あおやまりぼん:青山リボン", "あさひわいやー:朝日ワイヤー", "べるで:ヴェルデ", "おおちのうえん:大地農園", "おおぐちさんぎょう:大口産業", "だいてつ:大鉄", "だいどうくらふと:大同クラフト", "いんたーりんく:インターリンク", "だいせん:大仙", "うぉるなっと:ウォルナット", "えこぜりー:エコゼリー", "えるこみゅーん:エルコミューン", "えすあーるさーびす:SRサービス(デコジャリ）", "えいちつーおー:エイチツーオー", "かめやまきゃンドる:カメヤマキャンドル", "かるなっく:カルナック", "きゅーふら:Q-FLA", "くれい:クレイ", "くりざーる:クリザール", "くれえ:クレエ", "ぐりーんはうす:グリーンハウス", "きゃびのちぇ:キャビノチェ", "ぐりーんぽっと:グリーンポット", "ぐろーばるあろー:グローバルアロー", "こあとれーでぃんぐ:コアトレーディング", "こべんとがーでん:コベントガーデン", "さかげん:坂源", "さんわとれーでぃんぐ:三和トレーディング", "しもじま:シモジマ", "しせいはんぱい:志成販売", "すみざーずおあしす:スミザーズオアシス", "とやまはもの:外山刃物", "たなかとうき:田中陶器", "だるとん:ダルトン", "でるき:デルキ", "とうきょうりぼん:東京リボン", "とうきょうかんかん:東京かんかん", "とすだいす:TOSSDICE", "だんぼーる:段ボール", "とうきょうどう:東京堂", "とーく:トーク", "どりーむふぁーむすずか:ドリームファームスズカ", "とうか:東花", "とうほうぼうえき:東方貿易", "ねいちゃーでざいんず:ネイチャーデザインズ", "ぱれすかがく:パレス化学", "ぱれ:パレ", "ぽっしゅりびんぐ:ポッシュリビング", "ふぁーむ:FARM", "はなりんくす:花Links", "ふろーネット:flonet", "ほわいえ:ホワイエ", "は花のそのくぼた:花のそのくぼた", "ふろーるえばー:フロールエバー", "ふらわーべーす:フラワーベース", "ぷらすがーでん:プラスガーデン", "ぼぶくらふと:ボブクラフト", "まつむらこうげい:松村工芸", "ほしの:星野", "まぐねっと:マグネット", "まるこうせいとう:丸滉製陶", "まるまひらのとうきてん:丸又平野陶器店", "まるわぼうえき:丸和貿易", "みゅーるみる:ミュールミル", "むらたやさんぎょう:村田屋産業", "ものいんたーなしょなる:モノ・インターナショナル", "やまてー:ヤマテー", "やーど:yard", "ゆうぜん:友膳", "よこはまでぃすぷれいみゅーじあむ:横浜ディスプレイミュージアム", "ららいわんと:ラライワント", "りぶきゅりえいと:Lib curate", "りーどしょうじ:リード商事", "わさら:WASARA", "わんだーぞーん:ワンダーゾーン", "わこうかがく:和光化学"];

    function getKanaRow(kana) {
        const first = kana.charAt(0);
        if (/[あ-お]/.test(first)) return "あ";
        if (/[か-こが-ご]/.test(first)) return "か";
        if (/[さ-そざ-ぞ]/.test(first)) return "さ";
        if (/[た-とだ-ど]/.test(first)) return "た";
        if (/[な-の]/.test(first)) return "な";
        if (/[は-ほば-ぼぱ-ぽ]/.test(first)) return "は";
        if (/[ま-も]/.test(first)) return "ま";
        if (/[や-よ]/.test(first)) return "や";
        if (/[ら-ろ]/.test(first)) return "ら";
        if (/[わ-ん]/.test(first)) return "わ";
        return "その他";
    }

    function updateMakerOptions(catSelect) {
        const row = catSelect.value;
        const makerSelect = catSelect.closest('.item-card').querySelector('.maker-select');
        makerSelect.innerHTML = '<option value="">選択してください</option>';
        if (row === "その他") { makerSelect.innerHTML = '<option value="備考に記入">備考に記入</option>'; return; }
        allMakers.filter(item => getKanaRow(item.split(':')[0]) === row).forEach(item => {
            const name = item.split(':')[1];
            const opt = document.createElement('option');
            opt.value = opt.textContent = name;
            makerSelect.appendChild(opt);
        });
    }

    async function sendOrder() {
        const btn = document.getElementById('sendBtn');
        const storeName = document.getElementById('storeName').value;
        if (!storeName) { alert('店名を入力してください'); return; }

        btn.disabled = true;
        btn.innerText = "Processing...";

        const items = [];
        document.querySelectorAll('.item-card').forEach(card => {
            const m = card.querySelector('.maker-select').value;
            const p = card.querySelector('.partNo-input').value;
            const q = card.querySelector('.quantity-input').value;
            if (m) items.push({ maker: m, partNo: p, quantity: q });
        });

        const orderData = {
            storeName: storeName,
            email: document.getElementById('email').value,
            deliveryType: document.getElementById('deliveryType').value,
            desiredDate: document.getElementById('desiredDate').value,
            items: items,
            comments: document.getElementById('comments').value
        };

        try {
            await fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(orderData)
            });
            alert('注文が完了しました。');
            liff.closeWindow();
        } catch (e) {
            alert('送信に失敗しました');
            btn.disabled = false;
            btn.innerText = "注文を確定する";
        }
    }

    window.onload = async function() {
        try {
            await liff.init({ liffId: "2008835052-zCjbE0pV" });
            if (!liff.isLoggedIn()) liff.login();
            const profile = await liff.getProfile();
            document.getElementById('userInfo').textContent = "User: " + profile.displayName;
        } catch (e) { console.log(e); }
    };
</script>
</body>
</html>
