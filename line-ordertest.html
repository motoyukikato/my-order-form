<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋花き商事 本部受注アプリ - プレミアムオーダー</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* プレミアムブラック・パレット */
            --bg-depth-1: #1a1a1a; /* 背景最下層 */
            --bg-depth-2: #222222; /* カード背景 */
            --bg-depth-3: #2d2d2d; /* 入力フィールド */
            
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            
            /* アクセントカラー：シャンパンゴールド */
            --accent-color: #d4af37;
            --accent-hover: #f1c40f;
            
            --border-color: #3d3d3d;
            --shadow-premium: 0 10px 30px rgba(0,0,0,0.5);
            --transition: all 0.3s ease;
        }

        body { 
            font-family: 'optima', 'Hiragino Mincho ProN', 'serif'; /* 高級感のあるフォント */
            background-color: var(--bg-depth-1);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            letter-spacing: 0.05em;
        }

        /* ヘッダー：黒と金のコントラスト */
        .header-bar {
            background: linear-gradient(135deg, #000000 0%, #222222 100%);
            padding: 25px 15px;
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        h2 { 
            margin: 0; 
            font-size: 1.4rem; 
            font-weight: 300; 
            text-transform: uppercase;
            color: var(--accent-color);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        h2 i { font-size: 1.2rem; margin-right: 8px; }

        .container { max-width: 650px; margin: 0 auto; padding: 20px 15px 120px; }

        #userInfo { 
            font-size: 12px; 
            color: var(--text-secondary); 
            text-align: right; 
            margin-bottom: 20px;
            font-family: sans-serif;
        }
        #userInfo i { color: var(--accent-color); margin-right: 5px; }

        /* セクションタイトル */
        .section-title { 
            font-size: 1rem; 
            font-weight: 400; 
            margin: 30px 0 15px; 
            display: flex; 
            align-items: center; 
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .section-title i { margin-right: 10px; font-size: 1.1rem; }

        /* インフォメーションカード (入荷・履歴) */
        .info-card {
            background: var(--bg-depth-2);
            border-radius: 8px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-premium);
        }

        .info-header {
            padding: 12px 18px;
            font-size: 0.9rem;
            color: var(--accent-color);
            background: #000;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
        }

        .info-body { max-height: 180px; overflow-y: auto; padding: 0; }
        .info-body::-webkit-scrollbar { width: 5px; }
        .info-body::-webkit-scrollbar-thumb { background: var(--border-color); }

        .list-item {
            padding: 15px 18px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: var(--transition);
            cursor: pointer;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item strong { color: var(--text-primary); font-weight: 400; }
        .list-item:active { background: #000; color: var(--accent-color); }

        /* フォームグループ */
        .form-group {
            background: var(--bg-depth-2);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            box-shadow: var(--shadow-premium);
        }

        label { display: block; font-size: 0.85rem; margin-bottom: 10px; color: var(--accent-color); font-weight: bold;}
        
        input[type="text"], input[type="email"], input[type="number"], select, textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: var(--bg-depth-3);
            color: var(--text-primary);
            font-family: sans-serif; /* 入力時は見やすく */
            transition: var(--transition);
        }
        
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: var(--accent-color); 
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* 商品カード：ミニマル＆ラグジュアリー */
        .item-card {
            background: var(--bg-depth-2);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            box-shadow: var(--shadow-premium);
            transition: var(--transition);
        }
        .item-card:hover { border-color: #555; }
        
        .item-card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .item-card-title { font-size: 1rem; color: var(--text-primary); font-weight: bold; }
        .remove-btn { 
            color: #e74c3c; 
            background: none; 
            border: none; 
            font-size: 0.8rem; 
            cursor: pointer;
            transition: var(--transition);
        }
        .remove-btn:hover { color: #ff6b6b; transform: scale(1.1); }

        /* 商品情報の段組み */
        .item-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .item-col-2 { flex: 2; }
        .item-col-1 { flex: 1; }

        /* アクションボタン（追加） */
        .add-btn {
            width: 100%; 
            padding: 15px; 
            background: none; 
            border: 2px dashed var(--border-color);
            border-radius: 8px; 
            color: var(--text-secondary); 
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 40px;
        }
        .add-btn:hover { 
            border-color: var(--accent-color); 
            color: var(--accent-color); 
            background: rgba(212, 175, 55, 0.05);
        }

        /* 画像添付・備考 */
        input[type="file"] {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        /* フッターナビ（送信ボタン） */
        .footer-nav {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px); /* すりガラス効果 */
            padding: 20px 15px; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5); 
            display: flex; 
            justify-content: center;
            border-top: 1px solid var(--border-color);
        }
        
        #sendBtn {
            width: 100%; 
            max-width: 500px; 
            padding: 18px;
            background: linear-gradient(135deg, #d4af37 0%, #aa8928 100%); /* 金のグラデーション */
            color: #000; /* 文字は黒で引き締める */
            border: none;
            border-radius: 4px; 
            font-size: 1.1rem; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            transition: var(--transition);
        }
        #sendBtn:hover {
            background: linear-gradient(135deg, #f1c40f 0%, #d4af37 100%);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.6);
            transform: translateY(-2px);
        }
        #sendBtn:disabled { 
            background: #555; 
            color: #888;
            box-shadow: none; 
            transform: none;
            cursor: not-allowed;
        }

        /* ローディングアニメーション */
        .loader { 
            display: none; 
            border: 2px solid #fff; 
            border-top: 2px solid #000; 
            border-radius: 50%; 
            width: 18px; 
            height: 18px; 
            animation: spin 0.8s linear infinite; 
            display: inline-block; 
            vertical-align: middle; 
            margin-right: 10px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-bar">
    <h2><i class="fas fa-crown"></i> Premium Order</h2>
</div>

<div class="container">
    <div id="userInfo"><i class="fas fa-circle-notch fa-spin"></i> Authenticating...</div>

    <div id="arrivalSection" class="info-card" style="display:none;">
        <div class="info-header arrival-header">
            <span><i class="fas fa-truck-loading"></i> Upcoming Arrivals</span>
        </div>
        <div id="arrivalList" class="info-body"></div>
    </div>

    <div id="historySection" class="info-card" style="display:none;">
        <div class="info-header history-header">
            <span><i class="fas fa-history"></i> Quick Reorder</span>
        </div>
        <div id="historyList" class="info-body"></div>
    </div>

    <div class="section-title"><i class="fas fa-user-tie"></i> Client Information</div>
    <div class="form-group">
        <label>店名 (Store Name)</label>
        <input type="text" id="storeName" placeholder="必須入力">
        
        <label style="margin-top:15px;">メールアドレス (Email)</label>
        <input type="email" id="email" placeholder="控えの送信先">
    </div>

    <div class="section-title"><i class="fas fa-mitten"></i> Order Items</div>
    <div id="itemContainer">
        <div class="item-card">
            <div class="item-card-header">
                <span class="item-card-title">Item 1</span>
            </div>
            
            <div class="item-row">
                <div class="item-col-1">
                    <label>Index</label>
                    <select class="category-select" onchange="updateMakerOptions(this)">
                        <option value="">▼</option>
                        <option value="あ">あ</option><option value="か">か</option><option value="さ">さ</option>
                        <option value="た">た</option><option value="な">な</option><option value="は">は</option>
                        <option value="ま">ま</option><option value="や">や</option><option value="ら">ら</option>
                        <option value="わ">わ</option><option value="その他">他</option>
                    </select>
                </div>
                <div class="item-col-2">
                    <label>メーカー (Maker)</label>
                    <select class="maker-select"><option value="">行を選択</option></select>
                </div>
            </div>
            
            <div class="item-row">
                <div class="item-col-2">
                    <label>品番 (Part No.)</label>
                    <input type="text" class="partNo-input" placeholder="ABC-001">
                </div>
                <div class="item-col-1">
                    <label>数量 (Qty)</label>
                    <input type="number" class="quantity-input" value="1" min="1">
                </div>
            </div>
        </div>
    </div>

    <button type="button" class="add-btn" onclick="addNewItem()">
        <i class="fas fa-plus"></i> Add Another Item
    </button>

    <div class="section-title"><i class="fas fa-comment-dots"></i> Attachment & Note</div>
    <div class="form-group">
        <label>参考画像 (Images)</label>
        <input type="file" id="imageFile1" accept="image/*">
        <input type="file" id="imageFile2" accept="image/*">
        <label style="margin-top:15px;">備考 (Note)</label>
        <textarea id="comments" rows="4" placeholder="ご要望をご記入ください"></textarea>
    </div>
</div>

<div class="footer-nav">
    <button id="sendBtn" onclick="sendOrder()">Confirm Order</button>
</div>

<script>
    // --- JS部分は機能維持のため前回から変更なし ---
    const gasUrl = "https://script.google.com/macros/s/AKfycbyDMUsoLiBW26V0m6BBq7S5rIlhaCQXOPdG_2__V9E9aoFqyWEZikDuEE1K0Gc8r6d-/exec"; 
    let currentUserProfile = null;

    const allMakers = [
        "あいはらぼうえき:アイハラ貿易（ポリラフィア)", "あすかしょうかい:アスカ商会", "あずわん:アズワン（試験管）", 
        "あもろーさ:アムールデフルール", "あんこーぽれーしょん:アンコーポレーション", 
        "あーてぃふぃしゃる:アーティフィシャル", "あおやまりぼん:青山リボン", "あさひわいやー:朝日ワイヤー", "べるで:ヴェルデ",
        "おおちのうえん:大地農園", "おおぐちさんぎょう:大口産業", "だいてつ:大鉄", "だいどうくらふと:大同クラフト", "いんたーりんく:インターリンク",
        "だいせん:大仙", "うぉるなっと:ウォルナット", "えこぜりー:エコゼリー", "えるこみゅーん:エルコミューン", "えすあーるさーびす:SRサービス(デコジャリ）",
        "えいちつーおー:エイチツーオー", "かめやまきゃンドる:カメヤマキャンドル", "かるなっく:カルナック", "きゅーふら:Q-FLA",
        "くれい:クレイ", "くりざーる:クリザール", "くれえ:クレエ", "ぐりーんはうす:グリーンハウス", "きゃびのちぇ:キャビノチェ",
        "ぐりーんぽっと:グリーンポット", "ぐろーばるあろー:グローバルアロー", "こあとれーでぃんぐ:コアトレーディング", 
        "こべんとがーでん:コベントガーデン", "さかげん:坂源", "さんわとれーでぃんぐ:三和トレーディング", 
        "しもじま:シモジマ", "しせいはんぱい:志成販売", "すみざーずおあしす:スミザーズオアシス", 
        "とやまはもの:外山刃物", "たなかとうき:田中陶器", "だるとん:ダルトン", "でるき:デルキ",
        "とうきょうりぼん:東京リボン", "とうきょうかんかん:東京かんかん", "とすだいす:TOSSDICE", "だんぼーる:段ボール",
        "とうきょうどう:東京堂", "とーく:トーク", "どりーむふぁーむすずか:ドリームファームスズカ", "とうか:東花", "とうほうぼうえき:東方貿易",
        "ねいちゃーでざいんず:ネイチャーデザインズ", "ぱれすかがく:パレス化学", "ぱれ:パレ", "ぽっしゅりびんぐ:ポッシュリビング",
        "ふぁーむ:FARM", "はなりんくす:花Links", "ふろーネット:flonet", "ほわいえ:ホワイエ", "は花のそのくぼた:花のそのくぼた",
        "ふろーるえばー:フロールエバー", "ふらわーべーす:フラワーベース", "ぷらすがーでん:プラスガーデン", 
        "ぼぶくらふと:ボブクラフト", "まつむらこうげい:松村工芸", "ほしの:星野",
        "まぐねっと:マグネット", "まるこうせいとう:丸滉製陶", "まるまひらのとうきてん:丸又平野陶器店", 
        "まるわぼうえき:丸和貿易", "みゅーるみる:ミュールミル", "むらたやさんぎょう:村田屋産業", 
        "ものいんたーなしょなる:モノ・インターナショナル", "やまてー:ヤマテー", "やーど:yard", "ゆうぜん:友膳",
        "よこはまでぃすぷれいみゅーじあむ:横浜ディスプレイミュージアム", "ららいわんと:ラライワント", "りぶきゅりえいと:Lib curate", 
        "りーどしょうじ:リード商事", "わさら:WASARA", "わんだーぞーん:ワンダーゾーン", "わこうかがく:和光化学"
    ];

    function getKanaRow(kana) {
        const first = kana.charAt(0);
        if (/[あ-お]/.test(first)) return "あ";
        if (/[か-こが-ご]/.test(first)) return "か";
        if (/[さ-そざ-ぞ]/.test(first)) return "さ";
        if (/[た-とだ-ど]/.test(first)) return "た";
        if (/[な-の]/.test(first)) return "な";
        if (/[は-ほば-ぼぱ-ぽ]/.test(first)) return "は";
        if (/[ま-も]/.test(first)) return "ま";
        if (/[や-よ]/.test(first)) return "や";
        if (/[ら-ろ]/.test(first)) return "ら";
        if (/[わ-ん]/.test(first)) return "わ";
        return "その他";
    }

    function updateMakerOptions(catSelect) {
        const row = catSelect.value;
        const makerSelect = catSelect.closest('.item-card').querySelector('.maker-select');
        makerSelect.innerHTML = '<option value="">選択</option>';
        if (row === "その他") { makerSelect.innerHTML = '<option value="備考に記入">備考に記入</option>'; return; }
        if (!row) { makerSelect.innerHTML = '<option value="">行を選択</option>'; return; }
        allMakers.filter(item => getKanaRow(item.split(':')[0]) === row).forEach(item => {
            const name = item.split(':')[1];
            const opt = document.createElement('option');
            opt.value = opt.textContent = name;
            makerSelect.appendChild(opt);
        });
    }

    async function loadAppData(userId) {
        try {
            const response = await fetch(`${gasUrl}?userId=${userId}&t=${new Date().getTime()}`);
            const result = await response.json();

            if (result.calendar && result.calendar.length > 0) {
                document.getElementById('arrivalSection').style.display = 'block';
                document.getElementById('arrivalList').innerHTML = result.calendar.map(c => `
                    <div class="list-item">📅 <strong>${c.date}</strong> : ${c.title}</div>
                `).join('');
            }

            if (result.history && result.history.length > 0) {
                document.getElementById('historySection').style.display = 'block';
                document.getElementById('historyList').innerHTML = result.history.map(h => `
                    <div class="list-item" onclick="applyHistory('${h.maker}', '${h.partNo}', '${h.quantity}')">
                        <i class="fas fa-redeem"></i> [${h.date}] <strong>${h.maker}</strong> / ${h.partNo} (Qty: ${h.quantity})
                    </div>
                `).join('');
            }
        } catch (e) { console.error("Data Load Error", e); }
    }

    function applyHistory(maker, partNo, quantity) {
        if (!confirm(`${maker} を注文に追加しますか？`)) return;
        const container = document.getElementById('itemContainer');
        const cards = container.querySelectorAll('.item-card');
        let targetCard = (cards.length === 1 && !cards[0].querySelector('.partNo-input').value) ? cards[0] : null;
        if (!targetCard) { addNewItem(); const uCards = container.querySelectorAll('.item-card'); targetCard = uCards[uCards.length - 1]; }
        targetCard.querySelector('.category-select').value = "その他";
        targetCard.querySelector('.maker-select').innerHTML = `<option value="${maker}">${maker}</option>`;
        targetCard.querySelector('.partNo-input').value = partNo;
        targetCard.querySelector('.quantity-input').value = quantity;
    }

    function addNewItem() {
        const container = document.getElementById('itemContainer');
        const cards = container.querySelectorAll('.item-card');
        const newCard = cards[0].cloneNode(true);
        const nextIdx = container.querySelectorAll('.item-card').length + 1;
        
        newCard.querySelector('.item-card-header').innerHTML = `<span class="item-card-title">Item ${nextIdx}</span><button type="button" class="remove-btn" onclick="this.closest('.item-card').remove()"><i class="fas fa-trash-alt"></i></button>`;
        newCard.querySelectorAll('input').forEach(i => i.value = (i.type === 'number' ? 1 : ''));
        newCard.querySelector('.maker-select').innerHTML = '<option value="">行を選択</option>';
        newCard.querySelector('.category-select').value = "";
        container.appendChild(newCard);
    }

    async function sendOrder() {
        const btn = document.getElementById('sendBtn');
        const storeName = document.getElementById('storeName').value;
        if (!storeName) { alert('店名を入力してください'); return; }

        const items = [];
        document.querySelectorAll('.item-card').forEach(card => {
            const m = card.querySelector('.maker-select').value;
            const p = card.querySelector('.partNo-input').value;
            const q = card.querySelector('.quantity-input').value;
            if (m) items.push({ maker: m, partNo: p, quantity: q });
        });
        if (items.length === 0) { alert('商品情報を入力してください'); return; }

        btn.disabled = true; 
        btn.innerHTML = '<span class="loader"></span> Sending...'; 

        const readFile = (id) => {
            const file = document.getElementById(id).files[0];
            return new Promise((resolve) => {
                if (!file) resolve(null);
                else {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve({ data: e.target.result, name: file.name });
                    reader.readAsDataURL(file);
                }
            });
        };

        const [img1, img2] = await Promise.all([readFile('imageFile1'), readFile('imageFile2')]);
        const images = [img1, img2].filter(i => i !== null);

        const orderData = {
            storeName: storeName,
            email: document.getElementById('email').value,
            items: items,
            comments: document.getElementById('comments').value,
            userId: currentUserProfile ? currentUserProfile.userId : "unknown",
            images: images
        };

        try {
            await fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(orderData)
            });
            localStorage.setItem('storeName', storeName);
            localStorage.setItem('email', document.getElementById('email').value);
            alert('ご注文ありがとうございます。送信が完了しました。'); 
            liff.closeWindow();
        } catch (e) {
            alert('送信エラーが発生しました。時間を置いて再度お試しください。');
            btn.disabled = false;
            btn.innerText = "Confirm Order";
        }
    }

    async function initLiff() {
        try {
            await liff.init({ liffId: "2008835052-zCjbE0pV" });
            if (!liff.isLoggedIn()) { liff.login(); } else {
                currentUserProfile = await liff.getProfile();
                document.getElementById('userInfo').innerHTML = `<i class="fas fa-user-circle"></i> ID: ${currentUserProfile.displayName}`;
                loadAppData(currentUserProfile.userId);
            }
        } catch (e) { document.getElementById('userInfo').textContent = "Authentification Failed."; }
    }

    window.onload = function() {
        initLiff();
        if (localStorage.getItem('storeName')) document.getElementById('storeName').value = localStorage.getItem('storeName');
        if (localStorage.getItem('email')) document.getElementById('email').value = localStorage.getItem('email');
    };
</script>
</body>
</html>
