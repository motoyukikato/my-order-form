<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋花き商事 注文システム</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #d4af37;
            --deep-black: #000000;
            --card-gray: #1a1a1a;
            --input-gray: #2c2c2c;
            --text-white: #ffffff;
            --text-muted: #999999;
        }

        body { 
            font-family: "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--deep-black);
            color: var(--text-white);
            margin: 0; padding: 0;
            line-height: 1.4;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 20px 15px 120px; }

        /* ヘッダー */
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--card-gray); margin-bottom: 25px; }
        .header h1 { color: var(--primary-gold); font-size: 1.2rem; margin: 0; letter-spacing: 2px; }

        /* --- 配送オプション（ここを大きく変えました） --- */
        .option-headline { font-size: 0.9rem; color: var(--primary-gold); margin-bottom: 10px; font-weight: bold; text-align: center; }
        
        .delivery-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .delivery-card {
            flex: 1;
            background: var(--card-gray);
            border: 2px solid var(--input-gray);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .delivery-card.active {
            border-color: var(--primary-gold);
            background: rgba(212, 175, 55, 0.1);
        }
        .delivery-card i { font-size: 1.5rem; color: var(--text-muted); margin-bottom: 8px; }
        .delivery-card.active i { color: var(--primary-gold); }
        .delivery-card .title { font-size: 0.8rem; font-weight: bold; }
        .delivery-card .sub { font-size: 0.6rem; color: var(--text-muted); margin-top: 5px; display: block; }

        /* 希望日入力 */
        .date-section { background: var(--card-gray); padding: 15px; border-radius: 12px; margin-bottom: 25px; }
        label { display: block; font-size: 0.8rem; color: var(--primary-gold); margin-bottom: 8px; font-weight: bold; }
        input[type="date"], input[type="text"], input[type="email"], select, textarea {
            width: 100%; background: var(--input-gray); border: none; padding: 12px;
            border-radius: 8px; color: white; font-size: 1rem; box-sizing: border-box; outline: none;
        }

        /* 商品カード */
        .section-title { font-size: 1rem; border-left: 4px solid var(--primary-gold); padding-left: 10px; margin: 30px 0 15px; }
        .item-card { background: var(--card-gray); padding: 15px; border-radius: 12px; margin-bottom: 15px; position: relative; }
        .remove-btn { position: absolute; right: 10px; top: 10px; color: #ff4d4d; font-size: 0.8rem; background: none; border: none; }

        /* 送信ボタン */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(0,0,0,0.9); border-top: 1px solid var(--card-gray); }
        #sendBtn {
            width: 100%; padding: 18px; background: var(--primary-gold); color: black;
            border: none; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }

        .add-item-btn {
            width: 100%; padding: 12px; background: none; border: 1px dashed var(--primary-gold);
            color: var(--primary-gold); border-radius: 8px; margin-bottom: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PREMIUM ORDER</h1>
    </div>

    <div class="option-headline">配送オプションを選択してください</div>
    <div class="delivery-selector">
        <div class="delivery-card active" id="opt-fast" onclick="selectDelivery('fast')">
            <i class="fas fa-shipping-fast"></i>
            <span class="title">運賃かけて早く</span>
            <span class="sub">スピード優先</span>
        </div>
        <div class="delivery-card" id="opt-normal" onclick="selectDelivery('normal')">
            <i class="fas fa-box"></i>
            <span class="title">注文時に同梱</span>
            <span class="sub">送料を抑える</span>
        </div>
    </div>
    <input type="hidden" id="deliveryType" value="運賃かけて早くほしい">

    <div class="date-section">
        <label><i class="fas fa-calendar-alt"></i> 希望の渡し日</label>
        <input type="date" id="desiredDate">
        <div style="font-size: 0.7rem; color: #888; margin-top: 8px;">※別途、送料が発生する可能性があります。</div>
    </div>

    <div class="section-title">店舗情報</div>
    <div style="margin-bottom: 20px;">
        <input type="text" id="storeName" placeholder="店名（必須）" style="margin-bottom: 10px;">
        <input type="email" id="email" placeholder="メールアドレス">
    </div>

    <div class="section-title">注文商品</div>
    <div id="itemContainer">
        <div class="item-card">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <div style="flex:1">
                    <label>行</label>
                    <select class="category-select" onchange="updateMakerOptions(this)">
                        <option value="">▼</option>
                        <option value="あ">あ</option><option value="か">か</option><option value="さ">さ</option>
                        <option value="た">た</option><option value="な">な</option><option value="は">は</option>
                        <option value="ま">ま</option><option value="や">や</option><option value="ら">ら</option>
                        <option value="わ">わ</option><option value="その他">他</option>
                    </select>
                </div>
                <div style="flex:2">
                    <label>メーカー</label>
                    <select class="maker-select"><option value="">選択してください</option></select>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <div style="flex:2">
                    <label>品番</label>
                    <input type="text" class="partNo-input" placeholder="品番">
                </div>
                <div style="flex:1">
                    <label>数量</label>
                    <input type="number" class="quantity-input" value="1" min="1">
                </div>
            </div>
        </div>
    </div>

    <button class="add-item-btn" onclick="addNewItem()"><i class="fas fa-plus"></i> 商品を追加する</button>

    <div class="section-title">補足</div>
    <textarea id="comments" rows="3" placeholder="備考・メッセージなど"></textarea>
</div>

<div class="footer">
    <button id="sendBtn" onclick="sendOrder()">注文を確定して送信</button>
</div>

<script>
    // 配送オプションの選択処理
    function selectDelivery(type) {
        document.getElementById('opt-fast').classList.remove('active');
        document.getElementById('opt-normal').classList.remove('active');
        
        if (type === 'fast') {
            document.getElementById('opt-fast').classList.add('active');
            document.getElementById('deliveryType').value = "運賃かけて早くほしい";
        } else {
            document.getElementById('opt-normal').classList.add('active');
            document.getElementById('deliveryType').value = "注文するタイミングで入れてほしい";
        }
    }

    // 商品追加
    function addNewItem() {
        const container = document.getElementById('itemContainer');
        const firstCard = container.querySelector('.item-card');
        const newCard = firstCard.cloneNode(true);
        newCard.innerHTML += '<button class="remove-btn" onclick="this.parentElement.remove()">削除</button>';
        newCard.querySelectorAll('input').forEach(i => i.value = (i.type === 'number' ? 1 : ''));
        container.appendChild(newCard);
    }

    const allMakers = ["あいはらぼうえき:アイハラ貿易（ポリラフィア)", "あすかしょうかい:アスカ商会", "あずわん:アズワン（試験管）", "あもろーさ:アムールデフルール", "あんこーぽれーしょん:アンコーポレーション", "あーてぃふぃしゃる:アーティフィシャル", "あおやまりぼん:青山リボン", "あさひわいやー:朝日ワイヤー", "べるで:ヴェルデ", "おおちのうえん:大地農園", "おおぐちさんぎょう:大口産業", "だいてつ:大鉄", "だいどうくらふと:大同クラフト", "いんたーりんく:インターリンク", "だいせん:大仙", "うぉるなっと:ウォルナット", "えこぜりー:エコゼリー", "えるこみゅーん:エルコミューン", "えすあーるさーびす:SRサービス(デコジャリ）", "えいちつーおー:エイチツーオー", "かめやまきゃンドる:カメヤマキャンドル", "かるなっく:カルナック", "きゅーふら:Q-FLA", "くれい:クレイ", "くりざーる:クリザール", "くれえ:クレエ", "ぐりーんはうす:グリーンハウス", "きゃびのちぇ:キャビノチェ", "ぐりーんぽっと:グリーンポット", "ぐろーばるあろー:グローバルアロー", "こあとれーでぃんぐ:コアトレーディング", "こべんとがーでん:コベントガーデン", "さかげん:坂源", "さんわとれーでぃんぐ:三和トレーディング", "しもじま:シモジマ", "しせいはんぱい:志成販売", "すみざーずおあしす:スミザーズオアシス", "とやまはもの:外山刃物", "たなかとうき:田中陶器", "だるとん:ダルトン", "でるき:デルキ", "とうきょうりぼん:東京リボン", "とうきょうかんかん:東京かんかん", "とすだいす:TOSSDICE", "だんぼーる:段ボール", "とうきょうどう:東京堂", "とーく:トーク", "どりーむふぁーむすずか:ドリームファームスズカ", "とうか:東花", "とうほうぼうえき:東方貿易", "ねいちゃーでざいんず:ネイチャーデザインズ", "ぱれすかがく:パレス化学", "ぱれ:パレ", "ぽっしゅりびんぐ:ポッシュリビング", "ふぁーむ:FARM", "はなりんくす:花Links", "ふろーネット:flonet", "ほわいえ:ホワイエ", "は花のそのくぼた:花のそのくぼた", "ふろーるえばー:フロールエバー", "ふらわーべーす:フラワーベース", "ぷらすがーでん:プラスガーデン", "ぼぶくらふと:ボブクラフト", "まつむらこうげい:松村工芸", "ほしの:星野", "まぐねっと:マグネット", "まるこうせいとう:丸滉製陶", "まるまひらのとうきてん:丸又平野陶器店", "まるわぼうえき:丸和貿易", "みゅーるみる:ミュールミル", "むらたやさんぎょう:村田屋産業", "ものいんたーなしょなる:モノ・インターナショナル", "やまてー:ヤマテー", "やーど:yard", "ゆうぜん:友膳", "よこはまでぃすぷれいみゅーじあむ:横浜ディスプレイミュージアム", "ららいわんと:ラライワント", "りぶきゅりえいと:Lib curate", "りーどしょうじ:リード商事", "わさら:WASARA", "わんだーぞーん:ワンダーゾーン", "わこうかがく:和光化学"];

    function getKanaRow(kana) {
        const first = kana.charAt(0);
        if (/[あ-お]/.test(first)) return "あ";
        if (/[か-こが-ご]/.test(first)) return "か";
        if (/[さ-そざ-ぞ]/.test(first)) return "さ";
        if (/[た-とだ-ど]/.test(first)) return "た";
        if (/[な-の]/.test(first)) return "な";
        if (/[は-ほば-ぼぱ-ぽ]/.test(first)) return "は";
        if (/[ま-も]/.test(first)) return "ま";
        if (/[や-よ]/.test(first)) return "や";
        if (/[ら-ろ]/.test(first)) return "ら";
        if (/[わ-ん]/.test(first)) return "わ";
        return "その他";
    }

    function updateMakerOptions(catSelect) {
        const row = catSelect.value;
        const makerSelect = catSelect.closest('.item-card').querySelector('.maker-select');
        makerSelect.innerHTML = '<option value="">選択してください</option>';
        if (row === "その他") { makerSelect.innerHTML = '<option value="備考に記入">備考に記入</option>'; return; }
        allMakers.filter(item => getKanaRow(item.split(':')[0]) === row).forEach(item => {
            const name = item.split(':')[1];
            const opt = document.createElement('option');
            opt.value = opt.textContent = name;
            makerSelect.appendChild(opt);
        });
    }

    async function sendOrder() {
        const storeName = document.getElementById('storeName').value;
        if (!storeName) { alert('店名を記入してください'); return; }
        
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "送信中...";

        const items = [];
        document.querySelectorAll('.item-card').forEach(card => {
            const m = card.querySelector('.maker-select').value;
            const p = card.querySelector('.partNo-input').value;
            const q = card.querySelector('.quantity-input').value;
            if (m) items.push({ maker: m, partNo: p, quantity: q });
        });

        const data = {
            storeName: storeName,
            email: document.getElementById('email').value,
            deliveryType: document.getElementById('deliveryType').value,
            desiredDate: document.getElementById('desiredDate').value,
            items: items,
            comments: document.getElementById('comments').value
        };

        try {
            const gasUrl = "https://script.google.com/macros/s/AKfycbyDMUsoLiBW26V0m6BBq7S5rIlhaCQXOPdG_2__V9E9aoFqyWEZikDuEE1K0Gc8r6d-/exec";
            await fetch(gasUrl, { method: 'POST', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify(data) });
            alert('注文を送信しました');
            liff.closeWindow();
        } catch (e) {
            alert('エラーが発生しました');
            btn.disabled = false;
            btn.innerText = "注文を確定して送信";
        }
    }

    window.onload = async function() {
        await liff.init({ liffId: "2008835052-zCjbE0pV" });
        if (!liff.isLoggedIn()) liff.login();
    };
</script>
</body>
</html>
