<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注文システム</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 90px; background: #f4f7f9; }
        header { background: #fff; text-align: center; padding: 12px; border-bottom: 3px solid #3b5998; font-weight: bold; }
        .page-section { display: none; padding: 15px; }
        .active { display: block; }
        .card { background: #fff; padding: 12px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .btn { padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 1em; font-weight: bold; color: white; cursor: pointer; margin-top: 10px; }
        .btn-cust { background: #28a745; }
        .btn-order { background: #d9534f; font-size: 1.2em; padding: 20px; }
        .btn-scan { background: #3b5998; }
        #reader { width: 100% !important; border-radius: 10px; background: #000; overflow: hidden; }
        .cart-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .qty-badge { background: #3b5998; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.9em; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #fff; border-top: 1px solid #ddd; padding: 10px 0; z-index: 100; }
        nav button { flex: 1; background: none; border: none; color: #888; font-size: 11px; }
        nav button.active-nav { color: #3b5998; font-weight: bold; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <i class="fas fa-spinner fa-spin fa-3x" style="color:#3b5998;"></i>
    <p>送信中...</p>
</div>

<header>見本市注文システム</header>

<section id="home" class="page-section active">
    <div class="card">
        <div id="c-info">
            <p style="text-align:center; color:#999;">顧客をスキャンして開始してください</p>
        </div>
        <div id="c-data" style="display:none;">
            <b id="r-name" style="color:#3b5998; font-size:1.2em;"></b><br>
            <small id="r-addr"></small>
        </div>
    </div>
    <button class="btn btn-cust" onclick="startCamera('customer')"><i class="fas fa-user-plus"></i> 顧客スキャン</button>
    
    <div id="cart-section" style="margin-top:20px; display:none;">
        <h3 style="border-left:4px solid #3b5998; padding-left:10px;">現在のカート</h3>
        <div id="cart-list" class="card"></div>
        <button class="btn btn-order" onclick="submitFinalOrder()"><i class="fas fa-check-circle"></i> 注文を確定して送信</button>
    </div>
</section>

<section id="scanner-page" class="page-section">
    <div id="mode-text" style="text-align:center; padding:10px; font-weight:bold; background:#fff; margin-bottom:10px;"></div>
    <div id="reader"></div>
    <button class="btn" style="background:#666;" onclick="stopCamera()">戻る</button>
</section>

<section id="history" class="page-section">
    <h3 style="text-align:center;">送信済み履歴</h3>
    <div id="h-list"></div>
</section>

<nav>
    <button onclick="showPage('home')" id="n-home" class="active-nav"><i class="fas fa-shopping-cart"></i><br>カート</button>
    <button onclick="startCamera('product')"><i class="fas fa-barcode"></i><br>商品スキャン</button>
    <button onclick="showPage('history')"><i class="fas fa-history"></i><br>履歴管理</button>
</nav>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyLf4XKicaZniSohAG_oVPvqA8-Yoqp5jUDVVnN2NAxtfTblpGjVPR6fHFX06q1guAxYw/exec";
    let scanner = null;
    let customer = null;
    let cart = [];

    async function startCamera(mode) {
        if (mode === 'product' && !customer) { alert("先に顧客をスキャンしてください"); return; }
        showPage('scanner-page');
        document.getElementById("mode-text").innerText = mode === 'customer' ? "【顧客ID】をスキャン" : "【商品JAN】をスキャン";
        
        if (scanner) { await scanner.stop().catch(()=>{}); await scanner.clear(); }
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
            stopCamera();
            if (mode === 'customer') fetchCustomer(text.trim());
            else fetchProduct(text.trim());
        }).catch(() => alert("カメラ起動失敗"));
    }

    async function stopCamera() {
        if (scanner && scanner.isScanning) await scanner.stop();
        showPage('home');
    }

    async function fetchCustomer(id) {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "customerSearch", val: id }) });
        const d = await res.json();
        if (d.customer) {
            customer = d;
            document.getElementById("r-name").innerText = d.customer;
            document.getElementById("r-addr").innerText = d.address1 + (d.address2 || "");
            document.getElementById("c-info").style.display = "none";
            document.getElementById("c-data").style.display = "block";
            document.getElementById("cart-section").style.display = "block";
        } else { alert("顧客が見つかりません"); }
    }

    async function fetchProduct(code) {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "productSearch", val: code }) });
        const p = await res.json();
        if (p && p.name) {
            const q = prompt(`${p.name}\n数量を入力`, 1);
            if (q) {
                cart.push({ ...p, quantity: parseInt(q), jan: code });
                updateCartUI();
            }
        } else { alert("商品が見つかりません"); }
    }

    function updateCartUI() {
        const list = document.getElementById("cart-list");
        if (cart.length === 0) {
            list.innerHTML = "<p style='text-align:center; color:#999;'>カートは空です</p>";
            return;
        }
        list.innerHTML = cart.map((item, index) => `
            <div class="cart-item">
                <div><b>${item.name}</b><br><small>${item.partNo}</small></div>
                <div>
                    <span class="qty-badge">${item.quantity}</span>
                    <i class="fas fa-trash" style="color:#ccc; margin-left:10px;" onclick="removeFromCart(${index})"></i>
                </div>
            </div>
        `).join('');
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
    }

    async function submitFinalOrder() {
        if (cart.length === 0) return;
        if (!confirm("注文を確定して送信しますか？")) return;
        
        document.getElementById("loader").style.display = "flex";
        const orderData = { ...customer, items: cart };
        
        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "orderSubmit", data: orderData }) });
            alert("送信完了しました！");
            cart = [];
            updateCartUI();
            showPage('history');
        } catch (e) {
            alert("送信エラーが発生しました");
        } finally {
            document.getElementById("loader").style.display = "none";
        }
    }

    async function loadHistory() {
        const list = document.getElementById("h-list");
        list.innerHTML = "読込中...";
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getOrderHistory" }) });
        const data = await res.json();
        list.innerHTML = data.map(item => `
            <div class="card">
                <small>${item.date} / ${item.customerName}</small><br>
                <b>${item.name}</b> (${item.qty})
            </div>
        `).join('');
    }

    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'history') loadHistory();
    }
</script>
</body>
</html>
