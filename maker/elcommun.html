<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>見本市注文システム</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 90px; background: #f4f7f9; }
        header { background: #fff; text-align: center; padding: 12px; border-bottom: 3px solid #3b5998; font-weight: bold; }
        .page-section { display: none; padding: 10px; }
        .active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .btn-main { padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 1.1em; font-weight: bold; color: white; cursor: pointer; }
        .btn-cust { background: #28a745; margin-bottom: 10px; }
        .btn-input { background: #6c757d; margin-bottom: 10px; font-size: 0.9em; padding: 10px; }
        .btn-order { background: #d9534f; font-size: 1.3em; margin-top: 15px; }
        #reader { width: 100% !important; min-height: 250px; background: #000; border-radius: 10px; }
        .item-row { border-bottom: 1px solid #eee; padding: 10px 0; }
        .total-box { text-align: right; padding: 15px; font-size: 1.3em; color: #d9534f; font-weight: bold; background: #fff; border-radius: 12px; margin-top: 10px; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #fff; border-top: 1px solid #ddd; padding: 10px 0; z-index: 100; }
        nav button { flex: 1; background: none; border: none; color: #888; font-size: 12px; }
        nav button.active-nav { color: #3b5998; font-weight: bold; }
        .btn-q { width: 44px; height: 44px; border: 1px solid #3b5998; background: #fff; color: #3b5998; border-radius: 5px; font-weight: bold; font-size: 1.3em; }
        .del-btn { color: #d9534f; text-decoration: underline; font-size: 0.9em; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

<header>見本市注文システム</header>

<section id="home" class="page-section active">
    <div class="card" id="customer-card">
        <div id="c-none" style="text-align:center; color:#999;">顧客情報を入力してください</div>
        <div id="c-detail" style="display:none;">
            <b id="r-name" style="color:#3b5998; font-size:1.1em;"></b><br>
            <small id="r-addr"></small><br>
            <small id="r-tel"></small>
        </div>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn-main btn-cust" style="flex: 2;" onclick="startCamera('customer')"><i class="fas fa-qrcode"></i> 顧客スキャン</button>
        <button class="btn-main btn-input" style="flex: 1;" onclick="inputTel()"><i class="fas fa-keyboard"></i> 電話番号</button>
    </div>
    <div id="cart-area" style="display:none;">
        <div id="cart-list" class="card"></div>
        <div class="total-box">合計: ¥<span id="cart-total">0</span></div>
        <button class="btn-main btn-order" id="submit-btn" onclick="submitFinalOrder()">注文確定・送信</button>
    </div>
</section>

<section id="scanner-page" class="page-section">
    <div id="reader"></div>
    <button class="btn-main" style="background:#666; margin-top:15px;" onclick="stopCamera()">戻る</button>
</section>

<section id="history" class="page-section">
    <h3 style="text-align:center; font-size:1.1em;">注文履歴</h3>
    <div id="h-list"></div>
</section>

<nav>
    <button onclick="showPage('home')" id="n-home" class="active-nav"><i class="fas fa-shopping-cart"></i><br>カート</button>
    <button onclick="startCamera('product')"><i class="fas fa-barcode"></i><br>追加</button>
    <button onclick="showPage('history')"><i class="fas fa-history"></i><br>履歴</button>
</nav>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyPVoJ8rT2K3DD8A-9bP3K4FduD1YF0JjqI4YRR-THpSstjDrxcrW7ZHPYKvwLUCFnIzQ/exec";
    let html5QrCode = null;
    let customer = null;
    let cart = [];

    function inputTel() {
        const tel = prompt("電話番号を入力してください");
        if (tel) fetchCustomer(tel.trim());
    }

    async function startCamera(mode) {
        if (mode === 'product' && !customer) { alert("顧客を選択してください"); return; }
        showPage('scanner-page');
        document.getElementById("reader").innerHTML = ""; 
        if (html5QrCode) { try { await html5QrCode.stop(); } catch(e){} }
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            stopCamera();
            if (mode === 'customer') fetchCustomer(text.trim());
            else fetchProduct(text.trim());
        }).catch(() => { alert("カメラ起動失敗"); showPage('home'); });
    }

    async function stopCamera() {
        if (html5QrCode && html5QrCode.isScanning) await html5QrCode.stop();
        showPage('home');
    }

    async function fetchCustomer(val) {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "customerSearch", val: val }) });
        const d = await res.json();
        if (d.customer) {
            customer = d;
            document.getElementById("r-name").innerText = d.customer;
            document.getElementById("r-addr").innerText = d.address1 + (d.address2 || "");
            document.getElementById("r-tel").innerText = "TEL: " + d.tel;
            document.getElementById("c-none").style.display = "none";
            document.getElementById("c-detail").style.display = "block";
            document.getElementById("cart-area").style.display = "block";
        } else { alert("未登録: " + val); }
    }

    async function fetchProduct(code) {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "productSearch", val: code }) });
        const p = await res.json();
        if (p && p.name) {
            const q = prompt(`【${p.name}】\n品番: ${p.partNo}\nロット: ${p.lot}\n数量を入力`, 1);
            if (q) { cart.push({ ...p, quantity: parseInt(q) }); renderCart(); }
        } else { alert("商品未登録: " + code); }
    }

    function renderCart() {
        const list = document.getElementById("cart-list");
        let total = 0;
        list.innerHTML = cart.map((item, i) => {
            total += (item.price * item.quantity);
            return `<div class="item-row"><b>${item.name}</b><br><small>品番:${item.partNo} / JAN:${item.jan} / ロット:${item.lot}</small><br>¥${item.price.toLocaleString()} × ${item.quantity}<div style="text-align:right"><span class="del-btn" onclick="cart.splice(${i},1);renderCart();">消去</span></div></div>`;
        }).join('');
        document.getElementById("cart-total").innerText = total.toLocaleString();
    }

    async function submitFinalOrder() {
        if (cart.length === 0 || !confirm("送信しますか？")) return;
        const btn = document.getElementById("submit-btn");
        btn.disabled = true; btn.innerText = "送信中...";
        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "orderSubmit", data: { ...customer, items: cart } }) });
            alert("送信完了！");
            cart = []; customer = null; renderCart();
            document.getElementById("c-none").style.display = "block";
            document.getElementById("c-detail").style.display = "none";
            document.getElementById("cart-area").style.display = "none";
            showPage('home');
        } catch(e) { alert("送信エラー"); }
        btn.disabled = false; btn.innerText = "注文確定・送信";
    }

    async function loadHistory() {
        const list = document.getElementById("h-list");
        list.innerHTML = "<p style='text-align:center;'>読込中...</p>";
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getOrderHistory" }) });
        const data = await res.json();
        if (data.length === 0) { list.innerHTML = "<p style='text-align:center;'>履歴はありません</p>"; return; }
        
        list.innerHTML = data.map(item => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; font-size:0.8em; color:#666;">
                    <span>${item.displayDate}</span><span>${item.maker}</span>
                </div>
                <b>${item.customerName}</b><br>
                <div style="margin:5px 0; font-size:0.9em;">
                    <b>${item.name}</b><br>
                    <small>品番: ${item.partNo} / JAN: ${item.jan} / ロット: ${item.lot}</small>
                </div>
                <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                    <button class="btn-q" onclick="updateQty('${item.timestamp}', '${item.maker}', ${item.qty - 1})">－</button>
                    <b style="font-size:1.2em; min-width:30px; text-align:center;">${item.qty}</b>
                    <button class="btn-q" onclick="updateQty('${item.timestamp}', '${item.maker}', ${item.qty + 1})">＋</button>
                    <div style="margin-left:auto; text-align:right;">
                        <b style="color:#d9534f;">¥${item.subtotal.toLocaleString()}</b>
                    </div>
                </div>
                <div style="text-align:right; margin-top:10px; border-top:1px dashed #eee; padding-top:5px;">
                    <span class="del-btn" onclick="deleteHistory('${item.timestamp}', '${item.maker}')"><i class="fas fa-trash"></i> この履歴を削除</span>
                </div>
            </div>`).join('');
    }

    async function updateQty(ts, maker, newQty) {
        if (newQty < 1) return;
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "updateOrderQty", timestamp: ts, maker: maker, newQty: newQty }) });
        loadHistory();
    }

    async function deleteHistory(ts, maker) {
        if (!confirm("完全に削除してよろしいですか？")) return;
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "deleteOrderLine", timestamp: ts, maker: maker }) });
        loadHistory();
    }

    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        if(id==='home') document.getElementById('n-home').classList.add('active-nav');
        if (id === 'history') loadHistory();
    }
</script>
</body>
</html>
