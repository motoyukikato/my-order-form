<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>エルコミューン注文管理</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 80px; background: #f4f7f9; }
        header { background: #fff; text-align: center; padding: 12px; border-bottom: 3px solid #3b5998; font-size: 1.1em; }
        .page-section { display: none; padding: 15px; }
        .active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 12px; }
        .btn-scan-main { padding: 20px; background: #3b5998; color: white; border: none; border-radius: 10px; width: 100%; font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
        .btn-cust { background: #28a745; }
        #reader { width: 100% !important; border-radius: 10px; overflow: hidden; background: #000; }
        .mode-indicator { text-align: center; font-weight: bold; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
        .mode-cust { background: #e2f3e7; color: #1e7e34; }
        .mode-prod { background: #e7f0f7; color: #004085; }
        .qty-ctrl { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .btn-q { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #3b5998; background: #fff; font-size: 20px; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #fff; border-top: 1px solid #ddd; padding: 10px 0; }
        nav button { flex: 1; background: none; border: none; color: #888; font-size: 12px; }
        nav button.active-nav { color: #3b5998; font-weight: bold; }
    </style>
</head>
<body>

<header><b>見本市注文システム</b></header>

<section id="home" class="page-section active">
    <div class="card">
        <div id="c-load" style="text-align:center; padding:15px; color:#666;">
            <i class="fa-solid fa-user-check"></i> 顧客スキャンから開始してください
        </div>
        <div id="c-data" style="display:none;">
            <b id="r-cust" style="font-size:1.3em; color:#3b5998;"></b><br>
            <span id="r-addr1"></span><br>
            <span id="r-addr2" style="color:#666;"></span><br>
            TEL: <span id="r-tel"></span>
        </div>
    </div>
    <button class="btn-scan-main btn-cust" onclick="initScanner('customer')">
        <i class="fa-solid fa-id-card"></i> 顧客をスキャン
    </button>
</section>

<section id="scanner-page" class="page-section">
    <div id="mode-label" class="mode-indicator"></div>
    <div id="reader"></div>
    <button class="btn-scan-main" style="background:#666; margin-top:15px;" onclick="killScanner()">
        中止して戻る
    </button>
</section>

<section id="history" class="page-section">
    <h3 style="text-align:center;">注文履歴（集計＆メーカー同期）</h3>
    <div id="h-list"></div>
</section>

<nav>
    <button onclick="changePage('home')" id="n-home" class="active-nav"><i class="fa-solid fa-house"></i><br>ホーム</button>
    <button onclick="initScanner('product')"><i class="fa-solid fa-barcode"></i><br>商品追加</button>
    <button onclick="changePage('history')"><i class="fa-solid fa-list"></i><br>履歴/修正</button>
</nav>

<script>
    const GAS_URL = "★あなたのGASデプロイURLをここに貼り付け★";
    let scanner = null;
    let currentCustomer = null;

    // スキャナー起動の核心部分
    async function initScanner(mode) {
        changePage('scanner-page');
        const label = document.getElementById("mode-label");
        label.className = "mode-indicator " + (mode === 'customer' ? 'mode-cust' : 'mode-prod');
        label.innerText = mode === 'customer' ? "【顧客ID】をスキャンしてください" : "【JANコード】をスキャンしてください";

        if (scanner) { await scanner.stop(); }
        scanner = new Html5Qrcode("reader");

        const config = {
            fps: mode === 'product' ? 25 : 15, // 商品は爆速設定
            qrbox: mode === 'product' ? { width: 280, height: 160 } : 250
        };

        try {
            await scanner.start({ facingMode: "environment" }, config, (text) => {
                if (navigator.vibrate) navigator.vibrate(60);
                killScanner(); // 読み取ったら即停止
                if (mode === 'customer') fetchCustomer(text.trim());
                else fetchProduct(text.trim());
            });
        } catch (e) {
            alert("カメラが起動できません。ブラウザのカメラ許可を確認してください。");
            changePage('home');
        }
    }

    async function killScanner() {
        if (scanner && scanner.isScanning) {
            await scanner.stop();
            await scanner.clear();
        }
        changePage('home');
    }

    async function fetchCustomer(id) {
        document.getElementById("c-load").innerText = "照会中: " + id;
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "customerSearch", val: id }) });
            const d = await res.json();
            if (d.customer) {
                currentCustomer = d;
                document.getElementById("r-cust").innerText = d.customer;
                document.getElementById("r-addr1").innerText = d.address1;
                document.getElementById("r-addr2").innerText = d.address2; // 住所2を表示
                document.getElementById("r-tel").innerText = d.tel;
                document.getElementById("c-load").style.display = "none";
                document.getElementById("c-data").style.display = "block";
            } else { alert("未登録: " + id); }
        } catch (e) { alert("通信エラー"); }
    }

    async function fetchProduct(code) {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "productSearch", val: code }) });
        const p = await res.json();
        if (p && p.name) {
            const q = prompt(`【${p.name}】\n数量を入力`, 1);
            if (q) {
                // ここで orderSubmit を呼ぶ処理を追加
                alert("カートに追加（送信処理へ）");
            }
        } else { alert("商品が見つかりません: " + code); }
    }

    async function loadHistory() {
        const list = document.getElementById("h-list");
        list.innerHTML = "読み込み中...";
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getOrderHistory" }) });
        const data = await res.json();
        list.innerHTML = data.map(item => `
            <div class="card">
                <small>${item.date} / ${item.customerName}</small><br>
                <b>${item.name}</b>
                <div class="qty-ctrl">
                    数量: <b id="q-${item.rowNum}">${item.qty}</b>
                    <button class="btn-q" onclick="updateQty(${item.rowNum}, 1)">＋</button>
                    <button class="btn-q" onclick="updateQty(${item.rowNum}, -1)">－</button>
                    <span style="color:red; margin-left:auto;" onclick="deleteLine(${item.rowNum})">削除</span>
                </div>
            </div>`).join('');
    }

    async function updateQty(row, diff) {
        const el = document.getElementById("q-"+row);
        const nextQty = parseInt(el.innerText) + diff;
        if (nextQty < 1) return;
        el.innerText = "..";
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "updateOrderQty", rowNum: row, newQty: nextQty }) });
        loadHistory();
    }

    async function deleteLine(row) {
        if(!confirm("メーカー側も削除されます。よろしいですか？")) return;
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "deleteOrderLine", rowNum: row }) });
        loadHistory();
    }

    function changePage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'history') loadHistory();
    }
</script>
</body>
</html>
