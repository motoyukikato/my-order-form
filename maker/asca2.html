<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商事本部立ち売り受注システム</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 90px; background: #f4f7f9; }
        header { background: #fff; text-align: center; padding: 12px; border-bottom: 3px solid #3b5998; font-weight: bold; }
        .page-section { display: none; padding: 10px; }
        .active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .btn-main { padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 1.1em; font-weight: bold; color: white; cursor: pointer; }
        #reader { width: 100% !important; border-radius: 12px; overflow: hidden; background: #000; }
        #zoom-slider { width: 85%; margin: 15px auto; display: block; height: 30px; }
        .scan-msg { font-size: 0.9em; color: #d9534f; font-weight: bold; background: #fff; display: block; margin-bottom: 5px; text-align:center; }
        .item-row { border-bottom: 1px solid #eee; padding: 10px 0; }
        #common-note { width: 100%; height: 80px; margin-top: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .total-box { text-align: right; padding: 15px; font-size: 1.3em; color: #d9534f; font-weight: bold; background: #fff; border-radius: 12px; margin-top: 10px; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #fff; border-top: 1px solid #ddd; padding: 10px 0; z-index: 100; }
        nav button { flex: 1; background: none; border: none; color: #888; font-size: 12px; }
        nav button.active-nav { color: #3b5998; font-weight: bold; }
        #qty-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:200; justify-content:center; align-items:center; }
        .modal-content { background:#fff; width:85%; border-radius:15px; padding:20px; text-align:center; }
        .qty-display { font-size: 2.5em; font-weight: bold; margin-bottom: 10px; background: #eee; padding: 10px; border-radius: 8px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .numpad button { padding: 15px; font-size: 1.5em; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
        .del-btn { color: #d9534f; text-decoration: underline; font-size: 0.9em; cursor: pointer; margin-left:10px; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; background: #e9ecef; }
    </style>
</head>
<body>

<header>商事本部立ち売り受注システム</header>

<div id="qty-modal">
    <div class="modal-content">
        <h3 id="modal-p-name" style="margin:0 0 10px; font-size:1em;">商品名</h3>
        <div class="qty-display" id="qty-val">1</div>
        <div class="numpad">
            <button onclick="numIn(7)">7</button><button onclick="numIn(8)">8</button><button onclick="numIn(9)">9</button>
            <button onclick="numIn(4)">4</button><button onclick="numIn(5)">5</button><button onclick="numIn(6)">6</button>
            <button onclick="numIn(1)">1</button><button onclick="numIn(2)">2</button><button onclick="numIn(3)">3</button>
            <button onclick="numIn('C')" style="color:red;">C</button><button onclick="numIn(0)">0</button><button onclick="numIn('B')">←</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-main" style="background:#ccc; flex:1;" onclick="closeQtyModal()">戻る</button>
            <button class="btn-main" style="background:#3b5998; flex:2;" onclick="confirmQty()">決定</button>
        </div>
    </div>
</div>

<section id="home" class="page-section active">
    <div class="card">
        <div id="c-none" style="text-align:center; color:#999;">顧客情報を選択してください</div>
        <div id="c-detail" style="display:none;">
            <b id="r-name" style="color:#3b5998; font-size:1.1em;"></b><br>
            <small id="r-addr1"></small><br>
            <small id="r-addr2"></small><br>
            <small id="r-tel"></small><br>
            <small id="r-email" style="color:#666;"></small>
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom:10px;">
        <button class="btn-main" style="background:#28a745; flex: 2;" onclick="startCamera('customer')"><i class="fas fa-qrcode"></i> 顧客スキャン</button>
        <button class="btn-main" style="background:#6c757d; flex: 1;" onclick="openTelModal()">手入力</button>
    </div>

   <div id="product-input-area" style="display:none; margin: 15px 0;">
    <div style="display: flex; gap: 5px;">
        <input type="text" id="part-no-input" list="product-list" placeholder="品番・JANを入力" 
               style="flex: 2; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px;">
        <datalist id="product-list"></datalist>
        <button class="btn-main" style="background:#3b5998; flex: 1; padding: 12px 5px;" onclick="handleManualInput()">追加</button>
    </div>
</div>

    <div id="cart-area" style="display:none;">
        <div id="cart-list" class="card"></div>
        <div class="total-box">合計: ¥<span id="cart-total">0</span></div>
        <textarea id="common-note" placeholder="送り先や受注全体へのコメントを入力してください"></textarea>
        <button class="btn-main" style="background:#d9534f; font-size: 1.3em; margin-top:10px;" id="submit-btn" onclick="submitFinalOrder()">注文確定・送信</button>
    </div>
</section>

<section id="scanner-page" class="page-section">
    <div id="reader"></div>
    <div style="text-align:center; padding:15px; background:#fff;">
        <span class="scan-msg">【重要】少し離してズームするとピントが合います</span>
        <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
        <button class="btn-main" style="background:#666;" onclick="stopCamera()">キャンセル</button>
    </div>
</section>

<section id="history" class="page-section">
    <h3 style="text-align:center;">注文履歴</h3>
    <div id="h-list"></div>
</section>

<nav>
    <button onclick="showPage('home')" id="n-home" class="active-nav"><i class="fas fa-shopping-cart"></i><br>カート</button>
    <button onclick="startCamera('product')"><i class="fas fa-barcode"></i><br>スキャン</button>
    <button onclick="showPage('history')"><i class="fas fa-history"></i><br>履歴</button>
</nav>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxEzZM2hqxpwRiDsmR4jDi6RUeJHO0Ke4OaoZK0u6x3p7lIqWdUsvHvyXSVPRISjFkJow/exec";
    let html5QrCode = null, customer = null, cart = [], tempProduct = null, editTarget = null, isTelMode = false;

  // 電話入力モードで開く
    function openTelModal() {
        isTelMode = true;
        document.getElementById("modal-p-name").innerText = "電話番号入力";
        document.getElementById("qty-val").innerText = ""; 
        document.getElementById("qty-modal").style.display = "flex";
    }

    // 数量入力モードで開く
    function openQtyModal(p, isEdit = false) {
        isTelMode = false; 
        tempProduct = p; 
        editTarget = isEdit ? p : null;
        document.getElementById("modal-p-name").innerText = p.name;
        document.getElementById("qty-val").innerText = isEdit ? (p.qty || p.quantity) : "1";
        document.getElementById("qty-modal").style.display = "flex";
    }

    function closeQtyModal() {
        document.getElementById("qty-modal").style.display = "none";
        isTelMode = false; 
    }

    function numIn(n) {
        let v = document.getElementById("qty-val");
        if (n === 'C') {
            v.innerText = isTelMode ? "" : "1";
        } else if (n === 'B') {
            v.innerText = v.innerText.length > 1 ? v.innerText.slice(0, -1) : (isTelMode ? "" : "1");
        } else {
            if (isTelMode) {
                v.innerText += n;
            } else {
                v.innerText = (v.innerText === "1") ? n : v.innerText + n;
            }
        }
    }

    async function confirmQty() {
        let val = document.getElementById("qty-val").innerText;
        if (isTelMode) {
            if (val.length < 9) { alert("番号が短すぎます"); return; }
            closeQtyModal();
            fetchCustomer(val); 
        } else {
            let q = parseInt(val);
            if (editTarget) {
                await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "updateOrderQty", timestamp: editTarget.timestamp, maker: editTarget.maker, newQty: q }) });
                loadHistory();
            } else {
                if (q > 0) { cart.push({ ...tempProduct, quantity: q }); renderCart(); }
            }
            closeQtyModal();
        }
    }

    // カメラ制御
    async function startCamera(mode) {
        if (mode === 'product' && !customer) { alert("顧客を選択してください"); return; }
        showPage('scanner-page');
        if (html5QrCode && html5QrCode.isScanning) {
            try { await html5QrCode.stop(); } catch (e) {}
        }
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 25, qrbox: { width: 320, height: 120 }, aspectRatio: 1.0 };
        try {
            await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                html5QrCode.stop().then(() => {
                    showPage('home');
                    if (mode === 'customer') fetchCustomer(text.trim());
                    else fetchProduct(text.trim());
                });
            });
            setTimeout(() => {
                try {
                    const track = html5QrCode.getRunningTrack();
                    const capabilities = track.getCapabilities();
                    const slider = document.getElementById("zoom-slider");
                    if (capabilities && capabilities.zoom) {
                        slider.style.display = "block";
                        slider.min = capabilities.zoom.min;
                        slider.max = capabilities.zoom.max;
                        slider.step = capabilities.zoom.step;
                        slider.oninput = () => track.applyConstraints({advanced: [{zoom: parseFloat(slider.value)}]});
                    }
                } catch (e) {}
            }, 800);
        } catch (err) { alert("カメラ起動失敗"); showPage('home'); }
    }

    function stopCamera() { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop(); showPage('home'); }

   // 顧客検索
    async function fetchCustomer(val) {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "customerSearch", val: val }) });
        const d = await res.json();
        if (d.customer) {
            customer = d;
            document.getElementById("r-name").innerText = d.customer;
            document.getElementById("r-addr1").innerText = "〒" + d.zip + " " + d.address1;
            document.getElementById("r-addr2").innerText = d.address2 || "";
            document.getElementById("r-tel").innerText = "TEL: " + d.tel;
            document.getElementById("r-email").innerText = d.email || "";
            document.getElementById("c-none").style.display = "none";
            document.getElementById("c-detail").style.display = "block";
            document.getElementById("cart-area").style.display = "block";
            document.getElementById("product-input-area").style.display = "block"; 
            
            // ★ここに追加：顧客が決まったら商品リスト（候補）を読み込む
            loadProductSuggestions(); 
            
        } else { alert("未登録の顧客です"); }
    }

    // ★追加: 品番手入力用
    function inputPartNo() {
        if (!customer) { alert("顧客を選択してください"); return; }
        const code = prompt("品番またはJANコードを入力してください");
        if (code) fetchProduct(code.trim());
    }

    // 商品検索
    async function fetchProduct(code) {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "productSearch", val: code }) });
        const p = await res.json();
        if (p && p.name) {
            p.jan = p.jan || code;
            p.lot = p.lot || "1";
            p.stock = p.stock || "不明";
            openQtyModal(p);
        } else {
            alert("商品が見つかりません: " + code);
        }
    }

    function renderCart() {
        const list = document.getElementById("cart-list");
        let total = 0;
        list.innerHTML = cart.map((item, i) => {
            total += (item.price * item.quantity);
            return `<div class="item-row">
                <b>${item.name}</b><br>
                <small>品番:${item.partNo} / JAN:${item.jan}</small><br>
                下代:¥${item.price.toLocaleString()} × ${item.quantity}
                <div style="text-align:right"><span class="del-btn" onclick="cart.splice(${i},1);renderCart();">削除</span></div>
            </div>`;
        }).join('');
        document.getElementById("cart-total").innerText = total.toLocaleString();
    }

    async function submitFinalOrder() {
        if (cart.length === 0 || !confirm("送信しますか？")) return;
        const noteVal = document.getElementById("common-note").value;
        const btn = document.getElementById("submit-btn");
        btn.disabled = true; btn.innerText = "送信中...";
        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "orderSubmit", data: { ...customer, items: cart, commonNote: noteVal } }) });
            alert("送信完了！");
            cart = []; customer = null; document.getElementById("common-note").value = ""; renderCart();
            document.getElementById("c-none").style.display = "block";
            document.getElementById("c-detail").style.display = "none";
            document.getElementById("cart-area").style.display = "none";
            document.getElementById("product-input-area").style.display = "none";
            showPage('home');
        } catch(e) { alert("送信エラー"); }
        btn.disabled = false; btn.innerText = "注文確定・送信";
    }

  async function loadHistory() {
        const list = document.getElementById("h-list");
        list.innerHTML = "読込中...";
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getOrderHistory" }) });
            const data = await res.json();
            list.innerHTML = data.map(item => `
                <div class="card" style="padding: 15px; border-left: 5px solid #4267B2; margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div style="flex: 1;">
                            <span class="status-badge">${item.maker}</span>
                            <div style="font-size: 0.9em; font-weight: bold; color: #3b5998; margin-top: 5px;">
                                <i class="fas fa-user"></i> ${item.customerName || '不明'} 様
                            </div>
                            <div style="font-size: 1.1em; font-weight: bold; margin-top: 5px;">${item.partNo}</div>
                            <div style="font-size: 0.9em; color: #666;">${item.name}</div>
                            <div style="display: flex; align-items: center; margin-top: 10px;">
                                <button onclick="changeQty('${item.timestamp}', '${item.maker}', ${item.qty - 1})" style="padding:5px 10px;">－</button>
                                <div style="width: 40px; text-align: center; font-weight: bold;">${item.qty}</div>
                                <button onclick="changeQty('${item.timestamp}', '${item.maker}', ${item.qty + 1})" style="padding:5px 10px;">＋</button>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 0.8em; color: #888;">${item.displayDate}</div>
                            <div style="font-size: 1.1em; font-weight: bold; color: #d9534f; margin-top: 10px;">¥${Number(item.subtotal).toLocaleString()}</div>
                            <div style="margin-top:15px;"><span class="del-btn" onclick="deleteHistory('${item.timestamp}', '${item.maker}')">削除</span></div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch(e) { list.innerHTML = "履歴の読み込みに失敗しました。"; }
    }

   async function changeQty(ts, maker, newQty) {
        // 1未満になる場合は削除処理へ
        if (newQty < 1) { 
            deleteHistory(ts, maker); 
            return; 
        }

        try {
            // fetchに await をつけて、処理が終わるのを待つ
            const response = await fetch(GAS_URL, { 
                method: "POST", 
                body: JSON.stringify({ 
                    action: "updateOrderQty", 
                    timestamp: ts, 
                    maker: maker, 
                    newQty: Number(newQty) // 確実に数値として送る
                }) 
            });

            if (!response.ok) throw new Error('通信失敗');

            // サーバー側の書き換えが終わってから履歴を再読み込み
            await loadHistory(); 
            
        } catch (e) {
            console.error(e);
            alert("数量の更新に失敗しました。電波状況を確認してください。");
        }
    }

    async function deleteHistory(ts, maker) {
        if (!confirm("削除しますか？")) return;
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "deleteOrderLine", timestamp: ts, maker: maker }) });
        loadHistory();
    }

    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        if(id==='home') document.getElementById('n-home').classList.add('active-nav');
        if (id === 'history') loadHistory();
    }

    function inputTel() { const t = prompt("電話番号を入力"); if(t) fetchCustomer(t.replace(/-/g, "")); }
   // --- 品番候補（datalist）の制御 ---

    // GASから全商品の品番・品名リストを取得してセット
    async function loadProductSuggestions() {
        const datalist = document.getElementById("product-list");
        datalist.innerHTML = '<option value="読込中...">'; 
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getAllProducts" }) });
            const products = await res.json(); 
            datalist.innerHTML = products.map(p => `<option value="${p.partNo}">${p.name}</option>`).join('');
        } catch (e) {
            console.error("商品リストの取得失敗", e);
            datalist.innerHTML = '';
        }
    }

    // 「追加」ボタンが押された時の処理
    function handleManualInput() {
        const input = document.getElementById("part-no-input");
        const code = input.value.trim();
        if (code) {
            fetchProduct(code); // 既存の商品検索関数を呼び出す
            input.value = "";    // 入力欄を空にする
        } else {
            alert("品番を入力してください");
        }
    }

    // 元々あった inputPartNo はプロンプト形式なので、今回の「入力欄」形式では handleManualInput がその代わりになります 
</script>
</body>
</html>
