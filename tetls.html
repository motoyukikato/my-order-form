<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris with Next & LevelUp</title>
    <style>
        body {
            background: #202023;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .panel {
            background: #111;
            border: 2px solid #fff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 120px;
        }
        .info-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 24px;
            font-weight: bold;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #111;
        }
        #nextCanvas {
            border: 1px solid #444;
            background-color: #111;
        }
        #game-over {
            color: #ff4a4a;
            font-size: 32px;
            font-weight: bold;
            margin-top: 15px;
            height: 40px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="tetris" width="240" height="480"></canvas>

        <div class="panel">
            <div>
                <div class="info-label">SCORE</div>
                <div id="score" class="info-value">0</div>
            </div>
            <div>
                <div class="info-label">LEVEL</div>
                <div id="level" class="info-value">1</div>
            </div>
            <div>
                <div class="info-label">NEXT</div>
                <canvas id="nextCanvas" width="96" height="96"></canvas>
            </div>
        </div>
    </div>
    
    <div id="game-over"></div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
context.scale(24, 24);

// ネクストブロック用のキャンバス設定
const nextCanvas = document.getElementById('nextCanvas');
const nextContext = nextCanvas.getContext('2d');
nextContext.scale(24, 24);

// 色の定義（0は空、1〜7が各ブロック）
const colors = [
    null,
    '#FF0D72', // T
    '#0DC2FF', // O
    '#FF8E0D', // L
    '#3877FF', // J
    '#0DFF72', // I
    '#FFE138', // S
    '#F538FF'  // Z
];

// ライン消去とスコア・レベル計算
function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) {
                continue outer;
            }
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        player.score += rowCount * 10;
        rowCount *= 2;
    }
    
    // レベルアップロジック (100点ごとにレベルアップ、最大10)
    const newLevel = Math.floor(player.score / 100) + 1;
    if (newLevel !== player.level) {
        player.level = Math.min(newLevel, 10);
        // レベルが上がるごとに落下間隔を短くする（最速で100ms）
        dropInterval = Math.max(1000 - (player.level - 1) * 100, 100);
    }
}

// 衝突判定
function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 &&
               (arena[y + o.y] &&
                arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function createMatrix(w, h) {
    const matrix = [];
    while (h--) {
        matrix.push(new Array(w).fill(0));
    }
    return matrix;
}

// ブロックの形状
function createPiece(type) {
    if (type === 'T') return [[0,0,0],[1,1,1],[0,1,0]];
    if (type === 'O') return [[2,2],[2,2]];
    if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
    if (type === 'J') return [[0,4,0],[0,4,0],[4,4,0]];
    if (type === 'I') return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
    if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
}

// メイン描画
function draw() {
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);

    drawMatrix(arena, {x: 0, y: 0}, context);
    drawMatrix(player.matrix, player.pos, context);
}

// ネクストブロックの描画
function drawNext() {
    nextContext.fillStyle = '#000';
    nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

    // 4x4マスの中心に収まるようにオフセットを調整
    const matrix = player.nextMatrix;
    const offsetX = (4 - matrix[0].length) / 2;
    const offsetY = (4 - matrix.length) / 2;

    drawMatrix(matrix, {x: offsetX, y: offsetY}, nextContext);
}

// 汎用マトリックス描画関数
function drawMatrix(matrix, offset, ctx) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                ctx.fillStyle = colors[value];
                ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                arena[y + player.pos.y][x + player.pos.x] = value;
            }
        });
    });
}

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateLinesAndScore();
    }
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) {
        player.pos.x -= dir;
    }
}

// 世代交代（Nextを現在のブロックにし、新しいNextを作る）
function playerReset() {
    const pieces = 'ILJOTSZ';
    
    // 初回起動時のみ、現在のブロックもランダム生成
    if (!player.nextMatrix) {
        player.nextMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    }

    // ネクストを現在に持ってくる
    player.matrix = player.nextMatrix;
    // 次のネクストを予約
    player.nextMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);

    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    if (collide(arena, player)) {
        document.getElementById('game-over').innerText = 'GAME OVER';
        gameOver = true;
    }

    drawNext();
}

function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
}

let dropCounter = 0;
let dropInterval = 1000; // 初期速度は1秒(1000ms)
let lastTime = 0;
let gameOver = false;

function update(time = 0) {
    if (gameOver) return;

    const deltaTime = time - lastTime;
    lastTime = time;

    dropCounter += deltaTime;
    if (dropCounter > dropInterval) {
        playerDrop();
    }

    draw();
    requestAnimationFrame(update);
}

function updateLinesAndScore() {
    document.getElementById('score').innerText = player.score;
    document.getElementById('level').innerText = player.level;
}

document.addEventListener('keydown', event => {
    if (gameOver) return;

    if (event.keyCode === 37) playerMove(-1);        // 左
    else if (event.keyCode === 39) playerMove(1);     // 右
    else if (event.keyCode === 40) playerDrop();      // 下
    else if (event.keyCode === 38) playerRotate(1);   // 上（回転）
    else if (event.keyCode === 32) {                  // スペース（ハードドロップ）
        while (!collide(arena, player)) { player.pos.y++; }
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateLinesAndScore();
    }
});

const arena = createMatrix(10, 20);

const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    nextMatrix: null,
    score: 0,
    level: 1,
};

playerReset();
updateLinesAndScore();
update();
</script>
</body>
</html>
