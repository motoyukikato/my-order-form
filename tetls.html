<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puyo Tetris Anti-Zoom</title>
    <style>
        body {
            background: #2b1055;
            background-image: radial-gradient(#51279b 20%, transparent 20%), radial-gradient(#51279b 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: #fff;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            /* 画面全体のダブルタップズームやピンチイン・アウトをブラウザレベルで禁止 */
            touch-action: none; 
        }
        #game-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            position: relative;
        }
        #stage-container {
            position: relative;
            width: 240px;
            height: 480px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            border: 4px solid #ffd700;
            border-radius: 10px;
            box-sizing: border-box;
        }
        #tetris {
            background-color: rgba(20, 10, 40, 0.9);
            z-index: 1;
        }
        #effectCanvas {
            pointer-events: none;
            z-index: 2;
            border: 4px solid transparent;
        }
        .panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 3px solid #fff;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 100px;
            z-index: 3;
            text-align: center;
        }
        .info-label {
            font-size: 14px;
            color: #ffeb3b;
            text-shadow: 1px 1px 2px #000;
            font-weight: bold;
        }
        .info-value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0px #ff4081;
        }
        #nextCanvas {
            border: 2px solid #fff;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            display: block;
            margin: 5px auto 0 auto;
        }
        #game-over-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 64, 129, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
        }
        #game-over-text {
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #2b1055;
        }
        #restart-text {
            font-size: 18px;
            margin-top: 10px;
            color: #fff;
            background: #2b1055;
            padding: 5px 15px;
            border-radius: 20px;
        }
        #controls {
            display: none;
            width: 100%;
            max-width: 360px;
            margin-top: 20px;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
            z-index: 5;
        }
        .ctrl-btn {
            background: #ff4081;
            border: 3px solid #fff;
            color: #fff;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 4px 0 #c2185b;
            user-select: none;
            -webkit-user-select: none;
            
            /* 【修正】ボタン上でのスクロールやダブルタップズームを完全に無効化 */
            touch-action: none; 
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        #btn-rotate { grid-column: span 2; background: #00e676; box-shadow: 0 4px 0 #00c853;}
        #btn-drop { grid-column: span 2; background: #00b0ff; box-shadow: 0 4px 0 #0091ea;}
    </style>
</head>
<body>

    <div id="game-container">
        <div id="stage-container">
            <canvas id="tetris" width="240" height="480"></canvas>
            <canvas id="effectCanvas" width="240" height="480"></canvas>
            
            <div id="game-over-overlay" onclick="resetGame()">
                <div id="game-over-text">ばたんきゅー</div>
                <div id="restart-text">もういちど！</div>
            </div>
        </div>

        <div class="panel">
            <div>
                <div class="info-label">SCORE</div>
                <div id="score" class="info-value">0</div>
            </div>
            <div>
                <div class="info-label">LEVEL</div>
                <div id="level" class="info-value">1</div>
            </div>
            <div>
                <div class="info-label">NEXT</div>
                <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>
        </div>
    </div>

    <div id="controls">
        <div class="ctrl-btn" id="btn-left">←</div>
        <div class="ctrl-btn" id="btn-right">→</div>
        <div class="ctrl-btn" id="btn-down">↓</div>
        <div class="ctrl-btn" id="btn-space">⚡</div>
        <div class="ctrl-btn" id="btn-rotate">まわる (↑)</div>
        <div class="ctrl-btn" id="btn-drop">おとす (Space)</div>
    </div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
const GRID_SIZE = 24;
const STAGE_WIDTH = 10;
const STAGE_HEIGHT = 20;

const effectCanvas = document.getElementById('effectCanvas');
const effectContext = effectCanvas.getContext('2d');

const nextCanvas = document.getElementById('nextCanvas');
const nextContext = nextCanvas.getContext('2d');
const NEXT_GRID_SIZE = 20;

const colors = [
    null,
    '#ff3366', // 赤 (T)
    '#33ccff', // 水色 (O)
    '#ff9933', // 橙 (L)
    '#3333ff', // 青 (J)
    '#33cc33', // 緑 (I)
    '#ffff33', // 黄 (S)
    '#cc33ff'  // 紫 (Z)
];

let arena = createMatrix(STAGE_WIDTH, STAGE_HEIGHT);
const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    nextMatrix: null,
    score: 0,
    level: 1,
    combo: 0
};

let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;
let gameOver = false;
let particles = [];
let comboTexts = [];

class ComboText {
    constructor(text, x, y) {
        this.text = text;
        this.x = x;
        this.y = y;
        this.vy = -1.5;
        this.alpha = 1;
        this.scale = 1.5;
    }
    update() {
        this.y += this.vy;
        this.alpha -= 0.015;
        this.scale = Math.max(1, this.scale - 0.05);
    }
    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.translate(this.x, this.y);
        ctx.scale(this.scale, this.scale);
        ctx.font = 'bold 24px "Arial Rounded MT Bold", sans-serif';
        ctx.fillStyle = '#ffff00';
        ctx.strokeStyle = '#ff0055';
        ctx.lineWidth = 4;
        ctx.textAlign = 'center';
        ctx.strokeText(this.text, 0, 0);
        ctx.fillText(this.text, 0, 0);
        ctx.restore();
    }
}

class PopParticle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8 - 3;
        this.color = color;
        this.alpha = 1;
        this.radius = Math.random() * 6 + 4;
    }
    update() {
        this.vx *= 0.96;
        this.vy += 0.15;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.025;
    }
    draw(ctx) {
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.arc(this.x - this.radius/3, this.y - this.radius/3, this.radius/3, 0, Math.PI * 2);
        ctx.fill();
    }
}

function triggerLineEffect(yRow, colorArray) {
    for (let x = 0; x < STAGE_WIDTH; x++) {
        const colorIndex = colorArray[x];
        if (colorIndex === 0) continue;
        for (let i = 0; i < 4; i++) {
            const px = x * GRID_SIZE + GRID_SIZE / 2;
            const py = yRow * GRID_SIZE + GRID_SIZE / 2;
            particles.push(new PopParticle(px, py, colors[colorIndex]));
        }
    }
}

function updateEffects() {
    effectContext.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
    particles = particles.filter(p => p.alpha > 0);
    particles.forEach(p => { p.update(); p.draw(effectContext); });
    comboTexts = comboTexts.filter(t => t.alpha > 0);
    comboTexts.forEach(t => { t.update(); t.draw(effectContext); });
}

function arenaSweep() {
    let rowCount = 0;
    let linesCleared = [];

    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
        }
        linesCleared.push({y: y, colors: [...arena[y]]});
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;
        rowCount++;
    }

    if (rowCount > 0) {
        linesCleared.forEach(line => triggerLineEffect(line.y, line.colors));
        player.combo++;
        const comboBonus = player.combo * 15;
        player.score += (rowCount * 20) + comboBonus;

        if (player.combo >= 1) {
            const lastLineY = linesCleared[linesCleared.length - 1].y * GRID_SIZE;
            comboTexts.push(new ComboText(`${player.combo}連鎖!`, canvas.width / 2, lastLineY));
        }
        updateScoreAndLevel();
    } else {
        player.combo = 0;
    }
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function createMatrix(w, h) {
    const matrix = [];
    while (h--) { matrix.push(new Array(w).fill(0)); }
    return matrix;
}

function createPiece(type) {
    if (type === 'T') return [[0,1,0],[1,1,1],[0,0,0]];
    if (type === 'O') return [[2,2],[2,2]];
    if (type === 'L') return [[0,0,3],[3,3,3],[0,0,0]];
    if (type === 'J') return [[4,0,0],[4,4,4],[0,0,0]];
    if (type === 'I') return [[0,0,0,0],[5,5,5,5],[0,0,0,0],[0,0,0,0]];
    if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
}

function draw() {
    context.fillStyle = 'rgba(20, 10, 40, 1)';
    context.fillRect(0, 0, canvas.width, canvas.height);

    drawMatrix(arena, {x: 0, y: 0}, context, GRID_SIZE);
    drawGhost(player);
    drawMatrix(player.matrix, player.pos, context, GRID_SIZE);
}

function drawGhost(player) {
    if (!player.matrix) return;
    const ghostPos = {x: player.pos.x, y: player.pos.y};
    while (!collide(arena, {pos: ghostPos, matrix: player.matrix})) { ghostPos.y++; }
    ghostPos.y--;
    context.globalAlpha = 0.15;
    drawMatrix(player.matrix, ghostPos, context, GRID_SIZE);
    context.globalAlpha = 1;
}

function drawNext() {
    nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    const matrix = player.nextMatrix;
    if (!matrix) return;
    const offsetX = (4 - matrix[0].length) / 2;
    const offsetY = (4 - matrix.length) / 2;
    drawMatrix(matrix, {x: offsetX, y: offsetY}, nextContext, NEXT_GRID_SIZE);
}

function drawMatrix(matrix, offset, ctx, size) {
    if (!matrix) return;
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                const px = (x + offset.x) * size;
                const py = (y + offset.y) * size;
                const r = size * 0.48;

                ctx.save();
                ctx.translate(px + size/2, py + size/2);

                ctx.beginPath();
                ctx.fillStyle = colors[value];
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.fill();

                const eyeOffset = r * 0.35;
                const eyeRadius = r * 0.28;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-eyeOffset, -r*0.05, eyeRadius, 0, Math.PI * 2);
                ctx.arc(eyeOffset, -r*0.05, eyeRadius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-eyeOffset + r*0.05, -r*0.05, r*0.14, 0, Math.PI * 2);
                ctx.arc(eyeOffset - r*0.05, -r*0.05, r*0.14, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-eyeOffset + r*0.02, -r*0.1, r*0.06, 0, Math.PI * 2);
                ctx.arc(eyeOffset - r*0.08, -r*0.1, r*0.06, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(0, -r*0.4, r*0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        });
    });
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) { arena[y + player.pos.y][x + player.pos.x] = value; }
        });
    });
}

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        arenaSweep();
        playerReset();
    }
    dropCounter = 0;
}

function playerHardDrop() {
    if (gameOver) return;
    let count = 0;
    while (!collide(arena, {pos: player.pos, matrix: player.matrix})) { player.pos.y++; count++; }
    player.pos.y--;
    player.score += count;
    merge(arena, player);
    
    canvas.style.transform = 'translateY(5px)';
    setTimeout(()=> canvas.style.transform = 'translateY(0)', 60);

    arenaSweep();
    playerReset();
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) { player.pos.x -= dir; }
}

function playerReset() {
    const pieces = 'ILJOTSZ';
    
    if (!player.nextMatrix) {
        player.nextMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    }
    player.matrix = player.nextMatrix;
    player.nextMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);

    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    if (collide(arena, player)) {
        document.getElementById('game-over-overlay').style.display = 'flex';
        gameOver = true;
    }
    drawNext();
}

function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
}

function updateScoreAndLevel() {
    document.getElementById('score').innerText = player.score;
    const newLevel = Math.floor(player.score / 400) + 1;
    if (newLevel !== player.level) {
        player.level = Math.min(newLevel, 10);
        document.getElementById('level').innerText = player.level;
        dropInterval = Math.max(1000 - (player.level - 1) * 90, 80);
    }
}

function resetGame() {
    arena = createMatrix(STAGE_WIDTH, STAGE_HEIGHT);
    player.score = 0;
    player.level = 1;
    player.combo = 0;
    dropInterval = 1000;
    gameOver = false;
    particles = [];
    comboTexts = [];
    document.getElementById('game-over-overlay').style.display = 'none';
    updateScoreAndLevel();
    playerReset();
    update();
}

function update(time = 0) {
    if (gameOver) return;
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    if (dropCounter > dropInterval) { playerDrop(); }
    draw();
    updateEffects();
    requestAnimationFrame(update);
}

document.addEventListener('keydown', event => {
    if (gameOver) return;
    if (event.keyCode === 37) playerMove(-1);
    else if (event.keyCode === 39) playerMove(1);
    else if (event.keyCode === 40) playerDrop();
    else if (event.keyCode === 38) playerRotate(1);
    else if (event.keyCode === 32) playerHardDrop();
});

const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (isTouchDevice) {
    document.getElementById('controls').style.display = 'grid';
    
    // 【重要】ゲーム画面全体での不要なスクロールやピンチズームを徹底防止
    document.body.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
    
    // 【重要】ダブルタップによる画面ズームをスクリプト側でも完全に遮断
    document.addEventListener('touchend', event => {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
            event.preventDefault(); // 300ms以内の連続タップ（ダブルタップ）を無効化
        }
        lastTouchEnd = now;
    }, false);
    let lastTouchEnd = 0;

    const setupBtn = (id, action) => {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', e => { 
            e.preventDefault(); // タップした瞬間のブラウザ標準イベントを殺す（最重要）
            if(!gameOver) action(); 
        });
    };
    setupBtn('btn-left', () => playerMove(-1));
    setupBtn('btn-right', () => playerMove(1));
    setupBtn('btn-down', () => playerDrop());
    setupBtn('btn-rotate', () => playerRotate(1));
    setupBtn('btn-space', () => playerHardDrop());
    setupBtn('btn-drop', () => playerHardDrop());
}

playerReset();
updateScoreAndLevel();
update();
</script>
</body>
</html>
