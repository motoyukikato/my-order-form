<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puyo-Style Pop Tetris</title>
    <style>
        body {
            background: #2b1055; /* ぷよぷよっぽい深紫の背景 */
            background-image: radial-gradient(#51279b 20%, transparent 20%), radial-gradient(#51279b 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: #fff;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif; /* コミカルなフォント */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            position: relative;
        }
        #stage-container {
            position: relative;
            width: 240px;
            height: 480px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            border: 4px solid #ffd700; /* ポップな金色の枠 */
            border-radius: 10px;
            box-sizing: border-box;
        }
        #tetris {
            background-color: rgba(20, 10, 40, 0.9);
            z-index: 1;
        }
        #effectCanvas {
            pointer-events: none;
            z-index: 2;
            border: 4px solid transparent;
        }
        .panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 3px solid #fff;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 100px;
            z-index: 3;
            text-align: center;
        }
        .info-label {
            font-size: 14px;
            color: #ffeb3b;
            text-shadow: 1px 1px 2px #000;
            font-weight: bold;
        }
        .info-value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0px #ff4081;
        }
        #nextCanvas {
            border: 2px solid #fff;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            display: block;
            margin: 5px auto 0 auto;
        }
        #game-over-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 64, 129, 0.85); /* ポップなピンクのゲームオーバー */
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
        }
        #game-over-text {
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #2b1055;
        }
        #restart-text {
            font-size: 18px;
            margin-top: 10px;
            color: #fff;
            background: #2b1055;
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* --- タッチコントローラー（丸みを持たせてポップに） --- */
        #controls {
            display: none;
            width: 100%;
            max-width: 360px;
            margin-top: 20px;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
            z-index: 5;
        }
        .ctrl-btn {
            background: #ff4081;
            border: 3px solid #fff;
            color: #fff;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 4px 0 #c2185b;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        #btn-rotate { grid-column: span 2; background: #00e676; box-shadow: 0 4px 0 #00c853;}
        #btn-drop { grid-column: span 2; background: #00b0ff; box-shadow: 0 4px 0 #0091ea;}
    </style>
</head>
<body>

    <div id="game-container">
        <div id="stage-container">
            <canvas id="tetris" width="240" height="480"></canvas>
            <canvas id="effectCanvas" width="240" height="480"></canvas>
            
            <div id="game-over-overlay" onclick="resetGame()">
                <div id="game-over-text">ばたんきゅー</div> <div id="restart-text">もういちど！</div>
            </div>
        </div>

        <div class="panel">
            <div>
                <div class="info-label">SCORE</div>
                <div id="score" class="info-value">0</div>
            </div>
            <div>
                <div class="info-label">LEVEL</div>
                <div id="level" class="info-value">1</div>
            </div>
            <div>
                <div class="info-label">NEXT</div>
                <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>
        </div>
    </div>

    <div id="controls">
        <div class="ctrl-btn" id="btn-left">←</div>
        <div class="ctrl-btn" id="btn-right">→</div>
        <div class="ctrl-btn" id="btn-down">↓</div>
        <div class="ctrl-btn" id="btn-space">⚡</div>
        <div class="ctrl-btn" id="btn-rotate">まわる (↑)</div>
        <div class="ctrl-btn" id="btn-drop">おとす (Space)</div>
    </div>
