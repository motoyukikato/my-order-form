
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【YARD】見本市注文アプリ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 80px; background: #f4f4f4; color: #333; }
        header { background: #fff; text-align: center; padding: 15px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .page-section { display: none; padding: 20px; min-height: 80vh; }
        .active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .item-card { background: #fff; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
        .btn-blue { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .btn-scan { padding: 20px; background: #3b5998; color: white; border: none; border-radius: 10px; width: 100%; font-size: 18px; margin-top: 10px; }
        .footer-menu { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; }
        .footer-menu button { background: none; border: none; color: #888; font-size: 11px; flex: 1; cursor: pointer; }
        .footer-menu button i { font-size: 24px; display: block; margin-bottom: 4px; }
        .footer-menu button.active-menu { color: #3b5998; font-weight: bold; }
        #send-btn { background-color: #28a745; color: white; border: none; width: 100%; padding: 15px; font-size: 18px; border-radius: 10px; margin-top: 20px; }
        #send-btn:disabled { background-color: #ccc; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 5px; padding: 10px; box-sizing: border-box; font-size: 16px; }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<header><div style="font-size: 1.2em; font-weight: bold;">見本市注文アプリ</div></header>

<section id="home" class="page-section active">
    <h2 style="text-align: center;">顧客情報</h2>
    <div class="card" id="cust-display">
        <div id="cust-loading" style="text-align:center; color:#ccc; padding: 20px;">検索またはスキャンしてください</div>
        <div id="cust-data" style="display:none;">
            <b id="res-customer" style="font-size: 1.2em; color: #3b5998;"></b><br>
            <span id="res-address1"></span><br>
            <span id="res-address2"></span><br>
            TEL: <span id="res-tel"></span><br>
            <span id="res-email"></span>
        </div>
    </div>
    <div class="card">
        <input type="tel" id="cust-manual-input" placeholder="電話番号を入力" style="width: 60%; padding: 10px;">
        <button class="btn-blue" onclick="handleCustomerManualSearch()">検索</button>
    </div>
    <button class="btn-scan" onclick="handleCustomerScan()" style="background: #28a745;"><i class="fa-solid fa-qrcode"></i> 顧客スキャン</button>
</section>

<section id="barcode" class="page-section">
    <h2>商品スキャン</h2>
    <div class="card" style="text-align: center; padding: 10px;">
        <div id="reader" style="width: 100%; min-height: 250px; background: #eee; border-radius: 8px; overflow: hidden;"></div>
        
        <div style="margin-top: 15px;">
           <button id="start-btn" class="btn-scan" onclick="handleScan()">
    <i class="fa-solid fa-camera"></i> スキャン開始
</button>
<button id="stop-btn" class="btn-scan" onclick="stopScanner()" style="background: #d9534f; display: none;">
    スキャン停止
</button>
        </div>
        <p id="scan-status" style="margin-top:10px; color:#666; font-size:14px;">カメラを起動してください</p>
    </div>
</section>

<section id="input" class="page-section">
    <h2>商品検索・追加</h2>
    <div class="card">
        <input type="text" id="manual-id" placeholder="品番またはJANを入力" style="width: 60%; padding: 10px;" list="prod-list">
        <datalist id="prod-list"></datalist>
        <button class="btn-blue" onclick="handleSearchAndPreview()">検索</button>
    </div>

<div id="search-result-preview" style="display:none;">
    <div class="card" style="border: 2px solid #3b5998;">
        <h3 id="preview-name" style="margin-top:0;"></h3>
        <p>品番: <span id="preview-partNo"></span></p>
        
        <p style="color: #666;">上代: <span id="preview-listPrice"></span>円</p>
        
        <p>単価: <span id="preview-price"></span>円</p>
        
        <p>メーカー: <span id="preview-maker"></span></p>
        
        <p style="color: #d9534f; font-weight: bold;">在庫状況: <span id="preview-stock"></span></p>
        
        <hr>
        <div style="text-align: center;">
            <label>数量: </label>
            <input type="number" id="preview-qty" value="1" min="1" style="width: 60px; font-size: 18px; padding: 5px;">
            <br><br>
            <button onclick="addPreviewToCart()" style="background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 100%;">
                🛒 この商品をカートに追加
            </button>
        </div>
    </div>
</div>
</section>

<section id="cart" class="page-section">
    <h2>注文カート</h2>
    <div id="cart-list"><p style="text-align: center;">空です</p></div>
    <div class="card">
        <p style="font-weight: bold;">備考欄（コメント）：</p>
        <textarea id="order-comment" rows="3" placeholder="納期指定などあれば入力してください"></textarea>
    </div>
    <button id="send-btn" onclick="sendOrder()">🛒 注文を確定する</button>
</section>
    <section id="history" class="page-section">
    <h2 style="text-align:center; padding:10px;">注文履歴（訂正）</h2>
    <div class="card" style="margin-bottom: 10px; padding: 10px;">
        <input type="text" id="history-search" placeholder="名前・品番・商品名で検索..." 
               style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px;"
               oninput="filterHistory()">
    </div>
    <div id="history-list">
        <p style="text-align: center; color: #999;">読み込み中...</p>
    </div>
</section>

<nav class="footer-menu">
    <button onclick="showPage('home')" id="nav-home" class="active-menu"><i class="fa-solid fa-house"></i>ホーム</button>
    <button onclick="showPage('barcode')" id="nav-barcode"><i class="fa-solid fa-camera"></i>スキャン</button>
    <button onclick="showPage('input')" id="nav-input"><i class="fa-solid fa-keyboard"></i>入力</button>
    <button onclick="showPage('history')" id="nav-history"><i class="fa-solid fa-clock-rotate-left"></i>履歴</button>
    <button onclick="showPage('cart')" id="nav-cart"><i class="fa-solid fa-cart-shopping"></i>カート</button>
</nav>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx5GvuvNJM3khNb9ZhmM70NAFzkfkbFXMJcQSDGKDtyl80GbQ9q2o_Fr2zJbzT5hrYv/exec";
    
    let cart = [];
    let allProducts = []; 
    let currentZip = ""; 
    let tempProduct = null;

    // --- 1. アプリ起動時に商品データを一括取得 ---
    async function loadProductSuggestions() {
        console.log("商品リストを取得中...");
        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getAllProductNames" })
            });
            allProducts = await res.json();
            
            const datalist = document.getElementById('prod-list');
            if (datalist) {
                datalist.innerHTML = allProducts.map(item => 
                    `<option value="${item.partNo}">${item.name}</option>`
                ).join('');
            }
            console.log("同期完了:", allProducts.length, "件");
        } catch (e) { 
            console.error("データ取得失敗:", e); 
        }
    }

    window.onload = () => {
        loadProductSuggestions();
    };

    function showPage(pageId) {
        document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.footer-menu button').forEach(btn => btn.classList.remove('active-menu'));
        const activeBtn = document.getElementById('nav-' + pageId);
        if (activeBtn) activeBtn.classList.add('active-menu');

        if (pageId === 'history') {
            loadHistory();
        }
    }

    // --- 2. 顧客検索 ---
    async function fetchCustomerData(val) {
        if (!val) return;
        const loading = document.getElementById("cust-loading");
        loading.innerText = "検索中...";
        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "customerSearch", val: val })
            });
            const data = await res.json();
            if (data && data.customer) {
                document.getElementById("res-customer").innerText = data.customer;
                document.getElementById("res-address1").innerText = data.address1 || "";
                document.getElementById("res-address2").innerText = data.address2 || "";
                document.getElementById("res-tel").innerText = data.tel || "";
                document.getElementById("res-email").innerText = data.email || "";
                currentZip = data.zip || ""; 
                document.getElementById("cust-loading").style.display = "none";
                document.getElementById("cust-data").style.display = "block";
            } else { 
                alert("顧客が見つかりません"); 
                loading.innerText = "検索またはスキャンしてください";
            }
        } catch (e) { alert("顧客検索エラー: " + e.message); }
    }

    // --- 3. 商品検索（手入力） ---
    async function handleSearchAndPreview() {
        const code = document.getElementById('manual-id').value.trim();
        if (!code) { alert("品番またはJANを入力してください"); return; }
        const btn = document.querySelector("#input .btn-blue");
        btn.innerText = "検索中...";
        btn.disabled = true;
        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                // GAS側の「else if (c.action === "productSearch") r = searchProductGas(c.jan);」に合わせます
body: JSON.stringify({ action: "productSearch", jan: code })
            });
            const product = await res.json();
            if (product) {
                tempProduct = product;
                document.getElementById("preview-name").innerText = product.name;
                document.getElementById("preview-partNo").innerText = product.partNo;
                document.getElementById("preview-listPrice").innerText = product.listPrice ? Number(product.listPrice).toLocaleString() : "---";
                document.getElementById("preview-price").innerText = Number(product.price).toLocaleString();
                document.getElementById("preview-maker").innerText = product.maker || "未設定";
                document.getElementById("preview-stock").innerText = product.stock || "不明";
                document.getElementById("preview-qty").value = product.lot || 1;
                document.getElementById("search-result-preview").style.display = "block";
            } else {
                alert("商品が見つかりませんでした: " + code);
                document.getElementById("search-result-preview").style.display = "none";
            }
        } catch (e) { alert("検索エラー: " + e.message); }
        finally { btn.innerText = "検索"; btn.disabled = false; }
    }

    // --- 4. スキャン後の商品処理 ---
    async function searchProductLocal(code) {
        if (!code) return;
        const res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ action: "productSearch", jan: code })
        });
        const product = await res.json();
        if (product) {
            tempProduct = product;
            const defaultQty = Number(product.lot || 1);
            const inputQty = prompt("【メーカー】" + product.maker + "\n【商品】" + product.name + "\n【上代】" + (product.listPrice ? Number(product.listPrice).toLocaleString() : "---") + "円\n数量を入力してください", defaultQty);
            if (inputQty === null) { handleScan(); return; }
            const qty = parseInt(inputQty);
            if (!isNaN(qty) && qty > 0) {
                cart.push({
                    jan: product.jan, partNo: product.partNo, name: product.name,
                    price: Number(product.price), listPrice: product.listPrice,
                    quantity: qty, lot: Number(product.lot || 1), stock: product.stock, maker: product.maker 
                });
                updateCartUI();
                alert(product.name + " を追加しました");
            }
            handleScan(); 
        } else {
            alert("マスタ未登録: " + code);
            handleScan(); 
        }
    }

    function addPreviewToCart() {
        if (!tempProduct) return;
        const qty = parseInt(document.getElementById("preview-qty").value);
        cart.push({
            jan: tempProduct.jan, partNo: tempProduct.partNo, name: tempProduct.name,
            price: Number(tempProduct.price), listPrice: tempProduct.listPrice,
            quantity: qty, lot: Number(tempProduct.lot || 1), stock: tempProduct.stock, maker: tempProduct.maker 
        });
        updateCartUI();
        document.getElementById("search-result-preview").style.display = "none";
        document.getElementById("manual-id").value = "";
        alert(tempProduct.name + " をカートに追加しました"); 
        document.getElementById("manual-id").focus();
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        if (cart.length === 0) { list.innerHTML = '<p style="text-align: center;">空です</p>'; return; }
        let total = 0;
        let html = cart.map((item, i) => {
            const subtotal = item.price * item.quantity;
            total += subtotal;
            const displayListPrice = item.listPrice ? Number(item.listPrice).toLocaleString() + "円" : "---";
            return `
                <div class="item-card" style="position: relative;">
                    <b>${item.name}</b><br>
                    <small>メーカー: ${item.maker || "未設定"} / 品番: ${item.partNo}</small><br>
                    <div style="background: #fff5f5; padding: 8px; border-radius: 5px; margin: 8px 0; border: 1px solid #ffcccc;">
                        <span style="color: #d9534f; font-weight: bold;">在庫状況: ${item.stock || "設定なし"}</span>
                    </div>
                    <div style="font-size: 0.9em; margin-bottom: 5px;">
                        上代: ${displayListPrice}<br>
                        単価: ${item.price.toLocaleString()}円
                    </div>
                    数量: <input type="number" value="${item.quantity}" onchange="updateQty(${i}, this.value)" style="width:60px; font-size:16px;">
                    <button onclick="removeItem(${i})" style="position: absolute; top: 10px; right: 10px; color: #999; background: none; border: none; font-size: 1.2em;">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>`;
        }).join('');
        html += `<div style="text-align:right; margin-top: 10px;"><b>合計: ${total.toLocaleString()}円</b></div>`;
        list.innerHTML = html;
    }

    function updateQty(i, q) { if (q > 0) { cart[i].quantity = parseInt(q); updateCartUI(); } }
    function removeItem(i) { if (confirm("削除しますか？")) { cart.splice(i, 1); updateCartUI(); } }

    async function sendOrder() {
        if (cart.length === 0) { alert("カートが空です"); return; }
        
        // HTMLの画面表示から確実に顧客名を取得
        const customerName = document.getElementById("res-customer").innerText;
        if (!customerName) { alert("顧客情報を検索してください"); return; }
        
        const btn = document.getElementById('send-btn');
        btn.disabled = true; btn.innerText = "送信中...";

        try {
            const requestData = {
                customerName: customerName, 
                zip: currentZip || "",
                address1: document.getElementById("res-address1").innerText,
                address2: document.getElementById("res-address2").innerText,
                tel: document.getElementById("res-tel").innerText,
                email: document.getElementById("res-email").innerText,
                comment: document.getElementById("order-comment").value,
                // カート内の各商品データをGASの「saveOrder」が使いやすい形に整理して送る
                items: cart.map(item => ({
                    maker: item.maker || "",      // これがGASのrow[1]（B列）に入る
                    partNo: item.partNo || "",    // これがGASのrow[9]（J列）に入る
                    stock: item.stock || "",      // これがGASのrow[8]（I列）に入る
                    jan: item.jan || "",
                    name: item.name || "",
                    quantity: item.quantity,
                    price: item.price,
                    listPrice: item.listPrice || 0
                }))
            };

            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "orderSubmit", data: requestData })
            });

            if (res.ok) {
                alert("注文を送信しました");
                cart = []; updateCartUI();
                // 送信後は入力をリセット
                document.getElementById("res-customer").innerText = "";
                document.getElementById("res-address1").innerText = "";
                document.getElementById("res-address2").innerText = "";
                document.getElementById("res-tel").innerText = "";
                document.getElementById("res-email").innerText = "";
                document.getElementById("cust-manual-input").value = "";
                document.getElementById("cust-data").style.display = "none";
                document.getElementById("cust-loading").style.display = "block";
                document.getElementById("order-comment").value = "";
                showPage('home');
            }
        } catch (e) { 
            alert("送信エラー: " + e.message); 
        } finally { 
            btn.disabled = false; 
            btn.innerText = "🛒 注文を確定する"; 
        }
    }

    function handleCustomerManualSearch() {
        const val = document.getElementById('cust-manual-input').value.trim();
        if (val) fetchCustomerData(val);
    }

    // --- スキャナー制御（リセット防止・安定化版） ---
    let html5QrCode = null;

    // カメラの競合を防ぐための共通停止関数
    async function safeStopScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            try {
                await html5QrCode.stop();
                console.log("Scanner stopped safely.");
            } catch (err) {
                console.warn("Stop error (can ignore):", err);
            }
        }
        document.getElementById("start-btn").style.display = "block";
        document.getElementById("stop-btn").style.display = "none";
    }

    async function handleScan() {
        showPage('barcode');
        const status = document.getElementById("scan-status");
        
        // 1. 既存のスキャンを確実に止める
        await safeStopScanner();
        
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        
        document.getElementById("start-btn").style.display = "none";
        document.getElementById("stop-btn").style.display = "block";
        status.innerText = "バーコードを枠内に収めてください";

        try {
            // 解像度を ideal: 640 に制限してスマホの負荷を下げる
            const config = { fps: 10, qrbox: { width: 280, height: 150 } };
            await html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                async (decodedText) => {
                    // 成功時：まずカメラを止めてから、次の処理へ（リセット防止）
                    await safeStopScanner();
                    status.innerText = "読み取り成功！検索中...";
                    searchProductLocal(decodedText); 
                }
            );
        } catch (err) {
            console.error("Camera start error:", err);
            status.innerText = "カメラ起動失敗。ブラウザを更新してください。";
            document.getElementById("start-btn").style.display = "block";
        }
    }

    async function handleCustomerScan() {
        showPage('barcode');
        const status = document.getElementById("scan-status");
        
        await safeStopScanner();
        
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        
        document.getElementById("start-btn").style.display = "none";
        document.getElementById("stop-btn").style.display = "block";
        status.innerText = "顧客コードをスキャンしてください";

        try {
            await html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 220, height: 220 } }, 
                async (decodedText) => {
                    await safeStopScanner();
                    fetchCustomerData(decodedText);
                    showPage('home');
                }
            );
        } catch (err) {
            status.innerText = "カメラ起動失敗";
            document.getElementById("start-btn").style.display = "block";
        }
    }

    // 停止ボタン用
    async function stopScanner() {
        await safeStopScanner();
        document.getElementById("scan-status").innerText = "停止しました";
    }

    // --- 履歴管理機能 ---
    async function loadHistory() {
        const listDiv = document.getElementById("history-list");
        listDiv.innerHTML = '<p style="text-align: center;">データを取得中...</p>';
        try {
            const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getOrderHistory" }) });
            const history = await response.json();
            if (!history || history.length === 0) { listDiv.innerHTML = '<p style="text-align: center;">履歴はありません</p>'; return; }
            listDiv.innerHTML = history.map(item => `
                <div class="item-card" style="border-left: 5px solid #007bff; position: relative;">
                    <small style="color:#666;">${item.date} / ${item.customerName} 様</small><br>
                    <b>${item.name}</b><br><small>品番: ${item.partNo}</small><br>
                    <div style="margin-top:10px;">
                        数量: <input type="number" id="hist-qty-${item.rowNum}" value="${item.qty}" style="width:70px; font-size:16px;">
                        <button onclick="editOrderHistory(${item.rowNum})" style="background:#f0ad4e; color:white; border:none; padding:5px 10px; border-radius:5px; margin-left:10px;">訂正</button>
                        <button onclick="deleteOrderHistory(${item.rowNum})" style="background:#d9534f; color:white; border:none; padding:5px 10px; border-radius:5px; margin-left:10px;">削除</button>
                    </div>
                </div>`).join('');
        } catch (e) { listDiv.innerHTML = '<p style="text-align: center; color:red;">エラー発生</p>'; }
    }

    async function editOrderHistory(rowNum) {
        const newQty = document.getElementById(`hist-qty-${rowNum}`).value;
        if (!confirm("数量を " + newQty + " に変更しますか？")) return;
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "updateOrderLine", rowNum: rowNum, qty: newQty }) });
            const result = await res.json();
            if (result.success) { alert("訂正完了"); loadHistory(); }
        } catch (e) { alert("通信エラー"); }
    }

    async function deleteOrderHistory(rowNum) {
        if (!confirm("削除しますか？")) return;
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "deleteOrderLine", rowNum: rowNum }) });
            const result = await res.json();
            if (result.success) { alert("削除完了"); loadHistory(); }
        } catch (e) { alert("通信エラー"); }
    }

    function filterHistory() {
        const query = document.getElementById('history-search').value.toLowerCase();
        document.querySelectorAll('#history-list .item-card').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(query) ? "block" : "none";
        });
    }
</script>
</body>
</html>
