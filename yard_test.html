<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商事本部 受注システム</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 90px; background: #f4f7f9; }
        header { background: #fff; text-align: center; padding: 12px; border-bottom: 3px solid #3b5998; font-weight: bold; }
        .page-section { display: none; padding: 10px; }
        .active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .btn-main { padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 1.1em; font-weight: bold; color: white; cursor: pointer; }
        .total-box { text-align: right; padding: 15px; font-size: 1.3em; color: #d9534f; font-weight: bold; background: #fff; border-radius: 12px; margin-top: 10px; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #fff; border-top: 1px solid #ddd; padding: 10px 0; z-index: 100; }
        nav button { flex: 1; background: none; border: none; color: #888; font-size: 12px; }
        nav button.active-nav { color: #3b5998; font-weight: bold; }
        #qty-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:200; justify-content:center; align-items:center; }
        .modal-content { background:#fff; width:85%; border-radius:15px; padding:20px; text-align:center; }
        .qty-display { font-size: 2.5em; font-weight: bold; margin-bottom: 10px; background: #eee; padding: 10px; border-radius: 8px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .numpad button { padding: 15px; font-size: 1.5em; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
        .del-btn { color: #d9534f; text-decoration: underline; font-size: 0.9em; cursor: pointer; margin-left:10px; }
    </style>
</head>
<body>

<header>商事本部 立ち売り受注システム</header>

<div id="reader" style="display:none;"></div>
<input type="file" id="qr-input" accept="image/*" capture="environment" style="display:none;" onchange="handleFile(this)">

<div id="qty-modal">
    <div class="modal-content">
        <h3 id="modal-p-name" style="margin:0 0 10px; font-size:1em;">商品名</h3>
        <div class="qty-display" id="qty-val">1</div>
        <div class="numpad">
            <button onclick="numIn(7)">7</button><button onclick="numIn(8)">8</button><button onclick="numIn(9)">9</button>
            <button onclick="numIn(4)">4</button><button onclick="numIn(5)">5</button><button onclick="numIn(6)">6</button>
            <button onclick="numIn(1)">1</button><button onclick="numIn(2)">2</button><button onclick="numIn(3)">3</button>
            <button onclick="numIn('C')" style="color:red;">C</button><button onclick="numIn(0)">0</button><button onclick="numIn('B')">←</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-main" style="background:#ccc; flex:1;" onclick="closeQtyModal()">戻る</button>
            <button class="btn-main" style="background:#3b5998; flex:2;" onclick="confirmQty()">決定</button>
        </div>
    </div>
</div>

<section id="home" class="page-section active">
    <div class="card">
        <div id="c-none" style="text-align:center; color:#999;">顧客情報を読み取ってください</div>
        <div id="c-detail" style="display:none;">
            <b id="r-name" style="color:#3b5998; font-size:1.1em;"></b><br>
            <small id="r-addr1"></small><br>
            <small id="r-addr2"></small><br>
            <small id="r-tel"></small>
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom:10px;">
        <button class="btn-main" style="background:#28a745; flex: 2;" onclick="openCamera('customer')">
            <i class="fas fa-camera"></i> 顧客スキャン
        </button>
        <button class="btn-main" style="background:#6c757d; flex: 1;" onclick="openTelModal()">手入力</button>
    </div>

    <div id="product-input-area" style="display:none; margin: 15px 0;">
        <div style="display: flex; gap: 5px;">
            <input type="text" id="part-no-input" placeholder="品番・JANを入力" style="flex: 2; padding: 12px; border: 1px solid #ccc; border-radius: 8px;">
            <button class="btn-main" style="background:#3b5998; flex: 1; padding: 12px 5px;" onclick="handleManualInput()">追加</button>
        </div>
    </div>

    <div id="cart-area" style="display:none;">
        <div id="cart-list" class="card"></div>
        <div class="total-box">合計: ¥<span id="cart-total">0</span></div>
        <textarea id="common-note" style="width:100%; height:80px; margin-top:10px;" placeholder="コメントを入力"></textarea>
        <button class="btn-main" style="background:#d9534f; margin-top:10px;" id="submit-btn" onclick="submitFinalOrder()">注文確定・送信</button>
    </div>
</section>

<section id="history" class="page-section">
    <h3 style="text-align:center;">注文履歴</h3>
    <div id="h-list"></div>
</section>

<nav>
    <button onclick="showPage('home')" id="n-home" class="active-nav"><i class="fas fa-shopping-cart"></i><br>カート</button>
    <button onclick="openCamera('product')"><i class="fas fa-barcode"></i><br>スキャン</button>
    <button onclick="showPage('history')"><i class="fas fa-history"></i><br>履歴</button>
</nav>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyEXeKGobNn-sMWULcBrLr3uooKTUYRyA5c1yMo6x8s0jNeF3oUCifLtxAVRalXdUE-qQ/exec";
    let customer = null, cart = [], tempProduct = null, isTelMode = false, currentScanMode = 'customer';
    let allProducts = [];

    window.onload = () => { preloadAllProducts(); };

    async function preloadAllProducts() {
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getAllProducts" }) });
            allProducts = await res.json();
        } catch (e) { console.error("商品読込失敗"); }
    }

    // カメラボタンが押されたとき
    function openCamera(mode) {
        if (mode === 'product' && !customer) { alert("先に顧客を選択してください"); return; }
        currentScanMode = mode;
        document.getElementById('qr-input').click();
    }

    // 写真が選択されたとき（解析処理）
    async function handleFile(input) {
        if (!input.files || input.files.length === 0) return;
        const file = input.files[0];
        const qrScanner = new Html5Qrcode("reader");

        try {
            const text = await qrScanner.scanFile(file, false);
            if (currentScanMode === 'customer') fetchCustomer(text.trim());
            else fetchProduct(text.trim());
        } catch (err) {
            alert("QRを認識できません。明るい場所で大きく撮影してください。");
        } finally {
            input.value = "";
            qrScanner.clear();
        }
    }

    async function fetchCustomer(val) {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "customerSearch", val: val }) });
        const d = await res.json();
        if (d.customer) {
            customer = d;
            document.getElementById("r-name").innerText = d.customer;
            document.getElementById("r-addr1").innerText = "〒" + d.zip + " " + d.address1;
            document.getElementById("r-addr2").innerText = d.address2 || ""; 
            document.getElementById("r-tel").innerText = "TEL: " + d.tel;
            document.getElementById("c-none").style.display = "none";
            document.getElementById("c-detail").style.display = "block";
            document.getElementById("cart-area").style.display = "block";
            document.getElementById("product-input-area").style.display = "block";
        } else { alert("未登録のQRです"); }
    }

    function fetchProduct(code) {
        const cleanCode = String(code).trim().toUpperCase();
        const p = allProducts.find(item => String(item.partNo).toUpperCase() === cleanCode || String(item.jan) === cleanCode);
        if (p) openQtyModal(p);
        else alert("商品が見つかりません: " + cleanCode);
    }

    // --- 以下、ユーティリティ関数（数量・カート・履歴） ---
    function openTelModal() { isTelMode = true; document.getElementById("modal-p-name").innerText = "電話番号入力"; document.getElementById("qty-val").innerText = ""; document.getElementById("qty-modal").style.display = "flex"; }
    function openQtyModal(p) { isTelMode = false; tempProduct = p; document.getElementById("modal-p-name").innerText = p.name; document.getElementById("qty-val").innerText = "1"; document.getElementById("qty-modal").style.display = "flex"; }
    function closeQtyModal() { document.getElementById("qty-modal").style.display = "none"; }
    function numIn(n) { let v = document.getElementById("qty-val"); if (n === 'C') v.innerText = isTelMode ? "" : "1"; else if (n === 'B') v.innerText = v.innerText.slice(0, -1); else v.innerText += n; }
    
    async function confirmQty() {
        let val = document.getElementById("qty-val").innerText;
        if (isTelMode) { fetchCustomer(val); } 
        else { cart.push({ ...tempProduct, quantity: parseInt(val) }); renderCart(); }
        closeQtyModal();
    }

    function renderCart() {
        const list = document.getElementById("cart-list");
        let total = 0;
        list.innerHTML = cart.map((item, i) => {
            total += (item.price * item.quantity);
            return `<div class="item-row"><b>${item.name}</b><br>¥${item.price.toLocaleString()} x ${item.quantity} = ¥${(item.price * item.quantity).toLocaleString()} <span class="del-btn" onclick="cart.splice(${i},1);renderCart();">削除</span></div>`;
        }).join('');
        document.getElementById("cart-total").innerText = total.toLocaleString();
    }

    async function submitFinalOrder() {
        if (cart.length === 0 || !confirm("送信しますか？")) return;
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "orderSubmit", data: { ...customer, items: cart } }) });
        alert("送信完了！"); location.reload();
    }

    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'history') loadHistory();
    }
    
    function handleManualInput() { const val = document.getElementById("part-no-input").value; if (val) fetchProduct(val); }
</script>
</body>
</html>
